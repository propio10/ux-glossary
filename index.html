      category: `모션 & 애니메이션`,
      definition: `Airbnb가 개발한 오픈소스 애니메이션 라이브러리로, After Effects에서 제작한 벡터 애니메이션을 iOS, Android, 웹에서 네이티브 품질로 재생할 수 있게 한다.`,
      description: `Lottie는 After Effects 플러그인 Bodymovin으로 내보낸 JSON 형식의 애니메이션 데이터를 각 플랫폼의 네이티브 API로 렌더링하여 고품질 애니메이션을 작은 파일 크기로 제공한다. GIF나 비디오 대비 파일 크기가 작고 해상도에 독립적(벡터 기반)이며, 프로그래밍적으로 재생 속도와 방향을 제어할 수 있다. 로딩 애니메이션, 빈 상태 일러스트레이션, 마이크로인터랙션, 온보딩 애니메이션 등에 광범위하게 활용된다.`,
      usage: `앱 온보딩 화면에서 JSON 파일 하나(50KB)로 After Effects 수준의 부드러운 캐릭터 애니메이션을 iOS와 Android 양쪽에서 동일한 품질로 재생한다.`,
      source: `Material Design 3, Airbnb Design`
    },
  {
      english: `Morph`,
      korean: `모핑`,
      category: `모션 & 애니메이션`,
      definition: `하나의 UI 요소가 형태, 크기, 색상을 부드럽게 변형하여 다른 요소로 전환되는 애니메이션 기법이다.`,
      description: `Morph 애니메이션은 두 상태 사이의 연속성을 시각적으로 표현하여 사용자가 무엇이 어디서 왔는지 이해하는 데 도움을 준다. FAB(Floating Action Button)가 확장되어 전체 화면 폼으로 변환되거나, 아이콘이 다른 아이콘으로 부드럽게 변하는 것이 전형적인 예다. 과도하게 사용하면 사용자가 어떤 요소가 어디에 있는지 혼란스러워질 수 있으므로, 의미 있는 전환에만 사용하는 것이 좋다.`,
      usage: `이메일 앱에서 받은 편지함의 카드를 탭하면, 해당 카드가 Morph 애니메이션으로 전체 화면 이메일 상세 보기로 부드럽게 전환되어 어디서 왔는지 공간적 맥락을 유지한다.`,
      source: `Material Design 3`
    },
  {
      english: `Accessibility (a11y)`,
      korean: `접근성`,
      category: `접근성 & 표준`,
      definition: `장애가 있는 사람을 포함한 모든 사람이 제품이나 서비스를 동등하게 인식하고 이해하며 조작하고 상호작용할 수 있도록 설계하는 원칙이다.`,
      description: `접근성은 시각, 청각, 운동, 인지 네 가지 주요 장애 유형을 포괄하며, 각 유형마다 다른 지원 기술(보조 기술)과 설계 원칙이 적용된다. 접근성은 단순히 규정 준수(WCAG, ADA, EAA 등)를 넘어 더 많은 사람이 제품을 사용할 수 있게 하여 시장을 확대하는 비즈니스적 가치도 있다. Microsoft의 'Inclusive Design' 원칙이 강조하듯, 장애인을 위해 설계된 기능이 모든 사람에게도 편리함을 제공하는 경우가 많다(자막은 청각 장애인과 소음 환경 모두를 위해 유용하다).`,
      usage: `앱 개발 시 색상 대비 검사 도구로 텍스트 대비를 4.5:1 이상으로 확인하고, 스크린 리더(VoiceOver)로 전체 앱을 탐색하여 모든 기능이 키보드와 음성으로도 작동하는지 검증한다.`,
      source: `W3C WCAG 2.2, Apple Human Interface Guidelines`
    },
  {
      english: `WCAG`,
      korean: `웹 콘텐츠 접근성 지침`,
      category: `접근성 & 표준`,
      definition: `W3C의 웹 접근성 이니셔티브(WAI)가 개발한 국제 웹 접근성 표준으로, 웹 콘텐츠를 장애인을 포함한 모든 사람이 접근할 수 있도록 만드는 지침이다.`,
      description: `WCAG는 인식 가능(Perceivable), 조작 가능(Operable), 이해 가능(Understandable), 견고함(Robust)의 POUR 4대 원칙과 그 하위 성공 기준으로 구성된다. 현재 최신 버전은 WCAG 2.2(2023년 10월)로, 이전 버전에 9개의 새로운 성공 기준을 추가했다. Level A(최소), Level AA(표준), Level AAA(최고) 세 가지 적합성 수준이 있으며, 대부분의 법적 규정과 기업 표준은 Level AA 준수를 요구한다. 한국의 '웹 접근성 품질인증'(WA마크), 미국의 ADA/Section 508, 유럽의 EAA(European Accessibility Act) 모두 WCAG를 기술 기준으로 참조한다.`,
      usage: `공공기관 웹사이트에서 WCAG 2.2 Level AA 준수를 위해 색상 대비 4.5:1, 키보드 접근성, 텍스트 대안 제공, 포커스 인디케이터 등 78개의 성공 기준을 시스템적으로 점검하고 이행한다.`,
      source: `W3C WCAG 2.2`
    },
  {
      english: `Screen Reader`,
      korean: `스크린 리더`,
      category: `접근성 & 표준`,
      definition: `화면의 텍스트와 UI 요소를 음성으로 읽어주거나 점자 디스플레이로 출력하여 시각 장애인이 디지털 콘텐츠에 접근할 수 있게 하는 보조 기술이다.`,
      description: `스크린 리더는 UI의 접근성 트리(Accessibility Tree)를 순회하며 각 요소의 역할(role), 이름(name), 상태(state)를 읽어준다. JAWS, NVDA(Windows), VoiceOver(Apple), TalkBack(Android), Narrator(Windows)가 대표적인 스크린 리더이며, 플랫폼별로 탐색 방식과 단축키가 다르다. 스크린 리더 사용자는 헤딩 레벨로 페이지를 탐색하거나, 링크 목록을 통해 원하는 링크로 빠르게 이동하는 방식을 많이 사용한다.`,
      usage: `모든 이미지에 의미를 전달하는 alt 텍스트를 추가하고, 폼의 레이블을 입력 필드와 명시적으로 연결하여 NVDA 스크린 리더를 사용하는 시각 장애인이 회원가입 폼을 정상적으로 완료할 수 있도록 한다.`,
      source: `W3C WCAG 2.2, Apple Human Interface Guidelines`
    },
  {
      english: `VoiceOver`,
      korean: `보이스오버`,
      category: `접근성 & 표준`,
      definition: `Apple이 iOS, macOS, tvOS, watchOS에 기본 내장한 스크린 리더로, 화면 콘텐츠를 음성으로 읽어주고 제스처 기반 탐색을 지원한다.`,
      description: `VoiceOver는 iOS에서 손가락 제스처로 화면을 탐색하는 방식으로, 단일 탭으로 요소 선택 및 읽기, 더블 탭으로 활성화, 세 손가락 스와이프로 스크롤 등의 전용 제스처 체계를 사용한다. Apple HIG는 앱의 모든 인터랙티브 요소에 의미 있는 접근성 레이블을 제공하고, 커스텀 UI 요소에는 적절한 접근성 역할과 값을 설정하도록 강조한다. iOS 설정 &gt; 손쉬운 사용 &gt; VoiceOver를 통해 활성화할 수 있으며, 단축키로는 홈 버튼(구형) 또는 사이드 버튼(Face ID 기기)을 세 번 빠르게 클릭한다.`,
      usage: `쇼핑 앱의 상품 이미지에 '빨간 줄무늬 면 티셔츠, 29,900원, 재고 있음'이라는 accessibilityLabel을 설정하여, VoiceOver 사용자가 이미지를 탭했을 때 상품 정보를 음성으로 확인할 수 있도록 한다.`,
      source: `Apple Human Interface Guidelines, W3C WCAG 2.2`
    },
  {
      english: `TalkBack`,
      korean: `톡백`,
      category: `접근성 & 표준`,
      definition: `Google이 Android에 기본 내장한 스크린 리더로, 터치 및 스와이프 탐색과 함께 음성으로 화면 콘텐츠를 전달한다.`,
      description: `TalkBack은 VoiceOver와 유사하지만 Android 플랫폼 특화 제스처와 설정을 가지며, 오른쪽/왼쪽 스와이프로 순서대로 탐색하고, 더블 탭으로 활성화하는 방식이다. Material Design 3는 모든 컴포넌트가 TalkBack에서 올바르게 작동하도록 설계되었으며, 커스텀 컴포넌트 사용 시 추가적인 접근성 처리가 필요하다.`,
      usage: `아이콘만으로 구성된 탭 바의 각 아이콘에 contentDescription='홈', '검색', '장바구니', '마이페이지'를 설정하여 TalkBack 사용자가 탭 바를 탐색할 때 각 탭의 기능을 음성으로 확인할 수 있도록 한다.`,
      source: `Google Design, Material Design 3, W3C WCAG 2.2`
    },
  {
      english: `Color Contrast`,
      korean: `색상 대비`,
      category: `접근성 & 표준`,
      definition: `텍스트 또는 UI 요소와 배경 색상 사이의 밝기 차이를 수치로 표현한 것으로, 저시력자와 색맹 사용자가 콘텐츠를 인식할 수 있는 충분한 대비를 확보하는 기준이다.`,
      description: `WCAG 2.2는 일반 텍스트(18pt 미만 또는 Bold 14pt 미만)에 4.5:1, 대형 텍스트(18pt 이상 또는 Bold 14pt 이상)와 UI 컴포넌트에 3:1의 최소 대비율을 요구한다(Level AA 기준). 색상 대비는 색조나 채도가 아닌 명도 차이를 기준으로 측정하므로, 색맹 사용자가 볼 때의 대비를 더 정확하게 반영한다. 색상만으로 정보를 전달하는 것(오류는 빨간색, 성공은 초록색만으로 구분)은 색맹 사용자에게 장벽이 되므로 아이콘, 텍스트, 패턴 등 추가적인 시각 단서를 함께 제공해야 한다.`,
      usage: `Figma의 접근성 플러그인을 사용하여 흰색 배경(#FFFFFF) 위의 회색 텍스트(#767676)의 대비율이 4.5:1인지 확인하고, 기준 미달 시 더 어두운 색(#595959 이상)으로 조정한다.`,
      source: `W3C WCAG 2.2`
    },
  {
      english: `Focus Indicator`,
      korean: `포커스 인디케이터`,
      category: `접근성 & 표준`,
      definition: `키보드 또는 보조 기술 사용 시 현재 포커스를 받은 UI 요소를 시각적으로 명확하게 표시하는 윤곽선이나 강조 표시다.`,
      description: `포커스 인디케이터는 키보드 사용자, 스위치 접근 사용자, 청각 장애인 등 마우스를 사용하지 않는 사람들에게 현재 '커서'가 어디에 있는지 알려주는 필수적인 시각 요소다. WCAG 2.2에서는 포커스 인디케이터가 최소 2픽셀 이상의 두께를 갖고, 포커스된 요소와 배경 사이에 3:1 이상의 대비율을 가져야 한다(SC 2.4.11 Level AA).`,
      usage: `CSS에서 \`.btn:focus-visible { outline: 3px solid #0066CC; outline-offset: 2px; }\`를 적용하여 키보드로 버튼에 포커스가 이동할 때 파란색 3픽셀 포커스 링이 표시되도록 하여 WCAG 2.4.11 기준을 충족한다.`,
      source: `W3C WCAG 2.2`
    },
  {
      english: `Skip Navigation`,
      korean: `스킵 내비게이션`,
      category: `접근성 & 표준`,
      definition: `페이지 상단에 숨겨진 링크로, 키보드 사용자가 반복되는 내비게이션을 건너뛰고 본문 콘텐츠로 바로 이동할 수 있게 하는 접근성 패턴이다.`,
      description: `스킵 내비게이션 링크는 페이지의 첫 번째 탭 가능 요소로 배치되며, 기본적으로 화면에서 숨겨져 있다가 Tab 키를 눌러 포커스가 이동하면 시각적으로 나타난다. 키보드 사용자나 스크린 리더 사용자가 메뉴를 반복해서 탐색하지 않고 바로 콘텐츠로 이동할 수 있게 하여 탐색 효율성을 크게 향상시킨다. '메인 콘텐츠로 이동', '네비게이션으로 이동' 등 여러 스킵 링크를 제공하면 더욱 풍부한 탐색 옵션을 제공할 수 있다.`,
      usage: `웹사이트 HTML의 body 태그 바로 아래에 \`&lt;a class="skip-nav" href="#main-content"&gt;본문으로 바로가기&lt;/a&gt;\`를 삽입하고, Tab 키를 누를 때만 화면에 나타나도록 CSS로 처리하여 키보드 사용자가 메인 콘텐츠로 바로 이동할 수 있게 한다.`,
      source: `W3C WCAG 2.2`
    },
  {
      english: `Alt Text`,
      korean: `대체 텍스트`,
      category: `접근성 & 표준`,
      definition: `이미지가 표시되지 않거나 스크린 리더를 사용할 때 이미지의 내용과 기능을 텍스트로 전달하는 대안적 설명이다.`,
      description: `HTML의 \`&lt;img alt="설명"&gt;\`으로 구현되며, 스크린 리더가 이미지를 읽을 때 alt 텍스트를 음성으로 출력한다. 의미 있는 이미지(정보 전달 목적)에는 이미지의 내용을 간결하게 설명하는 alt 텍스트를 제공하고, 장식적 이미지(미적 목적)에는 \`alt=""\`로 빈 값을 설정하여 스크린 리더가 건너뛰도록 한다. alt 텍스트는 '이미지'라는 단어로 시작하지 않아야 하며(스크린 리더가 이미 이미지임을 알림), 이미지의 맥락과 목적에 맞는 설명을 작성해야 한다.`,
      usage: `제품 이미지에 alt='삼성 갤럭시 S24 울트라 블랙 256GB 스마트폰'이라고 설정하고, 로고 이미지에는 alt='쿠팡 홈으로 이동'처럼 기능을 설명하는 텍스트를 제공한다.`,
      source: `W3C WCAG 2.2`
    },
  {
      english: `Keyboard Navigation`,
      korean: `키보드 내비게이션`,
      category: `접근성 & 표준`,
      definition: `마우스 없이 키보드(Tab, Shift+Tab, 방향키, Enter, Space, Escape 등)만으로 모든 인터랙티브 요소에 접근하고 기능을 실행할 수 있는 접근성 기능이다.`,
      description: `키보드 내비게이션은 운동 장애가 있는 사용자, 스크린 리더 사용자, 키보드를 선호하는 파워 유저 모두에게 필수적이다. WCAG SC 2.1.1(Keyboard, Level A)은 모든 기능이 키보드로 접근 가능해야 하며, 특정 제스처나 움직임만으로 실행되는 기능 없이 동등한 키보드 대안을 제공해야 한다고 요구한다. 탭 순서(Tab Order)는 화면의 시각적 읽기 순서(좌→우, 위→아래)와 일치해야 하며, 포커스 트래핑(모달 내), 포커스 복원(모달 닫힌 후), 논리적 포커스 흐름 관리가 중요하다.`,
      usage: `웹사이트 전체를 Tab 키만으로 탐색하면서 모든 버튼, 링크, 폼 필드에 포커스가 논리적 순서로 이동하는지, 드롭다운 메뉴가 Enter/Space로 열리고 방향키로 탐색되며 Escape로 닫히는지 검증한다.`,
      source: `W3C WCAG 2.2, Apple Human Interface Guidelines`
    },
  {
      english: `Reduced Motion`,
      korean: `모션 감소 (접근성)`,
      category: `접근성 & 표준`,
      definition: `전정 장애, 주의력 장애, 광과민성 발작 위험이 있는 사용자를 위해 운영체제 수준에서 제공되는 애니메이션 및 모션 감소 설정으로, 웹과 앱에서 이를 감지하여 모션을 조정해야 한다.`,
      description: `iOS/macOS의 '모션 줄이기', Windows의 '애니메이션 표시'를 끄는 설정, Android의 '애니메이션 사용 안 함' 등 모든 주요 플랫폼이 모션 감소 설정을 제공한다. WCAG SC 2.3.3(Animation from Interactions, Level AAA)은 인터랙션으로 유발되는 모션 애니메이션을 비활성화할 수 있는 방법 제공을 권장한다.`,
      usage: `\`@media (prefers-reduced-motion: reduce) { .carousel { animation: none; transition: none; } .hero-animation { animation-duration: 0.001s; } }\`를 적용하여 모션 감소 설정 사용자에게 캐러셀과 히어로 애니메이션을 즉시 전환으로 대체한다.`,
      source: `W3C WCAG 2.2, Apple Human Interface Guidelines`
    },
  {
      english: `Captions`,
      korean: `자막`,
      category: `접근성 & 표준`,
      definition: `오디오 콘텐츠(대화, 효과음, 음악 설명)를 텍스트로 화면에 표시하여 청각 장애인 또는 소리를 들을 수 없는 환경의 사용자가 동영상 콘텐츠에 접근할 수 있게 하는 접근성 기능이다.`,
      description: `자막에는 청각 장애인을 위해 대화뿐만 아니라 '[박수 소리]', '[음악]' 등 중요한 비언어적 오디오 정보도 포함하는 폐쇄 자막(Closed Captions, CC)과 일반 번역자막을 포함하는 오픈 자막(Open Captions) 두 종류가 있다. 자동 생성 자막(AI 자동 자막)은 편리하지만 정확도가 완벽하지 않으므로 검토 및 수정 과정이 필요하다. 자막은 장애인뿐만 아니라 소음 환경, 다른 언어 사용자, 청각 정보 처리에 어려움이 있는 인지 장애 사용자에게도 유익하다.`,
      usage: `온라인 교육 플랫폼에서 모든 강의 영상에 SRT 형식의 폐쇄 자막 파일을 제공하고, 자막 ON/OFF, 폰트 크기 조정, 배경색 변경 기능을 사용자가 선택할 수 있도록 제공한다.`,
      source: `W3C WCAG 2.2`
    },
  {
      english: `Audio Description`,
      korean: `오디오 설명`,
      category: `접근성 & 표준`,
      definition: `동영상에서 시각적으로만 전달되는 중요한 정보(행동, 장면 변화, 텍스트 등)를 음성으로 설명하여 시각 장애인이 동영상 콘텐츠를 이해할 수 있게 하는 접근성 기능이다.`,
      description: `오디오 설명은 동영상의 대화가 없는 pause 구간에 화자가 화면에서 일어나는 시각적 사건을 간결하게 설명하는 방식으로 제공된다. 기존 동영상에 오디오 설명을 추가하기 어려운 경우, 동영상 내용을 모두 포함하는 확장 오디오 설명이나 텍스트 대안(Full Media Alternative)을 제공하는 방법도 있다. YouTube, Vimeo 등 주요 비디오 플랫폼은 오디오 설명 트랙을 별도로 업로드할 수 있는 기능을 제공한다.`,
      usage: `요리 레시피 동영상에서 요리사가 재료를 넣는 모습을 보여주는 장면에 대화 없이 진행될 때, '이제 밀가루 두 컵을 볼에 넣고 있습니다'라는 오디오 설명을 추가하여 시각 장애인도 레시피를 따라할 수 있도록 한다.`,
      source: `W3C WCAG 2.2`
    },
  {
      english: `Touch Accommodation`,
      korean: `터치 편의 기능`,
      category: `접근성 & 표준`,
      definition: `손 떨림, 손가락 조절 어려움 등 정밀한 터치 조작이 어려운 사용자를 위해 터치 입력을 수정하거나 보조하는 접근성 기능이다.`,
      description: `Apple의 Touch Accommodation(iOS 손쉬운 사용 기능)은 터치 대기 시간 설정(탭으로 인식되기까지의 최소 시간), 터치 반복 설정(동일 위치를 연속 탭해도 한 번으로 처리), 터치 홀드 속도 설정 등을 제공한다. Android의 터치/홀드 지연 설정, Windows의 터치 탐색기 등 각 플랫폼이 유사한 기능을 제공하며, 개발자는 이러한 시스템 설정이 앱에 올바르게 적용되는지 테스트해야 한다.`,
      usage: `손 떨림이 있는 사용자가 Touch Accommodation의 '터치 대기 시간'을 0.5초로 설정하면, 화면에 가볍게 스치는 동작은 탭으로 인식되지 않고 의도적으로 0.5초 이상 누를 때만 탭으로 처리된다.`,
      source: `Apple Human Interface Guidelines, W3C WCAG 2.2`
    },
  {
      english: `Cognitive Accessibility`,
      korean: `인지 접근성`,
      category: `접근성 & 표준`,
      definition: `인지 장애, 학습 장애, 주의력 장애, 기억력 장애 등을 가진 사용자가 디지털 콘텐츠와 서비스를 쉽게 이해하고 사용할 수 있도록 설계하는 접근성 영역이다.`,
      description: `인지 접근성은 시각·청각·운동 장애보다 상대적으로 늦게 표준화가 진행된 분야로, 인지 접근성 설계 원칙으로는 일관된 레이아웃 유지, 명확한 오류 메시지, 단기 기억에 의존하지 않는 설계, 단순하고 명확한 언어 사용, 복잡한 인증 없애기(수수께끼, CAPTCHA 등) 등이 있다. '읽기 쉬운 언어(Plain Language)' 원칙에 따라 전문 용어를 최소화하고 짧은 문장으로 작성하는 것이 핵심이다.`,
      usage: `폼 제출 오류 시 '오류: 코드 0x80004005'와 같은 기술적 메시지 대신 '이메일 주소에 '@'가 빠진 것 같아요. 예: user@example.com', '전화번호는 숫자 11자리로 입력해 주세요 (예: 01012345678)'처럼 명확하고 수정 방법이 포함된 안내문을 제공한다.`,
      source: `W3C WCAG 2.2, W3C COGA Guidance`
    },
  {
      english: `Text Spacing`,
      korean: `텍스트 간격`,
      category: `접근성 & 표준`,
      definition: `난독증이나 인지 장애가 있는 사용자를 위해 행간, 자간, 단어 간격, 단락 간격을 조정했을 때 콘텐츠나 기능을 손실 없이 표시해야 한다는 WCAG 접근성 요건이다.`,
      description: `WCAG 2.1 성공 기준 1.4.12 Text Spacing(AA 수준)에서 정의되며, 행간 1.5배, 단락 간격 2배, 자간 0.12em, 단어 간격 0.16em으로 설정했을 때 콘텐츠가 잘려나가거나 겹치지 않아야 한다. 많은 개발자가 텍스트 영역을 고정 높이로 설정하여 이 요건을 위반한다.`,
      usage: `사용자가 OS 접근성 설정에서 '텍스트 크기 및 간격'을 조정했을 때, 버튼 레이블이나 카드 내 텍스트가 잘리거나 버튼 외부로 넘치지 않고 컨테이너가 유동적으로 늘어나야 한다.`,
      source: `W3C WCAG 2.1`
    },
  {
      english: `Visual Hierarchy`,
      korean: `시각적 위계`,
      category: `지각 심리`,
      definition: `디자인 요소의 크기, 색상, 대비, 위치, 무게감 등을 조절하여 사용자가 콘텐츠를 중요도 순서대로 인지하도록 유도하는 시각적 구조다.`,
      description: `시각적 위계는 사용자의 시선 흐름을 설계하는 핵심 원리다. F패턴·Z패턴처럼 사용자는 화면을 선형으로 읽지 않고 시각적으로 두드러진 요소부터 인식하므로, 가장 중요한 정보를 가장 눈에 띄게 배치해야 한다. 크기(제목 > 본문), 색상(강조색 vs 중립색), 대비(어둠/밝음의 차이), 공간(주변 여백)이 위계를 결정하는 주요 도구다. 잘 설계된 시각적 위계는 별도의 설명 없이도 사용자가 어디서 시작해 어디로 이동할지 직관적으로 파악하게 한다.`,
      usage: `랜딩 페이지에서 서비스명(H1, 대형), 핵심 가치 문구(H2, 중형), 부가 설명(본문, 소형), CTA 버튼(강조색)의 시각적 위계를 설계하여 사용자의 시선이 자연스럽게 CTA로 유도되도록 구성한다.`,
      source: `Nielsen Norman Group, Interaction Design Foundation`
    },
  {
      english: `Gestalt Principles`,
      korean: `게슈탈트 원리`,
      category: `지각 심리`,
      definition: `인간이 시각 정보를 부분의 합이 아닌 전체적인 패턴으로 인식한다는 심리학 이론으로, UI 디자인에서 요소 간 관계와 그룹화를 설계하는 데 핵심적으로 적용된다.`,
      description: `게슈탈트 심리학(1920년대 독일)에서 발전한 이 원리는 근접성(Proximity), 유사성(Similarity), 연속성(Continuity), 폐쇄성(Closure), 전경-배경(Figure-Ground) 등의 법칙으로 구성된다. UX 디자이너는 이 원리를 활용하여 시각적 그루핑, 레이아웃 흐름, 인터페이스의 논리적 구조를 명시적 구분선 없이도 직관적으로 전달할 수 있다. 게슈탈트 원리는 특정 문화권에 국한되지 않고 보편적인 인지 메커니즘에 기반하므로, 글로벌 제품 설계에서도 신뢰할 수 있는 원칙이다.`,
      usage: `폼 디자인에서 '이름'과 '이메일' 필드는 가까이 배치하고 '결제 정보' 그룹과는 충분한 여백을 두어, 별도의 구분선 없이도 사용자가 관련 항목끼리 묶어 인식하도록 근접성 원리를 적용한다.`,
      source: `Interaction Design Foundation, Nielsen Norman Group`
    },
  {
      english: `Proximity`,
      korean: `근접성`,
      category: `지각 심리`,
      definition: `서로 가까이 위치한 요소들은 관련이 있다고 인식되는 게슈탈트 원리로, 시각적 그룹을 만들어 인터페이스의 논리적 구조를 전달한다.`,
      description: `근접성 원리는 UI에서 관련 정보를 물리적으로 가까이 배치함으로써 명시적 레이블이나 경계선 없이도 그룹 관계를 표현하는 데 활용된다. 반대로 관계없는 요소 사이에 충분한 여백을 두면 구분감이 생긴다. 폼 레이아웃, 카드 UI, 내비게이션 메뉴 등 다양한 컴포넌트에서 핵심적으로 적용된다. 연구에 따르면 사용자는 요소 간격의 차이를 구분선보다 더 빠르게 인식하는 경향이 있다.`,
      usage: `설정 화면에서 '알림 설정' 관련 토글들은 서로 8px 간격으로 묶고, '계정 설정' 그룹과는 24px 이상의 여백을 두어 두 그룹이 분리되어 보이도록 구성한다.`,
      source: `Interaction Design Foundation, Nielsen Norman Group`
    },
  {
      english: `Similarity`,
      korean: `유사성`,
      category: `지각 심리`,
      definition: `색상, 형태, 크기, 방향이 비슷한 요소들은 같은 그룹에 속한다고 인식되는 게슈탈트 원리다.`,
      description: `유사성 원리는 시각적 일관성을 통해 UI 요소의 기능적 관계를 전달하는 데 활용된다. 같은 색상의 버튼은 같은 기능을 가진 요소로, 같은 크기의 카드는 동등한 위계의 콘텐츠로 인식된다. 반대로 의도적으로 다른 스타일을 부여하면 해당 요소의 특별한 역할이나 상태를 강조할 수 있다. 디자인 시스템에서 컴포넌트의 시각적 규칙을 일관되게 정의하는 근거 중 하나다.`,
      usage: `대시보드에서 모든 '삭제' 관련 액션 버튼에 동일한 빨간색을 적용하여, 사용자가 화면을 처음 보는 순간에도 위험 동작을 직관적으로 식별하도록 유사성 원리를 활용한다.`,
      source: `Interaction Design Foundation, Nielsen Norman Group`
    },
  {
      english: `Figure-Ground`,
      korean: `전경-배경`,
      category: `지각 심리`,
      definition: `인간의 시각 인지는 전경(Figure, 주목 대상)과 배경(Ground, 맥락)을 자동으로 분리하여 인식한다는 게슈탈트 원리로, 모달, 오버레이, 팝업 UI 설계의 근거가 된다.`,
      description: `전경-배경 원리는 UI에서 오버레이(어두운 배경 위 밝은 콘텐츠 박스), 드롭다운 메뉴, 툴팁, 모달 다이얼로그 등에 직접적으로 적용된다. 배경을 어둡게 처리하거나 블러(흐림) 효과를 주면 전경 요소가 명확히 분리되어 주목도가 높아진다. 전경-배경이 모호하면 사용자는 어느 요소에 집중해야 할지 혼란을 겪으므로, 명확한 시각적 분리가 중요하다.`,
      usage: `삭제 확인 모달을 표시할 때, 배경(페이지 콘텐츠)에 반투명 검정 오버레이(opacity 0.5)를 적용하고 모달 박스를 흰 배경과 그림자로 강조하여 사용자의 시선을 모달로 집중시킨다.`,
      source: `Interaction Design Foundation, Apple HIG, Material Design 3`
    },
  {
      english: `Closure`,
      korean: `폐쇄성`,
      category: `지각 심리`,
      definition: `인간의 뇌는 불완전한 형태를 보더라도 익숙한 전체 형태로 완성하여 인식한다는 게슈탈트 원리로, 아이콘·로고·진행 표시 UI 설계에 활용된다.`,
      description: `폐쇄성 원리 덕분에 완전히 닫히지 않은 원형도 원으로, 불연속적인 점의 배열도 선으로 인식된다. 이를 UI에 적용하면 최소한의 픽셀로도 인식 가능한 아이콘을 설계하거나, 카드 컴포넌트에서 일부가 잘린(clipped) 상태로 보여도 사용자가 더 많은 콘텐츠가 있음을 인지하도록 유도할 수 있다. 캐러셀(Carousel)에서 다음 카드의 일부를 살짝 노출하는 '피킹(Peeking)' 패턴도 폐쇄성 원리의 응용이다.`,
      usage: `수평 스크롤 카드 리스트에서 마지막 카드를 화면 가장자리에 절반만 노출하여, 사용자가 별도 안내 없이도 "더 많은 카드가 있다"고 인지하고 스와이프를 시도하도록 설계한다.`,
      source: `Interaction Design Foundation, Nielsen Norman Group`
    },
  {
      english: `Continuity`,
      korean: `연속성`,
      category: `지각 심리`,
      definition: `일직선이나 완만한 곡선을 따라 배열된 요소들은 하나의 연속적 그룹으로 인식된다는 게슈탈트 원리로, 내비게이션 흐름과 시선 유도 설계에 활용된다.`,
      description: `연속성 원리는 사용자의 시선 흐름을 의도적으로 유도하는 레이아웃 설계에 활용된다. 수평으로 정렬된 아이템들, 수직 목록, 곡선 형태의 배치 모두 연속성을 통해 시선의 방향을 만들어낸다. 콘텐츠 흐름을 연속적으로 설계하면 사용자가 다음에 무엇이 올지 예측 가능해지고, 인지 부하가 줄어든다. 진행 단계 표시(Step Indicator)에서 각 단계를 선으로 연결하는 UI도 연속성 원리의 응용이다.`,
      usage: `온보딩 5단계 화면을 설계할 때, 각 스텝을 수평 선으로 연결하고 완료된 단계를 채움 처리하여 사용자가 전체 여정 속 현재 위치와 앞으로 남은 흐름을 직관적으로 파악하도록 한다.`,
      source: `Interaction Design Foundation, Nielsen Norman Group`
    },
  {
      english: `Visual Weight`,
      korean: `시각적 무게감`,
      category: `지각 심리`,
      definition: `디자인 요소가 시각적으로 얼마나 무겁게(또는 가볍게) 느껴지는지를 나타내는 개념으로, 크기·색상·대비·질감에 따라 결정되며 시각적 균형 설계에 핵심적으로 활용된다.`,
      description: `시각적 무게감은 물리적 무게가 아닌 지각적 개념이다. 어두운 색상, 큰 크기, 높은 채도, 복잡한 텍스처는 무거운 인상을, 밝은 색상, 작은 크기, 낮은 채도, 단순한 형태는 가벼운 인상을 준다. 디자이너는 시각적 무게감을 조절하여 비대칭 레이아웃에서도 균형감(Balance)을 만들어낼 수 있다. 예를 들어 왼쪽에 큰 이미지와 오른쪽에 여러 작은 텍스트 블록을 배치하면 시각적으로 균형 잡혀 보일 수 있다.`,
      usage: `히어로 섹션에서 왼쪽의 대형 텍스트(시각적으로 무거움)와 오른쪽의 밝은 톤의 일러스트레이션(시각적으로 가벼움)을 배치하여, 레이아웃 전체에 시각적 균형감을 부여한다.`,
      source: `Interaction Design Foundation, Nielsen Norman Group`
    },
  {
      english: `Visual Balance`,
      korean: `시각적 균형`,
      category: `지각 심리`,
      definition: `레이아웃에서 시각적 요소들의 무게감이 고르게 분산되어 안정적이고 조화로운 느낌을 주는 구성 원리로, 대칭 균형과 비대칭 균형으로 나뉜다.`,
      description: `대칭 균형(Symmetrical Balance)은 중심축을 기준으로 양쪽이 동일하게 배치되어 안정감과 신뢰감을 주며, 비대칭 균형(Asymmetrical Balance)은 서로 다른 요소들의 시각적 무게를 조율하여 역동적이면서도 균형 잡힌 느낌을 만든다. 현대 UX 디자인에서는 비대칭 균형이 더 많이 활용되며, 이를 통해 시각적 흥미와 안정감을 동시에 달성할 수 있다. 방사형 균형(Radial Balance)은 중심점에서 방사형으로 요소가 배치되는 방식으로, 로딩 스피너나 원형 메뉴에서 활용된다.`,
      usage: `제품 상세 페이지에서 왼쪽에 제품 이미지(시각적 무게 高)를 배치하고, 오른쪽에 제품명·가격·리뷰 별점·CTA 버튼을 수직 배열(시각적 무게 합산)하여 비대칭 균형을 구현한다.`,
      source: `Interaction Design Foundation, Nielsen Norman Group`
    },
  {
      english: `Color Theory`,
      korean: `색채 이론`,
      category: `지각 심리`,
      definition: `색상의 본질, 색상 간의 관계, 색상이 인간의 심리와 지각에 미치는 영향을 체계적으로 설명하는 이론으로, UI 색상 팔레트 설계의 기초가 된다.`,
      description: `UI 설계에서 색채 이론은 색상환(Color Wheel), 보색(Complementary), 유사색(Analogous), 삼색(Triadic) 관계를 활용하여 조화로운 색상 조합을 만드는 데 활용된다. 색상은 감정과 연상을 유발하며(빨강=긴박함, 파랑=신뢰, 초록=성공 등), 이를 브랜드 커뮤니케이션에 전략적으로 활용한다. 단, 색상의 문화적 의미는 지역마다 다를 수 있으므로 글로벌 제품에서는 주의가 필요하다.`,
      usage: `금융 앱의 색상 팔레트를 설계할 때, 신뢰감을 주는 파란색 계열을 주요 색상으로, 성공/수익을 나타내는 초록색을 긍정 상태에, 경고를 위해 주황색, 위험 액션에 빨간색을 사용하는 체계를 수립한다.`,
      source: `Interaction Design Foundation, W3C WCAG`
    },
  {
      english: `Dark Mode`,
      korean: `다크 모드`,
      category: `지각 심리`,
      definition: `인터페이스의 색상 체계를 어두운 배경과 밝은 전경 텍스트로 전환하는 표시 모드로, 저조도 환경에서의 가독성 개선과 배터리 절약(OLED 화면)을 목적으로 한다.`,
      description: `다크 모드는 단순히 색상을 반전하는 것이 아니라, 배경 계층(elevation)에 따른 표면 색상의 미세한 변화, 그림자 대신 빛(light) 기반 레이어 표현 등을 포함하는 별도의 디자인 시스템이다. iOS 13(2019), Android 10(2019)에서 OS 수준의 다크 모드가 도입된 이후 표준 UX 기능이 되었다. Apple HIG와 Material Design 3 모두 라이트·다크 각각에 최적화된 색상 팔레트와 전환 가이드라인을 제공한다. WCAG의 명암비 기준(4.5:1 이상)은 다크 모드에서도 동일하게 적용된다.`,
      usage: `앱에 다크 모드를 구현할 때, 라이트 모드의 \`#FFFFFF\` 배경을 그대로 반전한 \`#000000\`이 아닌 \`#1C1C1E\`(iOS) 또는 \`#121212\`(Material)를 사용하여 순수 블랙이 아닌 완만한 다크 표면 위계를 구성한다.`,
      source: `Apple HIG, Material Design 3, W3C WCAG`
    },
  {
      english: `Typography`,
      korean: `타이포그래피`,
      category: `지각 심리`,
      definition: `텍스트를 시각적으로 배열하고 스타일링하는 예술이자 기술로, 서체 선택·크기·자간·행간·정렬 등의 속성을 통해 가독성, 위계, 정보 전달력을 결정한다.`,
      description: `UX에서 타이포그래피는 단순히 글자를 예쁘게 보여주는 것을 넘어, 콘텐츠의 위계 구조를 전달하고 브랜드의 톤앤매너를 형성하며 접근성을 결정하는 핵심 요소다. 모바일 환경에서는 최소 16px(약 12pt) 이상의 본문 텍스트 크기를 권장하며, 줄 길이(Line Length)는 60-80자(영문 기준)가 최적의 가독성을 제공한다. 세리프(Serif)체는 권위와 전통적 느낌을, 산세리프(Sans-Serif)체는 현대적이고 청결한 느낌을 전달한다. Apple SF Pro, Google Noto Sans, 한국어에서는 Pretendard 등이 대표적인 UI 최적화 서체다.`,
      usage: `뉴스 앱의 타이포그래피 시스템을 설계할 때, 기사 제목에는 세리프 Bold 24px, 요약문에는 산세리프 Regular 16px, 본문에는 산세리프 Regular 15px, 행간 1.6을 적용하여 가독성과 위계를 동시에 달성한다.`,
      source: `Apple HIG, Material Design 3, Nielsen Norman Group`
    },
  {
      english: `Line Height`,
      korean: `행간`,
      category: `지각 심리`,
      definition: `텍스트 줄 사이의 수직 간격으로, 가독성과 텍스트 블록의 시각적 밀도를 결정하는 타이포그래피의 핵심 속성이다.`,
      description: `행간은 폰트 크기 대비 비율로 설정하는 것이 일반적이다. 본문 텍스트는 1.4–1.6 비율이 최적의 가독성을 제공하며, 제목 텍스트는 1.1–1.3으로 더 촘촘하게 설정한다. 행간이 너무 좁으면 글줄이 뭉쳐 보여 읽기 불편하고, 너무 넓으면 줄 간의 연관성이 약해져 흐름이 끊기는 느낌을 준다. 한국어는 영문에 비해 글자 높이가 커서 동일 폰트 크기에서 더 넓은 행간이 필요한 경우가 많다.`,
      usage: `모바일 앱의 본문 텍스트(16px)에 \`line-height: 1.5\`(24px)를 적용하고, 제목(24px)에는 \`line-height: 1.2\`(28.8px)를 적용하여 크기별 최적의 가독성을 확보한다.`,
      source: `W3C WCAG, Apple HIG, Nielsen Norman Group`
    },
  {
      english: `Kerning & Letter Spacing`,
      korean: `자간`,
      category: `지각 심리`,
      definition: `글자와 글자 사이의 수평 간격으로, 커닝(Kerning)은 특정 글자 쌍 사이의 간격 조정이며 레터 스페이싱(Letter Spacing)은 텍스트 블록 전체의 글자 간격을 균일하게 조정하는 것이다.`,
      description: `대형 제목(Display Text)에서는 자간을 약간 줄여(-0.02~-0.05em) 글자들이 뭉쳐 보이는 시각적 단단함을 만들고, 소형 텍스트나 전체 대문자(All Caps) 텍스트에서는 자간을 늘려(+0.05~+0.1em) 가독성을 높인다. 과도하게 넓은 자간은 텍스트를 파편화시켜 읽기 어렵게 만들고, 과도하게 좁은 자간은 글자들이 뭉쳐 보여 구분하기 어렵다.`,
      usage: `브랜드 로고 타입에 자간 -0.03em을 적용하여 글자가 시각적으로 결속된 느낌을 주고, 내비게이션 메뉴의 대문자 레이블에는 자간 +0.08em을 적용하여 소형 크기에서의 가독성을 높인다.`,
      source: `Material Design 3, Apple HIG, Interaction Design Foundation`
    },
  {
      english: `Illustration`,
      korean: `일러스트레이션`,
      category: `지각 심리`,
      definition: `UI 내에 사용되는 예술적·설명적 목적의 그래픽 이미지로, 빈 상태(Empty State), 온보딩, 에러 화면 등에서 텍스트만으로 전달하기 어려운 감정·맥락·브랜드 개성을 보완한다.`,
      description: `UI 일러스트레이션은 순수 예술과 달리 기능적 목적을 가진다. 빈 상태 화면에서 '아직 콘텐츠가 없습니다'를 텍스트만으로 표현하는 것보다 관련 일러스트를 함께 사용하면 사용자의 실망감을 줄이고 다음 행동을 안내하는 데 효과적이다. 일러스트 스타일(플랫, 아이소메트릭, 3D, 라인아트 등)과 색상은 브랜드의 성격과 일치해야 하며, 과도한 사용은 콘텐츠의 신뢰성을 낮출 수 있다.`,
      usage: `할 일 목록 앱에서 완료된 항목이 없는 초기 상태(Empty State)에 캐릭터가 체크리스트를 들고 있는 플랫 일러스트와 '오늘의 첫 번째 할 일을 추가해보세요' 메시지를 함께 배치하여 사용자의 다음 행동을 자연스럽게 유도한다.`,
      source: `Nielsen Norman Group, Apple HIG, Material Design 3`
    },
  {
      english: `Data Visualization`,
      korean: `데이터 시각화`,
      category: `지각 심리`,
      definition: `복잡한 데이터 집합을 차트, 그래프, 지도, 다이어그램 등 시각적 형식으로 표현하여 패턴·추세·인사이트를 빠르게 파악할 수 있도록 하는 UX 분야다.`,
      description: `효과적인 데이터 시각화는 적절한 차트 유형 선택이 핵심이다. 시간에 따른 변화에는 라인 차트, 카테고리 비교에는 바 차트, 부분-전체 관계에는 파이/도넛 차트, 두 변수의 상관관계에는 산점도가 적합하다. Edward Tufte의 '데이터-잉크 비율(Data-Ink Ratio)' 원칙에 따르면, 데이터 전달에 불필요한 시각적 요소(Chart Junk)는 제거하고 핵심 정보만 남겨야 한다.`,
      usage: `월별 매출 현황 대시보드에서 12개월 추이는 라인 차트로, 카테고리별 매출 비중은 도넛 차트로 표현하되, 각 데이터 포인트에 마우스 오버 시 수치가 나타나는 툴팁을 제공하여 정확한 값을 확인할 수 있게 한다.`,
      source: `Interaction Design Foundation, Nielsen Norman Group, W3C WCAG`
    },
  {
      english: `Hero Image`,
      korean: `히어로 이미지`,
      category: `지각 심리`,
      definition: `페이지 최상단에 전체 너비로 배치되는 대형 이미지 또는 시각 요소로, 서비스의 핵심 가치와 브랜드 아이덴티티를 첫인상으로 전달하는 역할을 한다.`,
      description: `히어로 이미지는 웹사이트·앱 랜딩 페이지에서 사용자의 첫 5초를 결정하는 요소다. 제품·사람·감성적 장면 등을 담아 서비스의 본질을 이미지 하나로 전달해야 한다. 히어로 이미지 위에 텍스트를 올릴 경우, 배경과의 명암비(WCAG 4.5:1 이상)를 확보하기 위해 오버레이·그라디언트·텍스트 배경을 사용해야 한다.`,
      usage: `여행 예약 서비스의 랜딩 페이지에서 아름다운 해변 사진을 히어로 이미지로 사용하고, 그 위에 반투명 어두운 오버레이를 적용하여 흰색 헤드라인 텍스트의 가독성을 확보한다.`,
      source: `Nielsen Norman Group, W3C WCAG`
    },
  {
      english: `Z-Pattern`,
      korean: `Z 패턴`,
      category: `지각 심리`,
      definition: `사용자의 시선이 콘텐츠가 적은 시각적으로 단순한 레이아웃(랜딩 페이지 등)에서 Z자 형태로 이동하는 시선 추적 패턴으로, 핵심 요소의 배치 위치를 결정하는 데 활용된다.`,
      description: `Z 패턴은 사용자가 왼쪽 상단에서 시작하여 오른쪽으로 이동하고(상단 가로선), 왼쪽 하단으로 대각선 이동 후(대각선), 다시 오른쪽으로 이동하는(하단 가로선) 시선 흐름이다. 이 패턴을 이해하면 로고(좌상단), CTA(우상단 또는 우하단), 지지 정보(대각선 중간)를 전략적으로 배치할 수 있다. 텍스트 콘텐츠가 많은 긴 페이지에서는 F 패턴이 더 일반적으로 나타난다.`,
      usage: `마케팅 랜딩 페이지에서 Z 패턴에 따라 좌상단에 브랜드 로고, 우상단에 로그인 버튼, 중앙에 핵심 가치 문구, 우하단에 '지금 시작하기' CTA를 배치하여 사용자의 자연스러운 시선 흐름과 행동 동선을 일치시킨다.`,
      source: `Nielsen Norman Group, Interaction Design Foundation`
    },
  {
      english: `F-Pattern`,
      korean: `F 패턴`,
      category: `지각 심리`,
      definition: `사용자가 텍스트가 많은 콘텐츠 페이지를 읽을 때 시선이 F자 형태(첫 줄 전체 → 두 번째 줄 일부 → 왼쪽 세로축)로 이동하는 패턴으로, Nielsen Norman Group의 아이트래킹 연구에서 도출되었다.`,
      description: `Nielsen Norman Group의 2006년(및 2017년 재연구) 아이트래킹 연구에 따르면, 사용자는 웹 콘텐츠를 읽을 때 첫 번째 줄은 거의 전부 읽고, 두 번째 줄은 절반 정도만, 이후에는 왼쪽 가장자리만 훑어보는 F 패턴을 보인다. 이 인사이트는 중요한 정보를 페이지 상단과 각 섹션의 왼쪽에 배치해야 한다는 레이아웃 원칙의 근거가 된다.`,
      usage: `뉴스 기사 목록 페이지를 설계할 때, F 패턴을 고려하여 각 기사의 제목을 좌측 정렬하고, 첫 번째·두 번째 기사의 요약문을 다른 기사보다 길게 제공하여 스캐닝하는 사용자의 시선을 유도한다.`,
      source: `Nielsen Norman Group`
    },
  {
      english: `Brand Identity`,
      korean: `브랜드 아이덴티티`,
      category: `지각 심리`,
      definition: `브랜드의 가치·성격·약속을 시각적으로 표현한 요소들의 집합으로, 로고·색상·타이포그래피·이미지 스타일·목소리(Tone of Voice)가 포함되며 사용자에게 일관된 인식을 형성한다.`,
      description: `강력한 브랜드 아이덴티티는 제품의 모든 터치포인트(앱, 웹, 마케팅, 패키징 등)에서 일관되게 표현되어야 한다. UI 설계에서 브랜드 아이덴티티는 색상 팔레트, 서체 선택, 컴포넌트의 모양(라운드 vs 각진), 모션의 특성 등을 통해 구현된다. IDEO와 Nielsen Norman Group에 따르면 일관된 브랜드 경험은 사용자 신뢰와 충성도에 직접적인 영향을 미친다.`,
      usage: `스타트업의 UI 개편 시, 브랜드 아이덴티티 가이드에 정의된 주요 색상(브랜드 블루 #005FDB), 서체(Pretendard), 아이콘 스타일(라운드 선형), 메시지 톤(친근하고 명확한 언어)을 디자인 시스템에 반영하여 모든 화면에서 일관된 브랜드 경험을 구현한다.`,
      source: `Interaction Design Foundation, Nielsen Norman Group, IDEO`
    },
  {
      english: `Mood Board`,
      korean: `무드보드`,
      category: `지각 심리`,
      definition: `프로젝트의 시각적 방향성과 감성을 정의하기 위해 이미지·색상·텍스처·서체·레퍼런스를 한 화면에 모아놓은 콜라주로, 팀 간 비전 정렬 도구로 활용된다.`,
      description: `무드보드는 디자인 작업을 시작하기 전에 클라이언트 또는 팀과 시각적 방향을 공유하고 합의를 이끌어내는 도구다. 언어로 설명하기 어려운 '느낌'과 '분위기'를 시각적으로 전달할 수 있어, 미스커뮤니케이션을 줄이는 데 효과적이다. 디지털 무드보드(Figma, Pinterest, Milanote 등)와 물리적 무드보드 모두 활용된다. 무드보드를 바탕으로 색상 팔레트, 타이포그래피, 이미지 스타일 등 실제 디자인 자산을 도출하는 과정으로 이어진다.`,
      usage: `프리미엄 건강 식품 앱 리브랜딩 프로젝트에서, '자연·청결·신뢰'의 키워드에 맞춰 초록/크림 계열 색상, 미니멀한 사진, 세리프 계열 서체 레퍼런스를 Figma에 모은 무드보드를 클라이언트에게 제시하여 시각 방향에 대한 합의를 먼저 구한 후 실제 디자인을 시작한다.`,
      source: `Interaction Design Foundation, IDEO`
    },
  {
      english: `Style Guide`,
      korean: `스타일 가이드`,
      category: `지각 심리`,
      definition: `제품의 시각적 디자인 규칙(색상, 서체, 아이콘, 간격 등)을 문서화한 레퍼런스로, 디자이너와 개발자가 일관된 UI를 구현하기 위한 지침서다.`,
      description: `스타일 가이드는 디자인 시스템보다 좁은 개념으로, 주로 시각적 스타일 규칙에 집중한다. 디자인 시스템이 컴포넌트, 패턴, 원칙까지 포함하는 포괄적 시스템이라면, 스타일 가이드는 색상·타이포그래피·간격·이미지 가이드라인 등의 시각 규칙을 문서화한 하위 집합이다. 스타일 가이드가 없으면 팀원마다 다른 색상 값을 사용하거나 서체 크기가 제각각이 되는 문제가 발생한다. 코드 스타일 가이드(ESLint 규칙 등)와 구별하기 위해 '비주얼 스타일 가이드(Visual Style Guide)'라고도 한다.`,
      usage: `디자인 팀이 증가함에 따라 Figma에서 색상 토큰, 타입 스케일, 아이콘 사용 규칙, 이미지 처리 기준을 문서화한 시각 스타일 가이드를 작성하여 새로운 팀원이 온보딩 첫날부터 일관된 방식으로 디자인할 수 있는 기준을 제공한다.`,
      source: `Nielsen Norman Group, Interaction Design Foundation`
    },
  {
      english: `Design Principles`,
      korean: `디자인 원칙`,
      category: `지각 심리`,
      definition: `제품의 디자인 의사결정을 안내하는 명확하고 행동 지향적인 가이드라인으로, 팀이 어려운 트레이드오프 상황에서 일관된 방향으로 판단할 수 있게 하는 나침반 역할을 한다.`,
      description: `좋은 디자인 원칙은 구체적이고 실천 가능해야 하며, '사용자를 위해 디자인하라'처럼 너무 일반적인 것은 지침으로 활용하기 어렵다. Apple HIG의 원칙(Aesthetic Integrity, Consistency, Direct Manipulation 등), Material Design의 원칙(Material is the Metaphor, Bold·Graphic·Intentional 등)이 대표적인 예다. 조직 내부 디자인 원칙은 서비스의 고유한 가치와 사용자에 대한 약속을 반영해야 한다. 디자인 원칙은 살아있는 문서로, 제품과 팀이 성장하며 정기적으로 검토하고 업데이트해야 한다.`,
      usage: `헬스케어 앱 디자인 원칙으로 '정확하고 명확하게(데이터는 항상 정확하고 오해 없이)', '신중하게 단순하게(복잡한 정보도 한 번에 하나씩)', '신뢰로 안내하라(전문가처럼 안내하되 강요하지 않는다)'를 정의하여 모든 UI 의사결정의 기준으로 활용한다.`,
      source: `Apple HIG, Material Design 3, Nielsen Norman Group, IDEO`
    },
  {
      english: `Visual Consistency`,
      korean: `시각적 일관성`,
      category: `지각 심리`,
      definition: `제품의 모든 화면에서 동일한 시각적 언어(색상, 서체, 간격, 컴포넌트 스타일)를 사용하여 사용자가 새로운 화면에서도 빠르게 인터페이스를 이해할 수 있게 하는 원칙이다.`,
      description: `Nielsen의 10가지 사용성 휴리스틱 중 '일관성과 표준(Consistency and Standards)'이 바로 이 원칙을 담고 있다. 시각적 일관성은 인지 부하를 줄이고 학습 효율을 높인다. 이미 익숙해진 패턴이 화면마다 다르면 사용자는 매번 새로 학습해야 하므로 불필요한 인지적 에너지를 소모한다. 디자인 시스템과 컴포넌트 라이브러리는 시각적 일관성을 체계적으로 달성하는 가장 효과적인 수단이다. 단, 일관성은 창의성을 죽이는 것이 아니라, 일관된 기반 위에서 의도적 변화를 줄 때 더 강력한 시각적 효과를 발휘한다.`,
      usage: `대규모 서비스 개편 시, 버튼의 모든 변형(Primary, Secondary, Destructive)을 동일한 크기·패딩·폰트 규칙으로 통일하여 어떤 화면에서 나타나더라도 사용자가 즉각 버튼으로 인식할 수 있도록 시각적 일관성을 확보한다.`,
      source: `Nielsen Norman Group, Interaction Design Foundation, Apple HIG`
    },
  {
      english: `Golden Ratio`,
      korean: `황금비`,
      category: `지각 심리`,
      definition: `약 1:1.618의 비율로, 자연과 예술에서 반복적으로 나타나는 조화로운 비율이다. UI 레이아웃, 타이포그래피 스케일, 컴포넌트 비율 설계에 참조 기준으로 활용된다.`,
      description: `황금비(φ = 1.6180...)는 피보나치 수열(1, 1, 2, 3, 5, 8, 13...)에서 인접한 두 수의 비율이 수렴하는 값으로, 자연에서 나뭇잎 배열, 소라 껍질 나선 등에서 발견된다. UI 디자인에서는 콘텐츠 영역과 사이드바의 너비 비율(약 61:38), 제목과 본문 폰트 크기 비율, 컨테이너 너비와 높이 비율 등에 활용된다. 황금비를 엄격히 따르는 것보다 조화로운 비율에 대한 감각을 키우는 출발점으로 이해하는 것이 실용적이다. 타입 스케일에서 1.618 배율을 사용하면 Major Third(1.25)나 Perfect Fourth(1.333)보다 큰 차이의 위계를 만들 수 있다.`,
      usage: `랜딩 페이지 레이아웃을 설계할 때, 전체 너비 1200px에서 주요 콘텐츠 영역을 740px(61.7%), 보조 영역을 460px(38.3%)로 나누어 황금비에 근접한 균형 잡힌 비율 구성을 적용한다.`,
      source: `Interaction Design Foundation, Nielsen Norman Group`
    },
  {
      english: `Rule of Thirds`,
      korean: `3분법`,
      category: `지각 심리`,
      definition: `화면이나 이미지를 가로·세로 3등분하는 9개의 격자로 나누고, 주요 시각 요소를 격자의 교차점이나 선 위에 배치하여 자연스럽고 역동적인 구성을 만드는 원리다.`,
      description: `원래 사진학과 회화에서 발전한 구성 원리로, UI 디자인에서는 히어로 섹션의 이미지 구도, 카드 내 텍스트 배치, 대시보드 레이아웃 구성 등에 응용된다. 주요 요소를 중앙에 정확히 배치하면 정적이고 지루한 느낌을 줄 수 있으며, 3분의 1 지점(교차점)에 배치하면 더 역동적이고 흥미로운 구도가 된다. 단, UI에서는 정보 전달의 명확성이 우선이므로, 구도의 역동성보다 가독성과 기능이 충돌할 경우 기능을 우선해야 한다.`,
      usage: `여행 앱의 목적지 카드에서 풍경 사진의 수평선을 하단 1/3 지점에 배치하고, 도시 이름 텍스트를 좌상단 1/3 교차점에 놓아 이미지와 텍스트가 자연스럽게 공존하는 역동적인 구도를 만든다.`,
      source: `Interaction Design Foundation, Nielsen Norman Group`
    },
  {
      english: `Optical Alignment`,
      korean: `시각적 정렬`,
      category: `지각 심리`,
      definition: `수학적으로 정확히 정렬된 요소가 시각적으로 불균형해 보이는 착시를 보정하여, 눈에 균형 잡혀 보이도록 미세하게 조정하는 디자인 기법이다.`,
      description: `원형 아이콘을 정사각형 아이콘과 동일한 크기로 만들면 원이 더 작아 보인다. 왜냐하면 원은 모서리가 없어 실제 면적이 같아도 시각적 무게가 덜하기 때문이다. 이런 경우 원형 요소를 수학적 중심보다 약간 더 크게 만들거나 위쪽으로 미세하게 이동시켜 눈에 동일하게 보이도록 보정한다. Apple SF Symbol, Google Material Icons 모두 아이콘별로 이 광학 보정이 적용되어 있다. 텍스트 버튼에서 상하 패딩이 동일해도 텍스트가 아래로 치우쳐 보이는 현상도 광학 보정으로 해결한다.`,
      usage: `원형 아바타 이미지(40px)를 정사각형 아이콘(40px)과 같은 행에 배치할 때, 원형 이미지를 42px로 약간 크게 설정하여 두 요소가 시각적으로 같은 크기로 인식되도록 광학 보정을 적용한다.`,
      source: `Apple HIG, Interaction Design Foundation`
    },
  {
      english: `Skeuomorphism`,
      korean: `스큐어모피즘`,
      category: `지각 심리`,
      definition: `디지털 UI 요소를 현실 세계의 물리적 사물처럼 보이게 질감·그림자·입체감을 모방하여 설계하는 디자인 스타일로, 초기 스마트폰 시대(2007~2013)에 지배적이었다.`,
      description: `스큐어모피즘은 사용자가 디지털 기기에 익숙하지 않던 시기에 '이것이 노트다', '이것이 달력이다'라는 것을 직관적으로 전달하기 위해 실제 물체의 외형을 모방하는 방식이었다. iOS 7(2013)의 플랫 디자인 전환이 대표적인 변곡점이다. 오늘날에는 뉴모피즘(Neumorphism)과 같이 현실감의 요소를 부분적으로 가져오는 방식으로 재해석되기도 한다. 스큐어모피즘의 한계는 복잡한 질감이 소형 화면에서 가독성을 해치고, 스타일 업데이트가 어려우며, 다양한 화면 해상도에 대응하기 불편하다는 점이다.`,
      usage: `초기 iOS의 '메모(Notes)' 앱이 실제 노란색 줄 공책처럼 디자인되고, '캘린더' 앱이 실제 탁상 달력처럼 가죽 질감을 사용한 것이 스큐어모피즘의 대표 사례다.`,
      source: `Nielsen Norman Group, Interaction Design Foundation, Apple HIG`
    },
  {
      english: `Flat Design`,
      korean: `플랫 디자인`,
      category: `지각 심리`,
      definition: `그림자·그라디언트·질감 등 3차원 효과를 제거하고 단순한 2D 형태, 밝고 단색의 색상, 깔끔한 타이포그래피로 구성하는 미니멀리스트 디자인 스타일이다.`,
      description: `플랫 디자인은 Microsoft의 Metro UI(2010), Apple iOS 7(2013)의 리디자인을 통해 주류가 되었다. 스큐어모피즘에 대한 반동으로 등장했으며, 빠른 로딩, 반응형 대응 용이성, 다양한 해상도에서의 선명함이 장점이다. 그러나 순수 플랫 디자인은 어떤 요소가 클릭 가능한지 구분하기 어려운 '어포던스 부재' 문제가 지적되어, 이후 미세한 그림자와 깊이감을 부분적으로 도입한 'Flat 2.0(Semi-Flat)'으로 발전했다. Material Design은 플랫 디자인의 원칙 위에 엘리베이션(Elevation) 개념을 추가하여 기능과 미학의 균형을 맞춘 대표적인 결과물이다.`,
      usage: `Google의 G Suite(현 Google Workspace) 아이콘 리디자인(2020)에서 이전의 사실적 3D 아이콘을 단순화된 플랫 스타일로 전환하여 다양한 크기와 배경에서 일관된 가독성을 확보한 것이 플랫 디자인 적용 사례다.`,

  {
      english: `Neumorphism`,

      category: `지각 심리`,
      definition: `배경과 동일한 색상의 요소에 빛의 방향에 따라 밝은 그림자와 어두운 그림자를 함께 적용하여 요소가 표면에서 돌출되거나 함몰된 것처럼 보이게 하는 소프트 UI 디자인 스타일이다.`,
      description: `뉴모피즘(New + Skeuomorphism의 합성어)은 2019년 말 Dribbble 커뮤니티에서 주목받기 시작한 디자인 트렌드다. 섬세하고 부드러운 심미적 표현은 강점이지만, 버튼과 배경의 명암비 차이가 낮아 WCAG 접근성 기준을 충족하기 어렵고, 어떤 요소가 누를 수 있는지 구분하기 어렵다는 사용성 한계가 있다. 이런 이유로 뉴모피즘은 실제 프로덕션보다 포트폴리오·컨셉 디자인에서 주로 볼 수 있다. 접근성과 사용성을 고려하면 뉴모피즘을 전면 적용하기보다 특정 요소의 장식적 표현에 제한적으로 사용하는 것이 권장된다.`,
      usage: `음악 플레이어 앱의 컨셉 디자인에서 재생 버튼을 배경색(#E0E5EC)과 동일한 색상으로 만들고, 좌상단에 밝은 그림자(#FFFFFF), 우하단에 어두운 그림자(#A3B1C6)를 적용하여 버튼이 표면에서 볼록하게 돌출된 것처럼 표현한다.`,

    },
  {

      description: `글래스모피즘은 Apple macOS Big Sur(2020)의 메뉴바·사이드바 스타일에서 대중화된 트렌드로, 배경의 콘텐츠가 비쳐 보이는 특성상 배경이 역동적이거나 색상이 풍부할 때 더 효과적이다. 접근성 측면에서 배경이 복잡하면 전경 텍스트의 가독성이 떨어질 수 있으므로, 글래스 패널의 불투명도와 텍스트 색상의 명암비를 주의 깊게 관리해야 한다. iOS의 Sheet, Alert, 알림 센터 등 Apple 생태계 전반에서 공식적으로 사용되는 표현 기법이기도 하다.`,

  {
      english: `Gradient`,
      korean: `그라디언트`,
      category: `지각 심리`,
      definition: `하나 이상의 색상이 다른 색상으로 점진적으로 전환되는 시각 효과로, 배경·버튼·일러스트레이션 등에 깊이감, 역동성, 시각적 흥미를 부여하는 데 사용된다.`,
      description: `그라디언트는 선형(Linear), 방사형(Radial), 각도형(Conic), 메시(Mesh) 등 다양한 유형이 있다. 플랫 디자인의 부상으로 한때 사용이 줄었지만, Instagram 로고 리디자인(2016) 이후 생동감 있는 그라디언트가 다시 주목받았다. 그라디언트 사용 시 시작색과 끝색 모두에서 텍스트 명암비(WCAG 4.5:1)를 만족하는지 확인해야 한다. '그레이언트(Graident)' 또는 '데드존'이라 불리는 중간 지점에서 갑자기 탁해 보이는 문제를 방지하려면 중간 색상 포인트를 추가하거나 HSL 색공간으로 보간해야 한다.`,
      usage: `CTA 버튼에 브랜드 색상에서 보색 방향으로 15도 이동한 색상으로의 선형 그라디언트를 적용하고, 호버(Hover) 시 그라디언트 방향을 반전하여 역동적인 인터랙션 피드백을 제공한다.`,

      description: `Material Design은 물리 세계의 재료(Material)에서 영감을 받아, UI 요소들이 서로 다른 높이에 떠 있는 종이 시트처럼 동작한다고 정의한다. 엘리베이션이 높을수록 더 진한 그림자가 생기며 앞에 위치한 것처럼 보인다. Material Design 3에서는 라이트 모드에서 그림자로, 다크 모드에서는 표면 색상의 밝기 증가로 엘리베이션을 표현한다(dp 0~5 단계).`,

  {
      english: `Semantic Color`,

      definition: `화면 단위 면적에 표시되는 정보의 양으로, 여백·폰트 크기·행 간격을 조절하여 사용 맥락(전문가 도구 vs 소비자 앱)에 맞는 최적의 정보 밀도를 설계하는 개념이다.`,
      description: `콘텐츠 밀도는 사용자 타입과 사용 맥락에 따라 다르게 설계해야 한다. 데이터 분석 도구나 거래 플랫폼처럼 전문가가 많은 정보를 빠르게 훑어야 하는 경우에는 높은 밀도(Compact)가 유리하고, 쇼핑·미디어 앱처럼 감성적 경험이 중요한 경우에는 낮은 밀도(Comfortable)와 여백이 더 효과적이다.`,

function catClass(cat) {
  return cat.replace(/ /g, '-').replace(/&/g, 'and');
}

let currentCat = "전체";
let currentQuery = "";
let openIndex = -1;

function formatDesc(text) {
  // Split on sentence endings followed by a space and uppercase/Korean next sentence
  return text.replace(/([다됩니다요죠습니다]+\.) (?=\S)/g, '$1<br>');
}

function highlight(text, query) {
  if (!query) return text;
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(escaped, 'gi'), m => `<mark>${m}</mark>`);
}

  return TERMS.filter((t, i) => {
    if (currentQuery) {
      const q = currentQuery.toLowerCase();
      return t.english.toLowerCase().includes(q) ||
             t.korean.toLowerCase().includes(q) ||
             t.definition.toLowerCase().includes(q);
    }
    return currentCat === "전체" || t.category === currentCat;
  });
}

function render() {
  const filtered = getFiltered();
  const list = document.getElementById('termList');
  const stats = document.getElementById('statsText');
  
  stats.innerHTML = `총 <span class="stats-count">${filtered.length}</span>개 용어`;
  
  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state"><h3>검색 결과 없음</h3><p>'${currentQuery}'에 해당하는 용어를 찾을 수 없습니다.</p></div>`;
    return;
  }

  list.innerHTML = filtered.map((t, i) => {
    const cfg = CATEGORY_CONFIG[t.category] || {};
    const cls = catClass(t.category);
    const q = currentQuery;
    return `<div class="card card-${cls}" data-idx="${i}">
      <div class="card-header" onclick="toggleCard(${i})">
        <div class="card-header-top">
          <div class="card-main">
            <div class="card-badge-row">
              <span class="badge badge-${cls}" style="background:${cfg.badgeBg};color:${cfg.badgeText}">${t.category}</span>
            </div>
            <div class="card-english">${highlight(t.english, q)}</div>
            <div class="card-korean">${highlight(t.korean, q)}</div>
          </div>
          <span class="card-chevron">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="m6 9 6 6 6-6"/>
            </svg>
          </span>
        </div>
        <div class="card-definition">${highlight(t.definition, q)}</div>
      </div>
      <div class="card-body">
        <div class="card-body-inner">
          <div class="detail-section">
            <div class="detail-text">${formatDesc(t.description)}</div>
          </div>
          <div class="detail-section">
            <div class="detail-usage">
              <span class="detail-usage-label">사용 예시</span>
              ${t.usage}
            </div>
          </div>
          <div class="detail-source">출처: ${t.source}</div>
        </div>
      </div>
    </div>`;
  }).join('');

  // Restore open card without animation after re-render
  if (openIndex !== -1) {
    const card = [...document.querySelectorAll('.card')].find(c => c.dataset.idx == openIndex);
    if (card) {
      card.classList.add('open');
      const body = card.querySelector('.card-body');
      body.classList.add('is-open');
      body.style.height = 'auto';
    }
  }
}

function animateBody(body, opening) {
  if (opening) {
    body.style.height = '0';
    body.classList.add('is-open');
    requestAnimationFrame(() => {
      const h = body.scrollHeight;
      body.style.height = h + 'px';
      body.addEventListener('transitionend', function handler() {
        body.style.height = 'auto';
        body.removeEventListener('transitionend', handler);
      });
    });
  } else {
    body.classList.remove('is-open');
    body.style.height = body.scrollHeight + 'px';
    requestAnimationFrame(() => {
      requestAnimationFrame(() => { body.style.height = '0'; });
    });
  }
}

function toggleCard(i) {
  const isOpening = openIndex !== i;
  const prevIndex = openIndex;
  openIndex = isOpening ? i : -1;

  // Close previously open card
  if (prevIndex !== -1 && prevIndex !== i) {
    const prevCards = document.querySelectorAll('.card');
    const prevCard = [...prevCards].find(c => c.dataset.idx == prevIndex);
    if (prevCard) {
      prevCard.classList.remove('open');
      animateBody(prevCard.querySelector('.card-body'), false);
    }
  }

  // Toggle clicked card
  const cards = document.querySelectorAll('.card');
  const card = [...cards].find(c => c.dataset.idx == i);
  if (!card) return;

  if (isOpening) {
    card.classList.add('open');
    animateBody(card.querySelector('.card-body'), true);
    setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 300);
  } else {
    card.classList.remove('open');
    animateBody(card.querySelector('.card-body'), false);
  }
}

const tabsWrap = document.querySelector('.tabs-wrap');

function setActiveTab(cat) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const activeTab = document.querySelector(`.tab[data-cat="${cat}"]`);
  if (activeTab) {
    activeTab.classList.add('active');
    activeTab.scrollIntoView({ inline: 'nearest', block: 'nearest' });
  }
}

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    currentCat = tab.dataset.cat;
    setActiveTab(currentCat);
    openIndex = -1;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
});

// Search
const searchInput = document.getElementById('searchInput');
const searchWrap = searchInput.closest('.search-wrap');
const searchClear = document.getElementById('searchClear');
let prevCat = currentCat;

function applySearch(query) {
  if (query && !currentQuery) {
    prevCat = currentCat;
    tabsWrap.classList.add('hidden');
  } else if (!query && currentQuery) {
    tabsWrap.classList.remove('hidden');
    currentCat = prevCat;
    setActiveTab(currentCat);
  }
  currentQuery = query;
  searchWrap.classList.toggle('has-value', !!query);
  openIndex = -1;
  render();
}

searchInput.addEventListener('input', e => applySearch(e.target.value.trim()));

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchInput.focus();
  applySearch('');
});

render();
</script>
</body>
</html>
