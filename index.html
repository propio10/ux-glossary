<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UX 용어 사전</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #FAFAFA;
  --surface: #FFFFFF;
  --text: #09090B;
  --text-muted: #71717A;
  --border: #E4E4E7;
  --radius: 6px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
  word-break: keep-all;
  overflow-wrap: break-word;
}

/* ── STICKY TOP WRAPPER ── */
.sticky-top {
  position: sticky;
  top: 0;
  z-index: 50;
}

/* ── HEADER ── */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  box-shadow: 0 1px 3px rgba(0,0,0,.06);
  padding: 14px 16px;
}
.header-inner {
  max-width: 768px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.header-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -.3px;
}
.header-title span {
  font-weight: 400;
  color: var(--text-muted);
  font-size: 14px;
  margin-left: 4px;
}
.search-wrap {
  position: relative;
}
.search-icon {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  pointer-events: none;
  display: flex;
  align-items: center;
}
.search-input {
  width: 100%;
  height: 38px;
  padding: 0 36px 0 34px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg);
  font-family: var(--font);
  font-size: 14px;
  color: var(--text);
  outline: none;
  transition: border-color .15s, box-shadow .15s;
  -webkit-appearance: none;
  appearance: none;
}
.search-input::-webkit-search-cancel-button { display: none; }
.search-input:focus {
  border-color: #A1A1AA;
  box-shadow: 0 0 0 2px rgba(0,0,0,.06);
}
.search-input::placeholder { color: var(--text-muted); }
.search-clear {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: #A1A1AA;
  border: none;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background .15s;
}
.search-clear:hover { background: #71717A; }
.search-clear svg { display: block; }
.search-wrap.has-value .search-clear { display: flex; }

@media (min-width: 640px) {
  .header-inner {
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
  }
  .search-wrap { width: 260px; flex-shrink: 0; }
}

/* ── TABS ── */
.tabs-wrap {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  overflow: hidden;
  max-height: 48px;
  transition: max-height 0.25s ease, border-color 0.25s ease;
}
.tabs-wrap.hidden {
  max-height: 0;
  border-bottom-color: transparent;
}
.tabs-scroll {
  max-width: 768px;
  margin: 0 auto;
  display: flex;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
  padding: 0 16px;
  gap: 2px;
}
.tabs-scroll::-webkit-scrollbar { display: none; }

.tab {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 10px 12px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  font-family: var(--font);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color .15s, background .15s, border-color .15s;
  white-space: nowrap;
}
.tab:hover { color: var(--text); background: #F4F4F5; }
.tab.active {
  color: var(--text);
  border-bottom-color: var(--text);
  background: #F4F4F5;
}
.tab-count {
  font-size: 11px;
  font-weight: 500;
  padding: 1px 6px;
  border-radius: 999px;
  background: #F4F4F5;
  color: var(--text-muted);
  transition: background .15s, color .15s;
}
.tab.active .tab-count {
  background: #E4E4E7;
  color: var(--text);
}

  .badge-리서치-and-방법론 { background: #F5F3FF; color: #6D28D9; }
  .tab-리서치-and-방법론.active { background: #EDE9FE; color: #5B21B6; border-bottom-color: #7C3AED; }
  .tab-리서치-and-방법론.active .tab-count { background: #F5F3FF; color: #6D28D9; }
  .card-리서치-and-방법론 .card-accent { background: #7C3AED; }
  .badge-레이아웃-and-구조 { background: #EFF6FF; color: #1D4ED8; }
  .tab-레이아웃-and-구조.active { background: #DBEAFE; color: #1E40AF; border-bottom-color: #2563EB; }
  .tab-레이아웃-and-구조.active .tab-count { background: #EFF6FF; color: #1D4ED8; }
  .card-레이아웃-and-구조 .card-accent { background: #2563EB; }
  .badge-컴포넌트-and-UI-패턴 { background: #F0FDF4; color: #15803D; }
  .tab-컴포넌트-and-UI-패턴.active { background: #DCFCE7; color: #166534; border-bottom-color: #16A34A; }
  .tab-컴포넌트-and-UI-패턴.active .tab-count { background: #F0FDF4; color: #15803D; }
  .card-컴포넌트-and-UI-패턴 .card-accent { background: #16A34A; }
  .badge-인터랙션-and-제스처 { background: #FFF7ED; color: #C2410C; }
  .tab-인터랙션-and-제스처.active { background: #FFEDD5; color: #9A3412; border-bottom-color: #EA580C; }
  .tab-인터랙션-and-제스처.active .tab-count { background: #FFF7ED; color: #C2410C; }
  .card-인터랙션-and-제스처 .card-accent { background: #EA580C; }
  .badge-모션-and-애니메이션 { background: #FDF2F8; color: #9D174D; }
  .tab-모션-and-애니메이션.active { background: #FCE7F3; color: #831843; border-bottom-color: #DB2777; }
  .tab-모션-and-애니메이션.active .tab-count { background: #FDF2F8; color: #9D174D; }
  .card-모션-and-애니메이션 .card-accent { background: #DB2777; }
  .badge-접근성-and-표준 { background: #F0FDFA; color: #0F766E; }
  .tab-접근성-and-표준.active { background: #CCFBF1; color: #115E59; border-bottom-color: #0D9488; }
  .tab-접근성-and-표준.active .tab-count { background: #F0FDFA; color: #0F766E; }
  .card-접근성-and-표준 .card-accent { background: #0D9488; }
  .badge-지각-심리 { background: #FFFBEB; color: #92400E; }
  .tab-지각-심리.active { background: #FEF3C7; color: #78350F; border-bottom-color: #D97706; }
  .tab-지각-심리.active .tab-count { background: #FFFBEB; color: #92400E; }
  .card-지각-심리 .card-accent { background: #D97706; }

/* ── MAIN ── */
.main {
  max-width: 768px;
  margin: 0 auto;
  padding: 16px 16px 40px;
}

/* ── STATS BAR ── */
.stats-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
  font-size: 13px;
  color: var(--text-muted);
}
.stats-count { font-weight: 500; color: var(--text); }

/* ── CARDS ── */
.term-list {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 1px 2px rgba(0,0,0,.04);
  transition: box-shadow .15s, border-color .15s;
}
.card:hover { box-shadow: 0 2px 6px rgba(0,0,0,.08); border-color: #D4D4D8; }

.card-header {
  display: flex;
  flex-direction: column;
  padding: 14px 16px;
  cursor: pointer;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.card-header-top {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 10px;
}
.card-main { flex: 1; min-width: 0; }

.card-badge-row {
  margin-bottom: 6px;
}
.badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 500;
  white-space: nowrap;
}
.card-english {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 1px;
  padding-left: 4px;
}
.card-korean {
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  padding-left: 4px;
}
.card-definition {
  font-size: 13px;
  color: #52525B;
  line-height: 1.6;
  background: #F4F4F5;
  border-radius: 6px;
  padding: 10px 12px;
}
.card-chevron {
  color: #3F3F46;
  flex-shrink: 0;
  margin-top: 4px;
  transition: transform .3s cubic-bezier(.4,0,.2,1);
  display: flex;
  align-items: center;
}
.card.open .card-chevron { transform: rotate(180deg); }

/* ── ACCORDION BODY ── */
.card-body {
  height: 0;
  overflow: hidden;
  opacity: 0;
  transition: height .28s cubic-bezier(.4,0,.2,1), opacity .2s ease;
}
.card-body.is-open {
  opacity: 1;
  transition: height .28s cubic-bezier(.2,0,.2,1), opacity .22s ease .04s;
}

.card-body-inner {
  border-top: 1px solid var(--border);
  padding: 16px 16px 14px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.detail-section { display: flex; flex-direction: column; gap: 5px; }
.detail-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .05em;
  color: var(--text-muted);
}
.detail-text {
  font-size: 13px;
  line-height: 1.65;
  color: #3F3F46;
  padding-left: 4px;
}
.detail-usage {
  background: #F4F4F5;
  border-radius: var(--radius);
  padding: 10px 12px;
  font-size: 13px;
  line-height: 1.65;
  color: #3F3F46;
  border-left: 3px solid #D4D4D8;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.detail-usage-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .05em;
  color: var(--text-muted);
}
.detail-source {
  font-size: 11px;
  color: var(--text-muted);
  font-style: italic;
  padding-top: 2px;
  border-top: 1px solid var(--border);
}

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}
.empty-state h3 { font-size: 15px; font-weight: 500; margin-bottom: 6px; color: var(--text); }
.empty-state p { font-size: 13px; }

/* ── SEARCH HIGHLIGHT ── */
mark {
  background: #FEF08A;
  color: inherit;
  border-radius: 2px;
  padding: 0 1px;
}

/* ── FOOTER ── */
.footer {
  border-top: 1px solid var(--border);
  padding: 28px 16px;
  text-align: center;
}
.footer-inner {
  max-width: 768px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.footer-count { font-size: 13px; color: #52525B; }
.footer-sources { font-size: 12px; color: var(--text-muted); line-height: 1.6; }
.footer-copy { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
</style>
</head>

<script>
const TERMS = [
  {
      english: `User Research`,
      korean: `사용자 리서치`,
      category: `리서치 & 방법론`,
      definition: `디자인 의사결정을 돕기 위해 실제 사용자의 행동, 니즈, 동기, 목표를 체계적으로 수집·분석하는 연구 활동의 총칭이다.`,
      description: `사용자 리서치는 생성적 리서치(문제 발견·니즈 탐색)와 평가적 리서치(디자인 검증·문제 확인)로 크게 구분된다. 질적 리서치(인터뷰, 관찰)는 깊은 이해를, 양적 리서치(설문, 분석 데이터)는 규모와 통계적 유의미성을 제공하며, 두 방법을 혼합하면 더 풍부한 인사이트를 얻을 수 있다. 리서치 결과는 데이터에 그치지 않고 구체적인 디자인 의사결정으로 연결되어야 가치가 있다.`,
      usage: `신규 온보딩 플로우 리디자인을 위해 기존 사용자 10명을 인터뷰(생성적 리서치)하고, 분석 도구로 온보딩 이탈률 데이터를 수집(양적 리서치)하여 두 결과를 종합해 개선 방향을 도출한다.`,
      source: `Nielsen Norman Group, Interaction Design Foundation`
    },
  {
      english: `Usability Testing`,
      korean: `사용성 테스트`,
      category: `리서치 & 방법론`,
      definition: `실제 사용자가 특정 태스크를 수행하는 모습을 관찰하여 인터페이스의 문제점을 발견하는 평가 방법이다.`,
      description: `사용성 테스트는 사용자가 제품을 실제로 어떻게 사용하는지 직접 관찰함으로써 인터뷰나 설문으로는 발견하기 어려운 실제 행동 기반의 문제를 찾아낸다. Nielsen Norman Group의 연구에 따르면 5명의 사용자로 테스트 시 발견 가능한 전체 문제의 약 80%를 찾을 수 있어, 소규모 테스트도 충분한 가치를 갖는다. 테스트 후에는 발견된 문제를 심각도(Severity Rating)에 따라 분류하여 우선순위 있는 개선 계획을 수립해야 한다.`,
      usage: `새로운 결제 플로우 프로토타입을 5명의 잠재 사용자에게 제시하고 '상품을 구매해주세요' 태스크를 수행하는 과정을 관찰하여 어느 단계에서 막히는지 파악한다.`,
      source: `Nielsen Norman Group`
    },
  {
      english: `A/B Testing`,
      korean: `A/B 테스트`,
      category: `리서치 & 방법론`,
      definition: `두 가지 이상의 디자인 변형을 실제 사용자에게 무작위로 노출하여 어떤 버전이 목표 지표에서 더 좋은 성과를 내는지 통계적으로 비교하는 방법이다.`,
      description: `A/B 테스트는 버튼 색상, 카피, 레이아웃, 기능 등 다양한 디자인 요소의 효과를 실제 사용 데이터로 검증할 수 있는 강력한 방법이다. 통계적으로 유의미한 결과를 얻으려면 충분한 샘플 수와 테스트 기간이 필요하며, 한 번에 하나의 변수만 바꾸는 것이 원칙이다. A/B 테스트는 '어느 것이 더 좋은가'를 알려주지만 '왜 더 좋은가'는 알려주지 않으므로, 질적 리서치와 함께 활용하면 더 깊은 인사이트를 얻을 수 있다.`,
      usage: `구매 전환율 향상을 위해 '구매하기'(기존)와 '지금 바로 구매'(변형)라는 CTA 버튼 텍스트를 50:50으로 사용자에게 노출하여 2주간 전환율을 비교한다.`,
      source: `Nielsen Norman Group, Google Design`
    },
  {
      english: `User Interview`,
      korean: `사용자 인터뷰`,
      category: `리서치 & 방법론`,
      definition: `연구자가 사용자와 1:1로 대화하며 경험, 니즈, 동기, 태도를 깊이 탐구하는 질적 리서치 방법이다.`,
      description: `사용자 인터뷰는 설문으로는 얻을 수 없는 맥락적 이해와 '왜'에 대한 깊은 통찰을 제공한다. 개방형 질문을 통해 사용자가 자신의 언어로 경험을 서술하게 하는 것이 핵심이며, 면접자는 중립적 태도를 유지하고 유도성 질문을 피해야 한다. 인터뷰는 과거 행동(실제 경험한 일)을 중심으로 질문하고, 미래 가정(만약 ~라면)보다는 실제 경험에 집중해야 한다.`,
      usage: `재구매율 향상을 위한 리서치로, 실제 재구매 고객 7명을 대상으로 '가장 최근에 다시 방문하게 된 계기가 무엇이었나요?'를 주제로 심층 인터뷰를 진행한다.`,
      source: `Nielsen Norman Group, Interaction Design Foundation`
    },
  {
      english: `Survey`,
      korean: `서베이`,
      category: `리서치 & 방법론`,
      definition: `구조화된 설문 문항을 통해 다수의 사용자로부터 의견, 태도, 행동 데이터를 수집하는 양적 리서치 방법이다.`,
      description: `설문조사는 많은 수의 응답을 비교적 저비용으로 수집할 수 있어 통계적 인사이트와 대표성 있는 데이터를 제공한다. 좋은 설문은 명확하고 중립적인 문항 작성, 적절한 응답 옵션 설계, 응답 편향(Bias) 최소화가 핵심이다. 리커트 척도(Likert Scale), 단일 선택, 복수 선택, 오픈 텍스트 등 다양한 문항 유형을 목적에 맞게 조합한다. 설문 길이가 길어질수록 완료율이 낮아지므로, 핵심 질문에 집중하고 5-10분 이내로 완료할 수 있는 분량이 권장된다.`,
      usage: `앱 업데이트 후 기존 사용자 1,000명에게 만족도 설문(5점 척도 + 개선 제안 주관식)을 발송하여 새 기능에 대한 전반적 반응과 주요 불만 사항을 수집한다.`,
      source: `Nielsen Norman Group, Interaction Design Foundation`
    },
  {
      english: `Task Analysis`,
      korean: `태스크 분석`,
      category: `리서치 & 방법론`,
      definition: `사용자가 특정 목표를 달성하기 위해 수행하는 일련의 행동과 단계를 체계적으로 분해하고 분석하는 방법이다.`,
      description: `태스크 분석은 계층적 태스크 분석(Hierarchical Task Analysis, HTA)이 가장 일반적인 방법으로, 최상위 목표에서 시작하여 세부 행동 단계로 분해하는 트리 구조로 표현한다. 사용자가 어떤 단계를 밟아 목표에 도달하는지, 각 단계에서 어떤 정보와 도구가 필요한지를 파악하여 UI가 이를 적절히 지원하는지 평가한다. 태스크 분석 결과는 정보 아키텍처, 내비게이션 흐름, 인터랙션 모델 설계에 직접적인 근거를 제공한다.`,
      usage: `온라인 뱅킹 앱의 '해외 송금' 기능을 태스크 분석하여 '수취인 정보 입력 → 금액 입력 → 환율 확인 → 수수료 확인 → 인증 → 완료 확인'의 6단계와 각 단계에 필요한 정보를 체계적으로 정리한다.`,
      source: `Nielsen Norman Group, Interaction Design Foundation`
    },
  {
      english: `Journey Map`,
      korean: `여정 지도`,
      category: `리서치 & 방법론`,
      definition: `사용자가 특정 목표를 달성하기 위해 거치는 전체 경험 여정을 단계별로 시각화한 다이어그램으로, 접점, 감정, 통증점을 종합적으로 표현한다.`,
      description: `여정 지도는 사용자의 경험을 시간 축에 따라 펼쳐 보여주며, 각 단계에서 사용자의 행동, 생각, 감정, 사용하는 채널, 통증점(Pain Point)을 포함한다. 리서치 데이터(인터뷰, 관찰)를 기반으로 작성해야 하며, 가정이나 추측만으로 만든 여정 지도는 오히려 잘못된 방향으로 이끌 수 있다. 현재 상태(As-Is)의 여정을 파악한 후 이상적인 미래 상태(To-Be) 여정을 디자인하는 방식으로 활용한다.`,
      usage: `호텔 예약 서비스의 여정 지도를 작성하여 '여행 계획 수립 → 옵션 검색 → 비교 → 예약 → 숙박 → 후기 작성' 각 단계에서 사용자의 감정 곡선과 주요 통증점을 시각화한다.`,
      source: `Nielsen Norman Group, Interaction Design Foundation`
    },
  {
      english: `Empathy Map`,
      korean: `공감 지도`,
      category: `리서치 & 방법론`,
      definition: `사용자가 무엇을 보고, 듣고, 생각하고, 말하고, 행동하는지를 네 개 사분면에 시각화하여 사용자 경험을 깊이 이해하도록 돕는 도구다.`,
      description: `공감 지도는 사용자 인터뷰나 관찰 데이터를 정리하여 팀 전체가 사용자 관점에서 공감대를 형성하는 데 활용된다. 전통적인 4분면 모델(보다/듣다/생각하다/말하다·행동하다) 모델이 널리 사용된다. 여러 사용자 유형의 공감 지도를 비교하면 다양한 사용자 그룹 간의 공통점과 차이점을 발견할 수 있다. 공감 지도는 퍼소나 생성 전 단계에서 사용자 데이터를 구조화하고 팀의 공통 이해를 형성하는 워크숍 도구로 특히 효과적이다.`,
      usage: `60대 이상 스마트폰 사용자 인터뷰 결과를 공감 지도로 정리하여 '보다(작은 글씨가 보이지 않는다)', '듣다(주변에서 앱 사용법을 알려준다)', '통증(버튼을 잘못 눌러 삭제되는 것에 대한 두려움)'을 팀과 공유한다.`,
      source: `Nielsen Norman Group, Interaction Design Foundation`
    },
  {
      english: `Persona`,
      korean: `퍼소나`,
      category: `리서치 & 방법론`,
      definition: `리서치 데이터를 기반으로 실제 사용자 유형을 대표하는 가상의 구체적인 사용자 프로필을 만들어 설계에 활용하는 방법론이다.`,
      description: `퍼소나는 Alan Cooper가 소프트웨어 설계를 위한 도구로 대중화했으며, 이름, 나이, 직업, 목표, 불만, 행동 패턴, 기술 수준 등을 포함하는 구체적인 사용자 캐릭터다. 리서치 데이터 없이 팀의 가정으로 만든 '허구의 퍼소나'는 잘못된 설계 결정으로 이어질 수 있으므로, 반드시 실제 사용자 리서치를 기반으로 작성해야 한다. 프로젝트당 3-5개의 퍼소나를 정의하는 것이 일반적이며, Job Story나 JTBD와 결합하면 퍼소나가 단순 인구통계 프로필을 넘어 동기와 목표 중심의 더 유용한 도구가 된다.`,
      usage: `금융 앱 리디자인을 위해 인터뷰 데이터를 분석하여 '투자 초보자 직장인 수현(30대, 퇴직연금 관심 있음, 복잡한 UI에 불안감 느낌)', '주식 투자 경험자 민준(40대, 빠른 정보 접근 중시)' 두 가지 퍼소나를 정의한다.`,
      source: `Nielsen Norman Group, Interaction Design Foundation`
    },
  {
      english: `User Story`,
      korean: `유저 스토리`,
      category: `리서치 & 방법론`,
      definition: `사용자 관점에서 기능 요구사항을 간결하게 표현하는 방법으로, '나는 [사용자 유형]으로서, [목표] 달성을 위해 [기능]이 필요하다' 형식으로 작성된다.`,
      description: `유저 스토리는 애자일 개발 방법론에서 기능 요구사항을 사용자 중심으로 기술하는 표준 방식으로, 기술적 사양보다 사용자 가치와 목적에 집중한다. '나는 온라인 쇼핑객으로서, 결제 완료 후 이메일 영수증을 받고 싶다. 왜냐하면 구매 내역을 보관하고 싶기 때문이다'와 같이 사용자의 역할(Who), 원하는 것(What), 이유(Why)를 명시한다. JTBD와 달리 유저 스토리는 시스템이 수행해야 할 구체적인 기능 단위에 집중한다.`,
      usage: `'나는 자주 여행하는 비즈니스 여행객으로서, 항공편을 예약할 때 자주 사용하는 여행자 정보가 자동으로 채워지기를 원한다. 왜냐하면 매번 동일한 정보를 입력하는 것이 번거롭기 때문이다.'`,
      source: `Interaction Design Foundation, Nielsen Norman Group`
    },
  {
      english: `Job-to-be-Done (JTBD)`,
      korean: `완수해야 할 일`,
      category: `리서치 & 방법론`,
      definition: `사용자가 제품을 구매하거나 사용하는 근본적인 동기와 목적을 '해결해야 할 일(Job)'의 관점에서 이해하는 리서치 프레임워크다.`,
      description: `JTBD는 사람들은 제품 자체를 원하는 것이 아니라 특정 '일(Job)'을 완수하기 위해 제품을 '고용(Hire)'한다는 관점이다. '나는 드릴이 필요한 게 아니라 벽에 구멍이 필요하다'는 예시처럼, 실제 사용자 동기를 제품 기능이 아닌 목적 중심으로 파악한다. JTBD 인터뷰에서는 '어떤 상황에서, 어떤 이유로 이 제품을 처음 사용하게 되었나요?'와 같은 전환 사건(Switching Moment)에 집중하여 근본적인 동기를 탐색한다. 유저 스토리가 기능 레벨의 요구사항이라면, JTBD는 더 높은 수준의 동기와 목적을 다룬다.`,
      usage: `음악 스트리밍 앱의 JTBD 분석에서 사용자들이 '음악 청취'만이 아니라 '집중력 향상', '감정 상태 조절', '통근 시간 채우기' 등 다양한 일을 해결하기 위해 앱을 사용한다는 것을 발견하여 각 목적별 플레이리스트 기능을 강화한다.`,
      source: `Interaction Design Foundation, Nielsen Norman Group`
    },
  {
      english: `Design Sprint`,
      korean: `디자인 스프린트`,
      category: `리서치 & 방법론`,
      definition: `Google Ventures가 개발한 5일간의 집중 문제 해결 프로세스로, 문제 정의, 아이디어 발산, 프로토타입 제작, 사용자 테스트를 단기간에 압축하여 진행한다.`,
      description: `디자인 스프린트는 Google Ventures에서 개발한 프레임워크로, 방대한 시간과 비용 투자 없이 핵심 가정을 빠르게 검증할 수 있다. 월요일(문제 이해·지도 작성), 화요일(솔루션 스케치), 수요일(결정·스토리보드), 목요일(프로토타입), 금요일(사용자 테스트) 5일 과정으로 진행된다. 멀티 디시플리너리 팀(UX, 개발, 비즈니스, 마케팅)이 함께 참여하여 다양한 관점의 협업이 이루어진다. 스프린트 결과로 아이디어의 유효성을 빠르게 검증하여 전체 개발 방향을 결정하거나 수정할 수 있다.`,
      usage: `새로운 B2B SaaS 제품의 핵심 온보딩 플로우를 검증하기 위해 5일간 디자인 스프린트를 진행하여 금요일에 5명의 잠재 고객에게 프로토타입을 테스트하고 주요 UX 문제를 발견한다.`,
      source: `Google Design, Interaction Design Foundation`
    },
  {
      english: `Prototype`,
      korean: `프로토타입`,
      category: `리서치 & 방법론`,
      definition: `최종 완성 전 제품의 기능, 인터랙션, 레이아웃을 테스트하기 위한 시뮬레이션으로, 종이 스케치에서 인터랙티브 디지털 목업까지 다양한 충실도(Fidelity)로 제작된다.`,
      description: `프로토타입은 충실도에 따라 저충실도(Lo-Fi, 와이어프레임 수준), 중간 충실도(Mid-Fi), 고충실도(Hi-Fi, 최종 디자인과 유사)로 구분된다. 낮은 충실도의 프로토타입은 빠르게 제작하여 초기에 많은 아이디어를 검증하는 데 적합하고, 높은 충실도는 실제 사용성 테스트나 이해관계자 승인에 활용된다. '충실도를 높이는 것보다 빠르게 테스트하는 것'이 린(Lean) UX의 핵심 원칙으로, 프로토타입은 '배우기 위해 만드는 것'이다.`,

      source: `Nielsen Norman Group, Interaction Design Foundation`
    },
  {
      english: `Wireframe`,
      korean: `와이어프레임`,
      category: `리서치 & 방법론`,
      definition: `색상, 이미지, 세부 디자인 없이 UI의 레이아웃, 콘텐츠 구조, 기능 요소의 배치를 개략적으로 표현한 설계 도면이다.`,
      description: `와이어프레임은 디자인의 '골격'으로, 시각 디자인 세부 사항에 집중하기 전에 정보 계층과 레이아웃 구조를 빠르게 검토하고 합의하는 도구다. 낮은 충실도(손 스케치, 굵은 회색 박스)에서 높은 충실도(그레이스케일 디지털 와이어프레임)까지 다양한 형태로 제작된다. 와이어프레임 단계에서 레이아웃 구조와 콘텐츠 우선순위를 결정하면 비용이 많이 드는 시각 디자인이나 개발 단계에서의 수정을 줄일 수 있다.`,

    },
  {
      english: `Affinity Diagram`,
      korean: `어피니티 다이어그램`,
      category: `리서치 & 방법론`,
      definition: `리서치에서 수집한 대량의 정성적 데이터(인터뷰 메모, 관찰 기록 등)를 유사성에 따라 그룹화하여 패턴과 인사이트를 도출하는 분석 방법이다.`,
      description: `어피니티 다이어그램은 각각의 데이터 포인트를 포스트잇에 작성하고 팀이 함께 유사한 것들을 모아 클러스터를 형성하는 과정이다. 클러스터에 레이블을 붙이면 사용자 니즈, 행동 패턴, 통증점의 주요 테마가 자연스럽게 드러난다. 개별 데이터를 먼저 공유하고 그룹화는 나중에 하는 Bottom-Up 방식이 특징으로, 미리 정해진 카테고리에 데이터를 끼워 맞추는 편향을 방지한다.`,
      usage: `20명의 고객 인터뷰 결과 350개의 발언과 관찰 메모를 포스트잇으로 만들어 팀 워크숍에서 그룹화하고, '로딩 속도 불만', '온보딩 복잡성', '알림 과다' 등 7가지 주요 테마를 도출한다.`,
      source: `Nielsen Norman Group, Interaction Design Foundation`
    },
  {
      english: `Contextual Inquiry`,
      korean: `맥락 조사`,
      category: `리서치 & 방법론`,
      definition: `사용자가 실제로 일하거나 제품을 사용하는 자연스러운 환경에서 관찰하고 인터뷰하는 현장 중심의 질적 리서치 방법이다.`,
      description: `맥락 조사는 사용자가 일을 수행하는 실제 장소(직장, 집, 카페 등)에서 진행되므로, 실험실 테스트에서 나타나지 않는 실제 행동 맥락과 환경적 요인을 발견할 수 있다. 연구자와 사용자의 관계는 '도제(Apprenticeship)' 모델로, 연구자는 배우는 학생, 사용자는 전문가의 역할을 맡아 진행된다. 사용자가 당연하게 여겨 말하지 않는 암묵적 니즈(Tacit Needs)를 발견하는 데 특히 효과적이다. 맥락 조사는 시간과 비용이 많이 들지만, 현장의 풍부한 맥락을 직접 관찰한다는 점에서 다른 방법으로 대체하기 어려운 가치를 제공한다.`,
      usage: `창고 관리 앱 리디자인을 위해 연구자가 실제 창고 현장을 방문하여 직원이 재고를 관리하는 과정을 옆에서 관찰하고 즉각적인 질문을 통해 작업 흐름을 파악한다.`,
      source: `Nielsen Norman Group, Interaction Design Foundation`
    },
  {
      english: `Diary Study`,
      korean: `다이어리 스터디`,
      category: `리서치 & 방법론`,
      definition: `참가자가 일정 기간 동안 지정된 주제나 활동에 대해 자신의 경험을 일지(다이어리) 형태로 기록하는 장기 종단 리서치 방법이다.`,
      description: `다이어리 스터디는 1주에서 수개월에 걸친 기간 동안 사용자의 자연스러운 행동 변화, 반복 패턴, 감정적 경험을 포착하는 데 적합하다. 연구자가 직접 관찰할 수 없는 일상적 사용 패턴이나 시간 경과에 따른 경험 변화를 파악할 수 있는 장점이 있다. 참가자의 기록 충실도(Compliance Rate)를 높이기 위해 기록 양식을 간단하게 유지하고, 리마인더를 통한 참여 독려가 필요하다.`,
      usage: `헬스케어 앱의 지속 사용성 리서치를 위해 20명의 참가자에게 4주간 매일 앱 사용 후 간단한 경험 일지를 작성하도록 요청하여 시간에 따른 사용 패턴 변화를 분석한다.`,
      source: `Nielsen Norman Group, Interaction Design Foundation`
    },
  {
      english: `Heuristic Evaluation`,
      korean: `휴리스틱 평가`,
      category: `리서치 & 방법론`,
      definition: `UX 전문가가 Jakob Nielsen의 10가지 사용성 원칙(휴리스틱)을 기준으로 UI의 문제점을 체계적으로 평가하는 전문가 검토 방법이다.`,
      description: `휴리스틱 평가는 실제 사용자 참여 없이 3-5명의 UX 전문가가 독립적으로 인터페이스를 검토하여 사용성 문제를 발견하는 빠르고 경제적인 방법이다. Jakob Nielsen의 10가지 휴리스틱(시스템 상태 가시성, 실세계와의 일치, 사용자 제어와 자유, 일관성과 표준, 오류 예방 등)이 평가 기준으로 사용된다. 각 평가자가 독립적으로 검토한 후 결과를 통합하면 더 많은 문제를 발견할 수 있으며, 발견된 문제는 심각도(0-4)로 분류한다. 사용성 테스트를 보완하는 저비용 고효율 방법으로, 특히 프로젝트 초기 단계에서 명확한 문제를 빠르게 발견하는 데 효과적이다.`,
      usage: `모바일 뱅킹 앱의 새 버전 출시 전, UX 전문가 4명이 각자 닐슨의 10가지 휴리스틱을 기준으로 앱을 검토하고, 총 34개의 사용성 문제를 심각도별로 정리하여 우선순위 수정 목록을 작성한다.`,
      source: `Nielsen Norman Group`
    },
  {
      english: `Cognitive Walkthrough`,
      korean: `인지 워크스루`,
      category: `리서치 & 방법론`,
      definition: `전문가가 초보 사용자의 관점에서 특정 태스크를 단계별로 수행하며 인지적 장벽과 사용성 문제를 발견하는 평가 방법이다.`,
      description: `인지 워크스루는 사용자가 처음 제품을 접할 때 탐색적으로 인터페이스를 파악하는 방식을 시뮬레이션한다. 각 단계에서 '사용자가 다음에 무엇을 해야 하는지 알 수 있는가?', '수행 결과가 원하던 것인지 알 수 있는가?'라는 질문을 중심으로 분석한다. 태스크 흐름이 명확하게 정의된 경우에 특히 효과적이며, 내비게이션 구조와 UI 레이블의 명확성을 평가하는 데 적합하다.`,
      usage: `신규 사용자 온보딩 플로우를 평가하기 위해 UX 전문가가 '처음 사용자'의 관점으로 회원가입부터 첫 주요 기능 사용까지의 각 단계에서 진행에 필요한 시각적 단서가 충분한지 단계별로 검토한다.`,
      source: `Nielsen Norman Group, Interaction Design Foundation`
    },
  {
      english: `Card Sorting`,
      korean: `카드 소팅`,
      category: `리서치 & 방법론`,
      definition: `참가자가 콘텐츠 항목이 쓰인 카드를 직접 분류하게 하여 사용자의 멘탈 모델과 정보 구조에 대한 인식을 파악하는 리서치 방법이다.`,
      description: `카드 소팅은 정보 아키텍처(IA) 설계를 위한 핵심 리서치 방법으로, 열린 카드 소팅(사용자가 직접 그룹 이름 정의), 닫힌 카드 소팅(미리 정해진 카테고리에 분류), 하이브리드 세 가지 방식이 있다. 열린 카드 소팅은 카테고리 구조 설계 초기에, 닫힌 카드 소팅은 기존 카테고리 구조의 적절성 검증에 사용된다. 여러 참가자의 결과를 트리 다이어그램이나 유사도 매트릭스로 시각화하여 사용자들이 공통적으로 연관 짓는 콘텐츠 클러스터를 파악한다.`,
      usage: `기업 웹사이트 내비게이션 재설계를 위해 20명의 직원·잠재 고객에게 40개 페이지를 카드로 제공하여 자유롭게 그룹화하도록 요청하고, 그 결과로 새로운 메뉴 구조를 도출한다.`,
      source: `Nielsen Norman Group`
    },
  {
      english: `Tree Testing`,
      korean: `트리 테스트`,
      category: `리서치 & 방법론`,
      definition: `시각적 디자인 없이 텍스트로만 구성된 내비게이션 트리 구조에서 사용자가 특정 정보를 얼마나 쉽게 찾는지 평가하는 리서치 방법이다.`,
      description: `트리 테스트는 '역방향 카드 소팅'이라고도 불리며, 카드 소팅으로 설계한 정보 아키텍처가 실제로 사용자가 탐색하기 쉬운지 검증하는 데 사용된다. 참가자에게 내비게이션 트리 구조만 보여주고 '이 항목은 어디에 있을까요?'라는 태스크를 주어 탐색 경로를 기록한다. 결과에서 각 항목의 '성공률', '직접 성공률', '시간'을 분석하여 어떤 카테고리 레이블이나 구조가 혼란을 주는지 파악한다. 시각적 디자인 노이즈 없이 순수하게 정보 구조만을 평가하므로 IA 문제를 명확하게 진단할 수 있다.`,
      usage: `새롭게 설계한 15개 카테고리, 3단계 깊이의 쇼핑몰 내비게이션 구조를 30명의 사용자에게 트리 테스트하여 '겨울 패딩 점퍼는 어느 카테고리에 있을까요?' 등 10개 태스크의 성공률을 측정한다.`,
      source: `Nielsen Norman Group`
    },
  {
      english: `Eye Tracking`,
      korean: `아이 트래킹`,
      category: `리서치 & 방법론`,
      definition: `카메라와 적외선 센서를 사용하여 사용자의 시선이 화면에서 어디를 얼마나 오래 바라보는지 정밀하게 추적·기록하는 리서치 방법이다.`,
      description: `아이 트래킹은 사용자가 의식적으로 인식하지 못하는 자연스러운 시선 흐름을 객관적인 데이터로 제공하여, 어떤 요소가 주목을 받고 어떤 요소가 무시되는지 알 수 있다. 시선 고정(Fixation) 지점을 히트맵으로 시각화하거나, 시선 이동 경로(Scanpath)를 순서대로 표시하는 방식으로 결과를 분석한다. Nielsen Norman Group의 F-패턴, Z-패턴 연구는 아이 트래킹 데이터를 통해 사용자의 일반적인 웹 페이지 시선 이동 패턴을 발견한 대표적 사례다. 고가의 장비와 전문적인 설정이 필요하여 비용이 높지만, 최근 웹캠 기반 아이 트래킹 솔루션으로 접근 장벽이 낮아지고 있다.`,
      usage: `새로운 광고 배너 위치를 결정하기 위해 아이 트래킹을 활용하여 웹페이지에서 사용자의 시선이 가장 먼저, 가장 오래 머무는 위치를 파악하고 배너 최적 위치를 결정한다.`,
      source: `Nielsen Norman Group`
    },
  {
      english: `Click Tracking`,
      korean: `클릭 트래킹`,
      category: `리서치 & 방법론`,
      definition: `사용자가 웹페이지나 앱에서 클릭하거나 탭하는 위치를 기록·집계하여 인터랙션 패턴을 분석하는 행동 데이터 수집 방법이다.`,
      description: `클릭 트래킹은 어떤 UI 요소가 가장 많이 클릭되는지, 반대로 의도한 요소가 클릭되지 않는지를 데이터로 확인할 수 있게 해준다. 클릭 데이터를 히트맵으로 시각화하면 핫스팟(자주 클릭되는 영역)과 콜드스팟(무시되는 영역)을 직관적으로 파악할 수 있다. 클릭되지 않아야 할 영역(텍스트, 이미지 등)의 클릭률이 높다면 해당 요소가 클릭 가능한 것처럼 보이는 어포던스 문제가 있음을 시사한다.`,
      usage: `리뉴얼된 랜딩 페이지의 클릭 데이터를 분석하여, 실제 버튼이 아닌 배경 이미지에 클릭이 집중되는 패턴을 발견하고 해당 이미지에 링크를 추가하거나 디자인을 조정한다.`,
      source: `Nielsen Norman Group`
    },
  {
      english: `Heatmap`,
      korean: `히트맵`,
      category: `리서치 & 방법론`,
      definition: `클릭, 스크롤, 마우스 이동 등 사용자 행동 데이터를 색상 농도로 시각화하여 인터랙션 패턴을 직관적으로 보여주는 분석 도구다.`,
      description: `히트맵은 클릭 히트맵(어디를 클릭했는가), 스크롤 히트맵(어디까지 스크롤했는가), 마우스 이동 히트맵(어디를 맴돌았는가) 세 가지 주요 유형이 있다. 색상이 진한 영역(빨강, 오렌지)은 활동이 많은 곳, 색상이 옅은 영역(파랑, 녹색)은 활동이 적은 곳을 나타낸다. 스크롤 히트맵에서 70% 이하로 스크롤되는 지점을 발견했다면 그 위에 있는 '폴드 위'의 콘텐츠를 개선하여 더 많은 스크롤을 유도할 수 있다. 히트맵은 집계 데이터이므로 개별 사용자의 의도나 이유를 파악하는 데는 한계가 있으며, 세션 레코딩과 함께 사용하면 더 깊은 분석이 가능하다.`,
      usage: `랜딩 페이지 스크롤 히트맵 분석에서 60%의 사용자가 최초 스크롤 가능 위치에서 멈춘다는 것을 발견하여, 해당 위치에 더 강력한 가치 제안과 CTA를 배치하도록 디자인을 개선한다.`,
      source: `Nielsen Norman Group`
    },
  {
      english: `Session Recording`,
      korean: `세션 레코딩`,
      category: `리서치 & 방법론`,
      definition: `실제 사용자의 웹사이트 또는 앱 이용 세션을 동영상으로 기록하여 마우스 이동, 클릭, 스크롤, 입력 등 모든 인터랙션을 재생하여 분석하는 방법이다.`,
      description: `세션 레코딩은 히트맵이나 분석 지표로는 알 수 없는 개별 사용자의 구체적인 행동 흐름과 혼란 지점을 생생하게 파악할 수 있다. 사용자가 특정 단계에서 반복적으로 앞뒤를 왔다갔다하거나, 버튼을 여러 번 클릭하는 '분노 클릭(Rage Click)' 패턴 등을 발견하는 데 효과적이다. 개인정보 보호를 위해 비밀번호, 신용카드 번호 등 민감한 입력 데이터는 마스킹 처리가 필수다.`,
      usage: `결제 이탈률이 높은 결제 페이지의 세션 레코딩 50개를 분석하여, 배송비 정보가 최종 단계에서야 표시되는 것이 이탈의 주요 원인임을 발견한다.`,
      source: `Nielsen Norman Group`
    },
  {
      english: `Competitive Analysis`,
      korean: `경쟁사 분석`,
      category: `리서치 & 방법론`,
      definition: `동일한 사용자 문제를 해결하는 경쟁 제품 또는 유사 서비스의 UX를 체계적으로 분석하여 기회와 차별화 포인트를 도출하는 리서치 방법이다.`,
      description: `UX Competitive Analysis는 단순한 기능 비교를 넘어 플로우, 정보 아키텍처, 인터랙션 패턴, 언어, 온보딩 방식 등을 종합적으로 평가한다. 직접 경쟁사(동일 시장)와 간접 경쟁사(유사 사용자 니즈), 그리고 영감을 주는 베스트 프랙티스 사례(Best-in-class)를 모두 포함하는 것이 좋다. 결과물은 보통 비교 매트릭스 형태로 정리되며, 리서치 초기 단계에서 팀의 공통 맥락을 형성하는 데 효과적이다.`,
      usage: `새로운 음식 배달 앱을 설계하기 전, 배달의민족·요기요·쿠팡이츠의 주문 플로우를 각각 실제로 사용하며 단계별 UX를 문서화하고, 주소 입력·메뉴 탐색·결제 흐름에서 각 앱의 강점과 약점을 비교 매트릭스로 정리한다.`,
      source: `Nielsen Norman Group, Interaction Design Foundation`
    },
  {
      english: `Guerrilla Testing`,
      korean: `게릴라 테스트`,
      category: `리서치 & 방법론`,
      definition: `공식적인 리서치 환경 없이 카페, 도서관 등 공공장소에서 대상자를 즉석으로 섭외하여 빠르고 저비용으로 진행하는 비정형 사용성 테스트다.`,
      description: `Guerrilla Usability Testing은 시간과 예산이 제한된 상황에서 빠른 피드백이 필요할 때 유용하다. 5~10분 내의 짧은 태스크와 3~5개의 핵심 질문으로 구성하는 것이 일반적이다. 대상자 프로파일 통제가 어렵다는 단점이 있지만, '어떤 사용자도 이해하기 어려운 문제'를 빠르게 발견하는 데는 효과적이다. Nielsen의 '5명의 사용자로 85%의 사용성 문제 발견' 원칙과 함께 자주 인용되며, 린(Lean) UX 프로세스에서 많이 활용된다.`,
      usage: `새로운 온보딩 플로우 프로토타입을 가지고 사내 카페테리아에서 타 부서 동료 5명에게 5분씩 테스트를 요청하여, 정식 테스트 전에 명백한 혼란 지점을 수정한다.`,
      source: `Nielsen Norman Group, Interaction Design Foundation`
    },
  {
      english: `Think Aloud Protocol`,
      korean: `발화 사고법`,
      category: `리서치 & 방법론`,
      definition: `사용자가 태스크를 수행하면서 머릿속에 떠오르는 생각, 기대, 혼란을 실시간으로 말하도록 유도하는 사용성 테스트 기법이다.`,
      description: `Think Aloud Protocol은 사용자의 멘탈 모델을 직접 관찰할 수 있는 가장 효과적인 방법 중 하나다. 동시 발화(Concurrent Think Aloud)와 회상 발화(Retrospective Think Aloud) 두 가지 방식이 있으며, 동시 발화가 더 풍부한 인사이트를 제공한다. 진행자는 사용자가 막히거나 침묵할 때 '지금 어떤 생각을 하고 계세요?'라고 프롬프트할 수 있지만, 태스크 완수에 도움이 되는 힌트는 제공하지 않아야 한다. 발화 자체가 인지 부하를 높여 실제 행동에 영향을 줄 수 있다는 점도 고려해야 한다.`,
      usage: `신규 결제 플로우 테스트 시, 참가자에게 '생각나는 것을 모두 말해달라'고 요청하면 '여기서 다음 버튼을 눌러야 하나요, 아니면 그냥 스크롤하면 되나요?'처럼 인터페이스의 모호한 지점을 즉시 발견할 수 있다.`,
      source: `Nielsen Norman Group`
    },
  {
      english: `Quantitative Research`,
      korean: `정량 리서치`,
      category: `리서치 & 방법론`,
      definition: `수치화 가능한 데이터를 수집하고 통계적으로 분석하여 사용자 행동의 규모, 빈도, 패턴을 객관적으로 측정하는 리서치 방법론이다.`,
      description: `'얼마나 많은 사용자가', '얼마나 자주', '얼마나 빠르게'와 같은 질문에 답하는 데 적합하다. A/B 테스트, 설문, 앱 분석, 클릭 트래킹, 퍼널 분석이 대표적인 정량 리서치 방법이다. 정성 리서치(Qualitative Research)가 '왜'를 탐구한다면, 정량 리서치는 '무엇이', '얼마나'를 측정한다. 두 방법을 혼합한 Mixed Methods 접근이 가장 풍부한 인사이트를 제공한다. 통계적 유의성과 샘플 크기를 항상 고려해야 한다.`,
      usage: `앱 리뉴얼 후 Google Analytics와 Firebase로 DAU, 세션 길이, 화면별 이탈률을 측정하여 리뉴얼 전후 핵심 지표를 비교하고, 특정 화면의 이탈률이 40% 상승한 것을 발견하여 추가 정성 리서치 대상으로 선정한다.`,
      source: `Nielsen Norman Group, Interaction Design Foundation`
    },
  {
      english: `Information Architecture`,
      korean: `정보 아키텍처`,
      category: `리서치 & 방법론`,
      definition: `콘텐츠와 기능을 사용자가 쉽게 찾고 이해할 수 있도록 조직하고 레이블을 붙이며 구조화하는 설계 원칙이다.`,
      description: `정보 아키텍처(IA)는 조직 시스템, 레이블링 시스템, 내비게이션 시스템, 검색 시스템 네 가지 핵심 요소로 구성된다. 좋은 IA는 사용자의 멘탈 모델(Mental Model)과 일치하여 원하는 정보를 최소한의 클릭으로 찾을 수 있게 한다. 카드 소팅과 트리 테스트는 IA를 사용자 관점으로 설계하고 검증하는 핵심 리서치 방법이다. IA가 혼란스럽거나 사용자의 기대와 다르면 내비게이션 구조가 아무리 세련되어도 사용자는 원하는 내용을 찾지 못하게 된다.`,
      usage: `전자상거래 사이트에서 카드 소팅으로 300개 상품 카테고리를 사용자 관점으로 재분류하고, 트리 테스트로 새로운 IA 구조를 검증하여 상품 탐색 성공률을 65%에서 88%로 향상시킨다.`,
      source: `Nielsen Norman Group, Interaction Design Foundation`
    },
  {
      english: `Net Promoter Score (NPS)`,
      korean: `순 추천 지수`,
      category: `리서치 & 방법론`,
      definition: `'이 제품/서비스를 친구나 동료에게 추천할 가능성은 얼마나 됩니까?(0-10점)'라는 단일 질문으로 고객 충성도를 측정하는 지표다.`,
      description: `NPS는 Bain & Company의 Fred Reichheld가 2003년에 개발한 간단하면서 강력한 고객 충성도 측정 도구다. 9-10점 응답자는 추천자(Promoter), 7-8점은 소극적 만족자(Passive), 0-6점은 비추천자(Detractor)로 분류하며, NPS = 추천자% - 비추천자%로 계산한다. NPS는 -100에서 +100까지의 범위를 가지며, 50 이상이면 우수, 70 이상이면 매우 우수로 평가한다. NPS는 단일 지표의 한계가 있으므로 '왜 그 점수를 주셨나요?'라는 후속 오픈 질문과 함께 사용하여 구체적인 개선 방향을 파악하는 것이 중요하다.`,
      usage: `월간 활성 사용자에게 NPS 설문을 발송하여 7점을 준 사용자에게 '가장 아쉬운 점이 무엇인가요?'라는 후속 질문을 통해 만족도를 높일 구체적 개선 영역을 도출한다.`,
      source: `Nielsen Norman Group`
    },
  {
      english: `System Usability Scale (SUS)`,
      korean: `시스템 사용성 척도`,
      category: `리서치 & 방법론`,
      definition: `10개 문항의 표준화된 설문으로 시스템 전반의 사용성을 신뢰도 높게 측정하는 검증된 도구다.`,
      description: `SUS는 John Brooke이 1986년에 개발한 리커트 5점 척도 10문항 설문으로, 사용성 테스트 후 참가자가 짧은 시간 안에 완료할 수 있다. 홀수 번 문항은 긍정적, 짝수 번 문항은 부정적으로 작성되어 응답 편향을 방지하며, 0-100점으로 환산된 점수는 68점을 평균으로 본다. 70점 이상이면 수용 가능한 사용성, 85점 이상이면 우수한 수준으로 평가한다. SUS는 20개 언어로 번역되어 다양한 문화권과 시스템 유형에 적용할 수 있는 유연성이 특징이다.`,
      usage: `새로운 내부 업무 시스템 도입 전 프로토타입 사용성 테스트 후, 10명의 직원에게 SUS 설문을 완료하게 하여 총점 62점을 확인하고 기준(68점) 이하임을 근거로 개선 후 재테스트를 결정한다.`,
      source: `Nielsen Norman Group, Interaction Design Foundation`
    },
  {
      english: `Grid System`,
      korean: `그리드 시스템`,
      category: `레이아웃 & 구조`,
      definition: `UI 요소를 일관되고 정렬된 방식으로 배치하기 위한 수평·수직 가이드라인의 체계적인 집합이다.`,
      description: `그리드 시스템은 컬럼, 거터(Gutter), 마진으로 구성되며 레이아웃 전체의 시각적 일관성과 리듬감을 만들어낸다. Material Design 3는 4dp 기반의 그리드를 표준으로 정의하며, 모든 요소의 크기와 위치가 4의 배수에 맞춰지도록 권장한다. Microsoft Fluent Design과 Apple HIG 모두 반응형 그리드 시스템을 통해 다양한 화면 크기에서 레이아웃이 일관되게 유지되도록 한다. 그리드 시스템은 디자이너와 개발자 간의 공통 언어 역할을 하여 핸드오프 과정에서 오해를 줄여준다.`,
      usage: `전자상거래 앱에서 12컬럼 그리드를 기반으로 모바일에서는 2열, 태블릿에서는 3열, 데스크톱에서는 4열 상품 그리드를 구성한다.`,
      source: `Material Design 3, Microsoft Fluent Design System`
    },
  {
      english: `Column Grid`,
      korean: `컬럼 그리드`,
      category: `레이아웃 & 구조`,
      definition: `레이아웃을 수직으로 균등 분할하는 열(Column) 단위의 그리드로, UI 요소의 너비와 정렬을 체계적으로 관리한다.`,
      description: `컬럼 그리드는 웹과 앱 레이아웃에서 가장 널리 사용되는 그리드 방식으로, 12컬럼 구조가 표준으로 자리잡았다. 12는 2, 3, 4, 6으로 나누어지는 합성수이므로, 절반, 1/3, 1/4 분할이 모두 가능하여 다양한 레이아웃 구성에 유연하게 대응한다. Material Design 3는 화면 크기에 따라 4컬럼(소형), 8컬럼(중형), 12컬럼(대형) 그리드를 권장한다. 각 컬럼의 너비는 화면 크기에 따라 유동적으로 변하며, 요소는 하나 이상의 컬럼을 span하여 배치된다.`,
      usage: `뉴스 웹사이트에서 메인 기사는 8컬럼, 사이드바는 4컬럼을 차지하도록 배치하고, 모바일에서는 두 영역이 각각 4컬럼 전체를 차지하여 세로로 쌓인다.`,
      source: `Material Design 3, Microsoft Fluent Design System`
    },
  {
      english: `Baseline Grid`,
      korean: `베이스라인 그리드`,
      category: `레이아웃 & 구조`,
      definition: `텍스트의 베이스라인(글자가 앉는 선)을 기준으로 일정한 수직 간격을 유지하는 수평 그리드 시스템이다.`,
      description: `베이스라인 그리드는 인쇄 디자인에서 유래한 개념으로, 여러 텍스트 요소가 수직으로 일관된 리듬감을 갖도록 정렬하는 역할을 한다. Material Design은 4dp 베이스라인 그리드를 사용하여 모든 텍스트, 아이콘, 컴포넌트가 4dp의 배수에 정렬되도록 한다. 이를 통해 서로 다른 폰트 크기의 텍스트가 나란히 배치될 때도 시각적으로 안정된 느낌을 준다. 베이스라인 그리드를 지키면 디자인 시스템에서 일관된 수직 리듬(Vertical Rhythm)이 형성되어 전체적인 완성도가 높아진다.`,
      usage: `기사 본문에서 제목(24sp), 소제목(18sp), 본문(16sp) 텍스트가 모두 4dp 베이스라인 그리드에 맞춰 정렬되어 균일한 수직 간격을 유지한다.`,
      source: `Material Design 3`
    },
  {
      english: `Spacing System`,
      korean: `스페이싱 시스템`,
      category: `레이아웃 & 구조`,
      definition: `UI 요소 간의 간격을 일관된 단위 체계로 정의한 규칙으로, 시각적 리듬감과 레이아웃 일관성을 확보한다.`,
      description: `스페이싱 시스템은 보통 기본 단위(Base Unit)의 배수로 정의되며, Material Design은 4dp 기반 스케일(4, 8, 12, 16, 24, 32, 48dp 등)을 표준으로 사용한다. 일관된 스페이싱 시스템은 디자이너와 개발자가 공통 언어로 간격을 지정할 수 있게 하며, 디자인 토큰으로 관리하면 테마나 플랫폼에 따라 유연하게 조정할 수 있다. Figma, Sketch 등 디자인 도구에서 스페이싱 토큰을 컴포넌트에 적용하면 일관된 간격을 자동으로 유지할 수 있다. 과도하게 세분화된 스페이싱 옵션은 오히려 결정을 어렵게 하므로, 약 5-8가지 단계로 제한하는 것이 일반적이다.`,
      usage: `디자인 시스템에서 xs=4px, sm=8px, md=16px, lg=24px, xl=32px로 스페이싱 토큰을 정의하고, 카드 내부 패딩은 md(16px), 카드 간격은 lg(24px)를 사용한다.`,
      source: `Material Design 3, Microsoft Fluent Design System`
    },
  {
      english: `Margin`,
      korean: `마진`,
      category: `레이아웃 & 구조`,
      definition: `요소의 외부에 위치한 여백으로, 해당 요소와 인접 요소 또는 컨테이너 경계 사이의 간격을 정의한다.`,
      description: `CSS 박스 모델에서 마진은 요소 경계 바깥의 투명한 공간으로, 인접 요소와의 거리를 만든다. 그리드 시스템에서 마진은 콘텐츠 영역과 화면 가장자리 사이의 최소 간격을 정의하며, 화면이 좁을 때는 물리적으로 닿지 않도록 보호하는 역할을 한다. Material Design은 모바일에서 최소 16dp 마진을 권장하며, 화면이 커질수록 마진도 비례하여 증가하도록 가이드한다.`,
      usage: `모바일 화면 양측에 16dp 마진을 설정하여 콘텐츠가 화면 가장자리에 붙지 않고 손가락으로 잡는 영역이 방해받지 않도록 한다.`,
      source: `Material Design 3, W3C CSS Specification`
    },
  {
      english: `Padding`,
      korean: `패딩`,
      category: `레이아웃 & 구조`,
      definition: `요소의 내부 여백으로, 콘텐츠와 요소의 테두리 사이의 공간을 정의한다.`,
      description: `CSS 박스 모델에서 패딩은 요소의 배경색이나 이미지가 적용되는 내부 공간으로, 콘텐츠가 테두리에 밀착되지 않도록 여유 공간을 만든다. 버튼의 패딩은 텍스트 주변의 공간을 결정하며, 패딩이 충분해야 터치 타겟이 적절한 크기를 확보할 수 있다. 카드 컴포넌트의 내부 패딩은 콘텐츠의 가독성과 시각적 완결성에 직접적인 영향을 미친다. Material Design은 카드 내부 패딩으로 16dp를 기본값으로 권장한다.`,
      usage: `버튼 컴포넌트에 상하 12px, 좌우 24px 패딩을 적용하여 텍스트가 버튼 경계에 너무 가깝지 않고 충분한 터치 영역을 확보한다.`,
      source: `Material Design 3, W3C CSS Specification`
    },
  {
      english: `Breakpoint`,
      korean: `브레이크포인트`,
      category: `레이아웃 & 구조`,
      definition: `반응형 디자인에서 레이아웃이 변경되는 화면 너비의 기준점으로, 다양한 기기 크기에 맞게 레이아웃을 조정한다.`,
      description: `브레이크포인트는 미디어 쿼리(CSS)를 통해 적용되며, 특정 화면 너비 이상/이하에서 다른 레이아웃 규칙을 적용한다. Material Design 3는 600dp(소형→중형), 840dp(중형→대형), 1240dp(대형→초대형) 등의 브레이크포인트를 정의한다. 브레이크포인트는 콘텐츠가 깨지거나 가독성이 저하되는 시점을 기준으로 설정하는 것이 모범 사례이며, 특정 기기 크기에 맞추는 것보다 콘텐츠 중심으로 정의하는 것이 권장된다.`,
      usage: `블로그 웹사이트에서 768px 미만의 작은 화면에서는 사이드바가 본문 아래로 이동하고, 1200px 이상의 넓은 화면에서는 세 컬럼 레이아웃으로 변경된다.`,
      source: `Material Design 3, W3C CSS Specification`
    },
  {
      english: `Responsive Design`,
      korean: `반응형 디자인`,
      category: `레이아웃 & 구조`,
      definition: `하나의 레이아웃이 다양한 화면 크기와 기기에 유연하게 적응하도록 설계하는 접근 방식이다.`,
      description: `반응형 디자인은 유동적 그리드, 유연한 이미지, 미디어 쿼리를 핵심 기술로 사용한다. 하나의 HTML 코드베이스로 모바일, 태블릿, 데스크톱 모두에서 최적화된 경험을 제공하는 것이 목표다. 'Mobile First' 방식은 가장 작은 화면부터 설계를 시작하여 점진적으로 큰 화면에 기능과 레이아웃을 추가하는 전략으로, 성능과 우선순위 측면에서 권장된다. WCAG에서도 다양한 기기와 화면 방향에서 콘텐츠가 정상적으로 표시되어야 한다고 요구한다.`,
      usage: `쇼핑몰 웹사이트가 스마트폰에서는 단일 컬럼 목록으로, 태블릿에서는 2열 그리드로, 데스크톱에서는 4열 그리드로 상품을 표시하며 동일한 URL에서 작동한다.`,
      source: `Nielsen Norman Group, W3C WCAG 2.2`
    },
  {
      english: `Adaptive Design`,
      korean: `어댑티브 디자인`,
      category: `레이아웃 & 구조`,
      definition: `특정 기기나 화면 크기에 맞게 별도로 최적화된 레이아웃을 제공하는 설계 접근 방식이다.`,
      description: `어댑티브 디자인은 반응형 디자인과 달리 특정 브레이크포인트에서 완전히 다른 레이아웃 템플릿으로 전환하는 방식이다. 모바일용, 태블릿용, 데스크톱용 레이아웃을 각각 독립적으로 설계하여 각 기기에서 최적화된 경험을 제공한다. Apple HIG의 사이즈 클래스(Size Class) 시스템이 어댑티브 디자인의 대표적인 예시로, Compact와 Regular 두 가지 크기 클래스를 조합하여 다양한 기기 상황에 맞는 UI를 정의한다. 반응형 대비 더 정교한 최적화가 가능하지만 관리해야 할 레이아웃 변형이 늘어나는 단점이 있다.`,
      usage: `뉴스 앱이 iPhone에서는 단순한 목록 뷰를, iPad에서는 마스터-디테일 분할 뷰를 표시하여 각 기기에 최적화된 탐색 경험을 제공한다.`,
      source: `Apple Human Interface Guidelines, Nielsen Norman Group`
    },
  {
      english: `Fluid Layout`,
      korean: `플루이드 레이아웃`,
      category: `레이아웃 & 구조`,
      definition: `요소의 크기와 간격이 화면 너비에 따라 비율적으로 유동하는 레이아웃 방식으로, 퍼센트나 상대 단위를 주로 사용한다.`,
      description: `플루이드 레이아웃은 픽셀 기반 고정 너비 대신 %, vw, fr 등 상대 단위를 사용하여 요소가 화면 크기에 비례하여 조정된다. 브레이크포인트 없이 모든 화면 크기에서 매끄럽게 적응하는 것이 이상적이지만, 너무 넓거나 너무 좁은 화면에서 콘텐츠의 가독성이 저하될 수 있다. 따라서 플루이드 레이아웃과 고정 최소/최대 너비(min-width, max-width)를 함께 사용하는 것이 일반적이다.`,
      usage: `메인 콘텐츠 영역의 너비를 100%로 설정하되 max-width를 1200px로 제한하여, 화면이 넓어질수록 콘텐츠도 넓어지지만 일정 이상은 늘어나지 않도록 한다.`,
      source: `Nielsen Norman Group, W3C CSS Specification`
    },
  {
      english: `Fixed Layout`,
      korean: `픽스드 레이아웃`,
      category: `레이아웃 & 구조`,
      definition: `화면 크기에 관계없이 요소의 너비가 고정된 픽셀 값으로 유지되는 레이아웃 방식이다.`,
      description: `고정 레이아웃은 디자인이 모든 화면에서 동일하게 보이도록 보장하지만, 작은 화면에서는 가로 스크롤이 발생하고 큰 화면에서는 공백이 과도하게 생기는 단점이 있다. 과거 데스크톱 웹이 주류이던 시절 960px, 980px 고정 너비가 표준으로 사용되었으나, 모바일 사용이 일반화된 현재는 반응형이나 플루이드 레이아웃이 선호된다. 특정 내부 컴포넌트(사이드바, 내비게이션 드로어 등)에 고정 너비를 적용하고 나머지 영역을 플루이드로 처리하는 하이브리드 방식도 많이 사용된다.`,
      usage: `관리자 대시보드에서 좌측 사이드바는 240px 고정 너비로 유지하고, 나머지 메인 콘텐츠 영역은 화면 너비에 따라 유동적으로 늘어나도록 설정한다.`,
      source: `Nielsen Norman Group, W3C WCAG 2.2`
    },
  {
      english: `Z-index`,
      korean: `Z-인덱스`,
      category: `레이아웃 & 구조`,
      definition: `CSS 속성으로 겹치는 요소들의 수직 쌓임 순서(앞뒤 관계)를 정의하며, 높은 값일수록 더 앞에 표시된다.`,
      description: `Z-인덱스는 2D 화면에서 요소들의 깊이(Z축)를 관리하는 개념으로, 모달, 툴팁, 드롭다운, 고정 헤더 등 다른 콘텐츠 위에 떠 있어야 하는 요소에 필수적이다. Z-인덱스는 동일한 스태킹 컨텍스트(Stacking Context) 내에서만 비교되므로, 서로 다른 스태킹 컨텍스트에 속한 요소들은 직접 비교가 어렵다. 디자인 시스템에서는 레이어별 Z-인덱스 토큰을 정의하여 혼란을 방지하는 것이 좋으며,  Z-인덱스의 무분별한 사용은 레이아웃 버그를 유발하므로 최소화하고 명확한 규칙을 두는 것이 중요하다.`,
      usage: `페이지 스크롤 시 헤더가 항상 콘텐츠 위에 고정되도록 z-index: 100을 설정하고, 그 위에 열리는 드롭다운 메뉴에는 z-index: 200을 설정한다.`,
      source: `W3C CSS Specification, Nielsen Norman Group`
    },
  {
      english: `Safe Area`,
      korean: `세이프 에어리어`,
      category: `레이아웃 & 구조`,
      definition: `기기의 물리적 특성(노치, 홈 인디케이터, 라운드 코너 등)과 시스템 UI에 의해 콘텐츠가 가려지지 않는 안전한 레이아웃 영역이다.`,
      description: `세이프 에어리어는 iPhone X 이후의 노치 디자인이 도입되면서 더욱 중요해진 개념으로, 앱 콘텐츠가 시스템 요소와 겹치지 않도록 보장한다. Apple HIG는 콘텐츠와 인터랙티브 요소를 항상 세이프 에어리어 내에 배치하도록 권장하며, 전체 화면 이미지나 배경색은 세이프 에어리어를 넘어 확장할 수 있지만, 텍스트와 버튼은 반드시 세이프 에어리어 내에 위치해야 한다.`,
      usage: `iPhone에서 동영상 플레이어가 전체 화면으로 전환될 때, 재생 컨트롤러는 세이프 에어리어를 고려하여 노치와 홈 인디케이터 영역을 피해 배치된다.`,
      source: `Apple Human Interface Guidelines`
    },
  {
      english: `Notch`,
      korean: `노치`,
      category: `레이아웃 & 구조`,
      definition: `스마트폰 상단 화면에서 전면 카메라와 센서를 수용하기 위해 화면 일부가 잘린 형태의 물리적 디자인 특성이다.`,
      description: `노치는 iPhone X(2017)에서 처음 등장한 이후 수많은 Android 기기에서도 채택되었으며, 다양한 형태(물방울 노치, 펀치홀, 아일랜드 형태)로 발전해 왔다. 앱 레이아웃은 노치 영역과 겹치지 않도록 설계되어야 하며, 노치 아래 상태바 영역은 시스템 정보를 표시하는 공간으로, 앱은 이 영역을 침범하지 않아야 한다.`,
      usage: `전체 화면 게임 앱에서 노치 영역과 홈 인디케이터 주변을 세이프 에어리어로 처리하여 게임 UI 요소가 해당 영역을 침범하지 않도록 한다.`,
      source: `Apple Human Interface Guidelines`
    },
  {
      english: `Dynamic Island`,
      korean: `다이나믹 아일랜드`,
      category: `레이아웃 & 구조`,
      definition: `iPhone 14 Pro 이후 도입된 기능으로, 전면 카메라와 센서 영역을 동적인 UI 요소로 활용하여 알림과 실시간 활동 정보를 표시하는 인터페이스다.`,
      description: `Dynamic Island는 기존 정적 노치 디자인을 혁신적으로 재해석한 요소로, 크기와 형태가 표시되는 정보에 따라 동적으로 변한다. 음악 재생, 타이머, 내비게이션, Live Activity 등 실시간으로 업데이트되는 정보를 표시하며, 탭하면 해당 앱으로 전환된다. Apple HIG는 Dynamic Island 디자인 시 컴팩트(compact), 확장(expanded), 최소화(minimal) 세 가지 상태를 고려하도록 가이드한다.`,
      usage: `배달 앱에서 주문 후 Dynamic Island에 배달 진행 상태가 실시간으로 표시되어, 다른 앱을 사용하면서도 배달 현황을 확인할 수 있다.`,
      source: `Apple Human Interface Guidelines`
    },
  {
      english: `Fold`,
      korean: `폴드`,
      category: `레이아웃 & 구조`,
      definition: `폴더블 기기에서 화면이 접히는 부분을 의미하며, 폴딩 상태에 따라 레이아웃이 적응해야 하는 물리적 경계선이다.`,
      description: `삼성 Galaxy Z Fold 시리즈와 같은 폴더블 기기의 보급으로 폴드 영역에 대한 레이아웃 고려가 필요해졌다. 폴드 영역은 화면이 접힐 때 콘텐츠가 왜곡되거나 상호작용이 어려울 수 있으므로, 중요한 콘텐츠나 인터랙티브 요소는 폴드 선과 겹치지 않도록 설계해야 한다. 펼쳤을 때의 넓은 화면과 접었을 때의 일반 스마트폰 크기 두 가지 상태를 모두 고려한 어댑티브 레이아웃 설계가 필요하다.`,
      usage: `이메일 앱이 폴더블 기기에서 펼쳤을 때 왼쪽에 메일 목록, 오른쪽에 본문을 나란히 표시하고, 접었을 때는 목록 뷰만 표시하도록 레이아웃을 전환한다.`,
      source: `Google Design, Material Design 3`
    },
  {
      english: `Above the Fold`,
      korean: `어보브 더 폴드`,
      category: `레이아웃 & 구조`,
      definition: `페이지 로드 시 스크롤 없이 즉시 보이는 화면 상단 영역으로, 사용자의 첫인상과 즉각적인 이해에 가장 중요한 공간이다.`,
      description: `'폴드 위'라는 개념은 신문의 접힌 상단 부분에서 유래했으며, 디지털 환경에서는 초기 뷰포트에 표시되는 영역을 의미한다. Nielsen Norman Group 연구에 따르면 사용자는 폴드 위 콘텐츠에 약 80%의 시간을 투자하며, 핵심 가치 제안과 주요 CTA(Call to Action)는 이 영역에 배치해야 한다. 랜딩 페이지 설계에서 히어로(Hero) 섹션을 폴드 위에 배치하는 것이 일반적 관행이다.`,
      usage: `SaaS 제품의 랜딩 페이지에서 핵심 가치 제안, 주요 혜택 요약, '무료로 시작하기' CTA 버튼을 스크롤 없이 즉시 보이는 폴드 위 영역에 모두 배치한다.`,
      source: `Nielsen Norman Group`
    },
  {
      english: `Below the Fold`,
      korean: `빌로우 더 폴드`,
      category: `레이아웃 & 구조`,
      definition: `페이지 로드 시 스크롤해야 볼 수 있는 화면 하단 영역으로, 보조 정보와 추가 콘텐츠를 배치하는 공간이다.`,
      description: `폴드 아래 영역은 과거에는 사용자가 거의 보지 않는다고 여겨졌으나, Nielsen Norman Group 연구에서 사용자들이 폴드 아래 콘텐츠도 스크롤하여 탐색한다는 것이 밝혀졌다. 중요도가 낮은 상세 정보, 관련 콘텐츠, 부가적인 CTA 등을 폴드 아래에 배치하는 것이 적절하다. 폴드 위의 콘텐츠가 흥미롭고 사용자의 스크롤을 유도할 수 있다면 폴드 아래 콘텐츠도 충분히 탐색된다. 무한 스크롤(Infinite Scroll) 패턴은 폴드 아래 콘텐츠의 탐색을 더욱 자연스럽게 만들지만, 사용자가 현재 위치를 파악하기 어렵게 하는 단점이 있다.`,
      usage: `제품 상세 페이지에서 폴드 위에는 핵심 정보(가격, 구매 버튼)를, 폴드 아래에는 상세 스펙, 사용자 리뷰, 관련 상품 등 보조 정보를 배치한다.`,
      source: `Nielsen Norman Group`
    },
  {
      english: `Viewport`,
      korean: `뷰포트`,
      category: `레이아웃 & 구조`,
      definition: `사용자가 현재 볼 수 있는 화면 또는 브라우저 창의 가시 영역으로, 반응형 레이아웃의 기준이 되는 기본 단위다.`,
      description: `뷰포트는 기기 화면 전체와 다를 수 있으며, 브라우저 UI(주소창, 탭 바 등)를 제외한 실제 웹 콘텐츠가 표시되는 영역이다. CSS의 vw(뷰포트 너비), vh(뷰포트 높이) 단위는 뷰포트 크기에 상대적인 값을 정의할 때 사용된다. iOS 15 이후 Safari에서 하단 탭 바가 스크롤에 따라 숨겨지면서 '100vh'가 예상과 다르게 동작하는 문제가 알려져 dvh(동적 뷰포트 높이) 단위가 새롭게 도입되었다.`,
      usage: `전체 화면 랜딩 페이지에서 히어로 섹션의 높이를 100vh로 설정하여 사용자의 화면 크기에 관계없이 항상 화면 전체를 채우도록 한다.`,
      source: `W3C CSS Specification, Apple Human Interface Guidelines`
    },
  {
      english: `Aspect Ratio`,
      korean: `종횡비`,
      category: `레이아웃 & 구조`,
      definition: `요소의 너비와 높이의 비율로, 이미지, 비디오, 컨테이너 등의 형태적 비례를 정의한다.`,
      description: `종횡비는 16:9(와이드스크린), 4:3(전통 TV), 1:1(정사각형), 9:16(세로 비디오) 등 다양한 형태로 정의된다. CSS의 aspect-ratio 속성을 통해 요소가 비율을 유지하면서 크기가 변하도록 설정할 수 있다. 소셜 미디어 콘텐츠, 썸네일, 광고 배너 등에서 정해진 종횡비를 유지하는 것은 레이아웃 일관성에 중요하다. 이미지나 비디오 콘텐츠가 업로드될 때 종횡비가 다른 경우 크롭(Crop)이나 레터박스(Letterbox) 처리를 통해 일관된 레이아웃을 유지한다.`,
      usage: `유튜브 썸네일은 항상 16:9 종횡비를 유지하도록 설정하여, 다양한 화면 크기에서도 이미지가 왜곡되지 않고 레이아웃이 일관되게 보인다.`,
      source: `W3C CSS Specification, Material Design 3`
    },
  {
      english: `Overflow`,
      korean: `오버플로우`,
      category: `레이아웃 & 구조`,
      definition: `요소의 콘텐츠가 지정된 크기를 초과할 때의 처리 방식을 정의하는 CSS 속성으로, 숨김, 스크롤, 자동 등의 옵션이 있다.`,
      description: `overflow 속성은 콘텐츠가 컨테이너를 벗어났을 때 어떻게 처리할지 결정하며, visible(기본값, 넘쳐 표시), hidden(잘라냄), scroll(항상 스크롤바 표시), auto(필요 시 스크롤바) 값을 가진다. 텍스트 오버플로우의 경우 text-overflow: ellipsis를 통해 초과된 텍스트를 말줄임표(...)로 처리할 수 있다. overflow: hidden은 스태킹 컨텍스트를 생성하므로 Z-인덱스 레이아웃에 영향을 줄 수 있다.`,
      usage: `사용자 프로필 카드에서 긴 이름이 카드 너비를 초과하지 않도록 overflow: hidden과 text-overflow: ellipsis를 적용하여 '홍길동 황태자 왕...' 형태로 표시한다.`,
      source: `W3C CSS Specification`
    },
  {
      english: `Clip`,
      korean: `클립`,
      category: `레이아웃 & 구조`,
      definition: `요소의 표시 영역을 특정 형태나 경계로 잘라내어 해당 영역 밖의 콘텐츠를 숨기는 그래픽 처리 방법이다.`,
      description: `CSS의 clip-path 속성은 원형, 다각형, SVG 경로 등 다양한 형태로 요소를 잘라낼 수 있으며, 창의적인 레이아웃과 비주얼 디자인에 활용된다. 아바타 이미지를 원형으로 클리핑하는 것이 가장 일반적인 활용 예시며, 클리핑은 요소의 시각적 표현에만 영향을 미치며 레이아웃 흐름에는 영향을 주지 않는다는 점에서 display: none과 다르다. 애니메이션과 결합하면 슬라이드인, 마스크 전환 등 다양한 트랜지션 효과를 구현할 수 있다.`,
      usage: `프로필 이미지를 원형 아바타로 표시하기 위해 이미지에 border-radius: 50%와 overflow: hidden을 적용하여 정사각형 이미지를 원형으로 클리핑한다.`,
      source: `W3C CSS Specification`
    },
  {
      english: `Visual Hierarchy`,
      korean: `시각적 계층`,
      category: `레이아웃 & 구조`,
      definition: `크기, 색상, 대비, 여백, 위치 등 시각적 요소를 통해 정보의 중요도와 순서를 사용자의 눈에 명확하게 전달하는 레이아웃 원칙이다.`,
      description: `강력한 시각적 계층은 사용자가 명시적 안내 없이도 어디를 먼저 봐야 하는지 직관적으로 알 수 있게 한다. 제목은 크고 굵게, 부제목은 중간, 본문은 작게 설정하는 타이포그래피 스케일이 대표적인 예다. F-패턴과 Z-패턴 아이 트래킹 연구에 따르면 사람들은 좌상단에서 시작해 시선이 이동하므로, 가장 중요한 정보를 해당 위치에 배치하는 것이 효과적이다. 색상 대비와 공간(White Space)도 계층을 강화하는 핵심 도구다.`,
      usage: `랜딩 페이지에서 메인 헤드라인을 48px 굵은 폰트로, 서브카피를 20px 일반 폰트로, CTA 버튼을 accent 색상으로 배치하여 사용자 시선을 헤드라인→서브카피→CTA 순서로 자연스럽게 유도한다.`,
      source: `Nielsen Norman Group, Apple Human Interface Guidelines`
    },
  {
      english: `White Space`,
      korean: `여백`,
      category: `레이아웃 & 구조`,
      definition: `디자인에서 콘텐츠가 없는 빈 공간으로, 시각적 호흡을 주고 요소 간 관계를 명확히 하며 가독성을 높이는 능동적 디자인 요소다.`,
      description: `Negative Space라고도 불리는 White Space는 '비어있는 낭비 공간'이 아니라 콘텐츠를 돋보이게 하는 적극적인 디자인 도구다. 마이크로 화이트스페이스(글자 사이, 줄 간격)와 매크로 화이트스페이스(섹션 사이, 페이지 여백) 두 가지로 구분된다. 여백을 충분히 활용하면 고급스러운 느낌을 주고 인지 부하를 낮춘다. 연구에 따르면 적절한 여백이 있는 텍스트는 그렇지 않은 텍스트보다 이해도가 약 20% 향상된다.`,
      usage: `애플 제품 페이지에서 제품 이미지 주변에 넓은 여백을 두어 제품 자체에 시선이 집중되도록 하고, 고급스럽고 깔끔한 브랜드 이미지를 강화한다.`,
      source: `Nielsen Norman Group, Apple Human Interface Guidelines`
    },
  {
      english: `Typography Scale`,
      korean: `타이포그래피 스케일`,
      category: `레이아웃 & 구조`,
      definition: `제목, 본문, 캡션 등 텍스트 역할에 따라 폰트 크기, 굵기, 행간을 체계적으로 정의한 타이포그래피 시스템이다.`,
      description: `타이포그래피 스케일은 시각적 계층과 가독성을 일관되게 유지하기 위한 디자인 토큰의 핵심 요소다. Material Design 3는 Display, Headline, Title, Body, Label 다섯 가지 역할과 Large/Medium/Small 크기 변형을 제공한다. Apple HIG는 Dynamic Type을 통해 사용자 접근성 설정에 따라 텍스트 크기가 유동적으로 변하는 스케일을 정의한다. 일관된 타이포그래피 스케일은 디자인-개발 협업 시 커뮤니케이션 비용을 크게 줄여준다.`,
      usage: `디자인 시스템에서 H1(32px/Bold), H2(24px/SemiBold), Body(16px/Regular), Caption(12px/Regular)으로 스케일을 정의하고, 모든 화면에서 이 스케일만 사용하도록 규칙을 세운다.`,
      source: `Material Design 3, Apple Human Interface Guidelines`
    },
  {
      english: `Button`,
      korean: `버튼`,
      category: `컴포넌트 & UI 패턴`,
      definition: `사용자가 탭하거나 클릭하여 특정 액션을 실행하는 가장 기본적인 인터랙티브 UI 컴포넌트다.`,
      description: `버튼은 레이블(텍스트), 아이콘, 또는 두 가지 조합으로 구성되며 액션의 내용을 명확하게 전달해야 한다. Material Design 3는 버튼을 중요도에 따라 Filled(가장 강조), Filled Tonal, Outlined, Text(최소 강조) 4가지 유형으로 분류한다. 버튼 레이블은 '확인'보다 '저장', '삭제', '구매하기'처럼 수행되는 액션을 구체적으로 설명하는 동사 형태가 사용자 이해를 돕는다. 비활성화(Disabled) 상태의 버튼은 시각적으로 구분되어야 하며, 비활성화된 이유를 툴팁이나 인라인 메시지로 알려주면 사용성이 향상된다.`,
      usage: `폼 하단에 '제출하기' Primary Button과 '취소' Secondary Button을 나란히 배치하되, '제출하기' 버튼을 더 강조된 스타일로 표시하여 주요 액션임을 알린다.`,
      source: `Material Design 3, Apple Human Interface Guidelines`
    },
  {
      english: `Primary Button`,
      korean: `프라이머리 버튼`,
      category: `컴포넌트 & UI 패턴`,
      definition: `페이지나 화면에서 가장 중요한 액션을 나타내는 버튼으로, 시각적으로 가장 강조된 스타일을 가진다.`,
      description: `프라이머리 버튼은 화면당 하나만 사용하는 것이 원칙으로, 여러 프라이머리 버튼이 동시에 존재하면 사용자가 주요 액션을 파악하기 어려워진다. 일반적으로 브랜드 색상의 채워진 배경과 흰색 텍스트로 표현되며, 시각적 계층에서 가장 높은 강조 레벨을 갖는다. Nielsen Norman Group은 버튼 시각적 계층을 명확하게 유지하여 사용자가 주요 액션과 보조 액션을 쉽게 구분할 수 있어야 한다고 강조한다. 결제 완료, 계정 생성, 설정 저장 등 돌이키기 어려운 중요한 액션에 주로 사용된다.`,
      usage: `온보딩 화면에서 '시작하기' 버튼은 프라이머리 버튼(채워진 배경)으로, '나중에' 버튼은 텍스트 버튼으로 표시하여 주요 액션의 우선순위를 명확히 한다.`,
      source: `Material Design 3, Nielsen Norman Group`
    },
  {
      english: `Secondary Button`,
      korean: `세컨더리 버튼`,
      category: `컴포넌트 & UI 패턴`,
      definition: `프라이머리 버튼보다 낮은 시각적 강조 레벨을 가지며, 보조적인 액션을 나타내는 버튼이다.`,
      description: `세컨더리 버튼은 외곽선만 있는 Outlined 버튼이나 배경이 없는 Text 버튼 형태로 주로 표현되어 프라이머리 버튼과 시각적으로 구분된다. '취소', '이전', '더보기' 등 주요 액션을 보완하거나 취소하는 용도로 사용된다. 프라이머리와 세컨더리 버튼을 함께 사용할 때는 두 버튼의 시각적 대비가 명확해야 하며, 공간적 배치도 주요 액션이 더 눈에 띄게 설계해야 한다. 파괴적인 액션(삭제, 계정 탈퇴 등)은 실수를 방지하기 위해 낮은 강조 레벨의 버튼으로 표시하는 것이 권장된다.`,
      usage: `구매 확인 화면에서 '결제 완료' 프라이머리 버튼과 '이전으로' 세컨더리 버튼(아웃라인 스타일)을 함께 배치한다.`,
      source: `Material Design 3, Nielsen Norman Group`
    },
  {
      english: `Floating Action Button (FAB)`,
      korean: `플로팅 액션 버튼`,
      category: `컴포넌트 & UI 패턴`,
      definition: `화면 위에 떠 있는 형태의 원형 버튼으로, 앱의 가장 주요한 액션을 화면 어디서나 접근할 수 있도록 고정 배치한다.`,
      description: `FAB는 Material Design에서 정의한 컴포넌트로, 화면 우하단에 고정 배치되어 스크롤에 관계없이 항상 접근 가능하다. 앱 전체에서 가장 중요한 하나의 액션(글쓰기, 추가, 생성 등)에만 사용해야 하며, 아이콘만으로 구성되거나 텍스트 레이블이 붙은 Extended FAB 형태도 있다. FAB는 콘텐츠 위에 떠 있으므로 아래에 있는 중요한 콘텐츠를 가리지 않도록 스크롤 시 동작을 고려해야 한다.`,
      usage: `이메일 앱에서 화면 우하단에 연필 아이콘의 FAB를 배치하여, 목록을 탐색하는 중에도 언제든 새 메일 작성을 시작할 수 있도록 한다.`,
      source: `Material Design 3`
    },
  {
      english: `Icon Button`,
      korean: `아이콘 버튼`,
      category: `컴포넌트 & UI 패턴`,
      definition: `텍스트 없이 아이콘만으로 구성된 버튼으로, 공간이 제한된 도구 모음이나 내비게이션에 주로 사용된다.`,

  {

  {

  {

      description: `검색 바는 정보가 풍부한 앱에서 원하는 콘텐츠를 빠르게 찾을 수 있는 핵심 기능이다. 검색 바는 항상 접근하기 쉬운 위치(상단 내비게이션 바 등)에 배치되어야 하며, 검색어 입력 시 실시간 자동완성 제안을 보여주면 사용성이 향상된다. Material Design 3에서 새롭게 도입된 검색 컴포넌트는 검색 바가 모달로 전환되어 전체 화면 검색 경험을 제공하는 패턴을 제안한다. 검색 결과가 없을 때는 Empty State 디자인을 통해 대안(철자 확인, 다른 검색어 제안)을 제공해야 한다.`,

      description: `드롭다운은 화면 공간을 최소화하면서 다양한 옵션을 제공하는 효율적인 컴포넌트로, 여러 개의 선택지를 처음부터 모두 노출하지 않을 때 사용한다. Nielsen Norman Group은 드롭다운이 7개 이상의 선택지에 적합하며, 5개 이하는 라디오 버튼을 고려하라고 권장한다. 드롭다운 옵션 목록이 화면 밖으로 넘어가지 않도록 뷰포트 경계를 고려한 위치 계산이 필요하다.`,

      description: `필터 칩은 검색 결과나 목록에 필터를 적용할 때 현재 활성화된 필터 조건을 시각적으로 표현하는 데 효과적이다. 입력 칩은 이메일 수신자 추가처럼 사용자가 입력한 값을 가시적인 칩으로 변환하여 여러 항목을 쉽게 관리하게 해준다. 칩에 X 버튼을 추가하여 개별 제거가 가능하게 하고, 그룹 내 칩들은 가로 스크롤 또는 줄바꿈으로 처리한다.`,

      description: `얼럿은 단순 정보 제공(OK 버튼만)과 사용자 확인이 필요한 경우(확인/취소 버튼)로 나뉜다. iOS의 UIAlertController는 Action Sheet(하단에서 올라오는 목록형)와 Alert(중앙 팝업형) 두 스타일을 제공하며, 상황에 따라 적절한 형태를 선택해야 한다. 얼럿은 가능한 한 간결하게 작성하고, 취할 수 있는 액션의 의미를 명확하게 전달해야 한다. 과도한 얼럿 사용은 '얼럿 피로(Alert Fatigue)'를 유발하여 사용자가 내용을 읽지 않고 무시하는 습관을 만들 수 있다.`,

      description: `사이드바는 데스크톱 웹과 태블릿 앱에서 주요 내비게이션 수단으로 활용되며, 현재 활성 섹션을 강조 표시하여 사용자의 현재 위치를 알려주는 역할을 한다. 반응형 디자인에서 사이드바는 작은 화면에서 햄버거 메뉴 버튼으로 숨겨지거나 드로어(Drawer)로 전환되는 것이 일반적이다. 사이드바의 너비는 적절한 범위(220-300px)로 설정하여 콘텐츠 영역을 과도하게 줄이지 않아야 한다.`,

      description: `아코디언은 FAQ, 제품 상세 스펙, 설정 카테고리 등 계층적으로 구성된 많은 양의 콘텐츠를 화면 공간을 효율적으로 사용하며 표시할 때 유용하다. 단일 선택 아코디언(한 번에 하나만 열림)과 다중 선택 아코디언(여러 섹션 동시에 열림) 두 가지 동작 방식이 있으며, 콘텐츠의 성격에 따라 선택한다. 펼쳐진 상태와 접힌 상태를 아이콘(화살표, +/- 등)과 패널 높이 변화로 명확하게 구분해야 한다.`,

      definition: `콘텐츠가 로딩되는 동안 실제 콘텐츠의 레이아웃과 구조를 회색 플레이스홀더로 미리 보여주는 로딩 상태 패턴이다.`,
      description: `스켈레톤 스크린은 빈 화면이나 스피너보다 인지된 로딩 시간을 줄여주는 효과가 있으며, 콘텐츠가 로드된 후 레이아웃 이동(Layout Shift) 없이 자연스럽게 실제 콘텐츠로 전환된다. Nielsen Norman Group 연구에 따르면 스켈레톤 스크린이 스피너보다 기다림을 덜 지루하게 느끼게 한다. 카드, 리스트, 피드 등 구조화된 레이아웃을 가진 콘텐츠에 적합하며, 단순한 텍스트 블록보다 이미지와 복잡한 레이아웃을 가진 콘텐츠에 특히 효과적이다. 스켈레톤의 형태는 실제 콘텐츠의 레이아웃과 유사해야 하며, 미세한 shimmer 애니메이션을 추가하면 로딩 중임을 명확하게 표현할 수 있다.`,

  {
      english: `Spinner`,

      category: `컴포넌트 & UI 패턴`,
      definition: `시스템이 처리 중임을 나타내는 순환 애니메이션 형태의 로딩 표시 컴포넌트다.`,

      category: `컴포넌트 & UI 패턴`,
      definition: `콘텐츠가 없거나 검색 결과가 없는 상태를 사용자에게 안내하고 다음 행동을 유도하는 UI 패턴이다.`,
      description: `빈 상태는 첫 실행(First Use), 사용자가 콘텐츠를 모두 지운 상태(User Cleared), 검색 결과 없음(No Results) 세 가지 유형으로 나뉜다. 단순히 '항목이 없습니다'라는 메시지만 표시하는 것은 최악의 빈 상태 경험으로, 이유 설명과 해결책 제안(CTA)을 함께 제공해야 한다. 친근한 일러스트레이션과 함께 빈 상태를 표현하면 거부감을 줄이고 긍정적인 감정을 유발할 수 있다. 예를 들어 첫 실행 빈 상태는 온보딩 역할도 겸하여 앱의 핵심 가치와 시작 방법을 안내하는 기회로 활용할 수 있다.`,
      usage: `즐겨찾기 목록이 비어있을 때 별 모양 일러스트와 함께 '아직 즐겨찾기가 없어요. 마음에 드는 상품을 하트 버튼으로 저장해 보세요!'라는 메시지와 '상품 탐색하기' 버튼을 표시한다.`,
      source: `Nielsen Norman Group, Material Design 3`
    },
  {
      english: `Onboarding`,
      korean: `온보딩`,
      category: `컴포넌트 & UI 패턴`,
      definition: `신규 사용자가 앱이나 서비스를 처음 접할 때 핵심 가치와 사용 방법을 안내하여 초기 학습 곡선을 낮추고 지속 사용을 유도하는 UI 패턴이다.`,
      description: `온보딩은 단순한 튜토리얼을 넘어 사용자가 제품의 핵심 가치를 빠르게 경험하고 '아하! 모멘트'에 도달하도록 안내하는 전략적 경험 설계다. 스와이프 가능한 인트로 화면(Welcome Screens), 코치 마크(Coach Mark), 빈 상태 안내, 인터랙티브 투어 등 다양한 형태로 구현된다. Nielsen Norman Group은 효과적인 온보딩이 '제품 사용법 가르치기'보다 '사용자가 첫 번째 핵심 가치를 직접 경험하게 하는 것'에 초점을 맞춰야 한다고 강조한다. 온보딩은 사용자가 언제든 건너뛸 수 있어야 하며, 핵심 기능을 처음부터 너무 길게 설명하면 이탈률이 높아진다.`,
      usage: `생산성 앱에서 처음 실행 시 3개 화면의 핵심 기능 소개 후, 빈 상태 화면에서 '첫 번째 할 일을 추가해보세요' CTA를 통해 사용자가 직접 기능을 경험하도록 안내한다.`,
      source: `Nielsen Norman Group, Apple Human Interface Guidelines`
    },
  {
      english: `Error State`,
      korean: `에러 상태`,
      category: `컴포넌트 & UI 패턴`,
      definition: `사용자 입력 오류, 시스템 오류, 네트워크 실패 등 문제가 발생했을 때 상황을 알리고 해결 방법을 안내하는 UI 상태다.`,
      description: `에러 상태는 인라인 에러(폼 필드 오류), 전체 화면 에러(404, 500 등), 일부 콘텐츠 에러(카드 내 로딩 실패) 등 다양한 수준에서 발생한다. 좋은 에러 메시지는 무엇이 잘못되었는지, 왜 발생했는지, 어떻게 해결할 수 있는지 세 가지를 명확하게 전달해야 한다. 기술적인 오류 코드나 전문 용어 대신 일반 사용자가 이해할 수 있는 평이한 언어로 작성해야 하며, 가능하다면 '다시 시도', '홈으로 이동' 등의 복구 액션을 제공해야 한다. 에러는 빨간색으로 표시하되 색맹 사용자를 위해 아이콘(⚠️ 등)을 함께 사용한다.`,
      usage: `네트워크 오류로 페이지 로딩에 실패했을 때 '인터넷 연결을 확인해 주세요. 연결된 경우 잠시 후 다시 시도해 보세요'라는 메시지와 함께 '다시 시도' 버튼을 표시한다.`,
      source: `Nielsen Norman Group, Material Design 3`
    },
  {
      english: `Banner`,
      korean: `배너`,
      category: `컴포넌트 & UI 패턴`,
      definition: `화면 상단이나 콘텐츠 영역 내에 고정 표시되어 중요한 정보, 경고, 프로모션을 전달하는 가로형 알림 컴포넌트다.`,

  {
      english: `Breadcrumb`,
      korean: `브레드크럼`,
      category: `컴포넌트 & UI 패턴`,
      definition: `현재 페이지까지의 계층적 경로를 수평으로 나열하여 사용자가 위치를 파악하고 상위 계층으로 이동할 수 있도록 하는 내비게이션 패턴이다.`,
      description: `브레드크럼은 깊은 계층 구조를 가진 웹사이트(e커머스, 콘텐츠 사이트)에서 사용자가 '지금 어디 있는가'를 명확히 알 수 있게 해주는 보조 내비게이션이다. '홈 &gt; 전자기기 &gt; 스마트폰 &gt; iPhone 15'처럼 계층을 구분자로 나열하며, 각 단계는 클릭 가능한 링크로 제공된다. Nielsen Norman Group은 브레드크럼이 주요 내비게이션을 대체하지 않고 보완하는 역할을 해야 한다고 강조한다.`,
      usage: `쇼핑몰에서 상품 상세 페이지 상단에 '홈 &gt; 의류 &gt; 남성 &gt; 티셔츠' 브레드크럼을 표시하여, 사용자가 상위 카테고리로 빠르게 돌아갈 수 있게 한다.`,
      source: `Nielsen Norman Group, W3C WCAG 2.2`

  {
      english: `Pagination`,
      korean: `페이지네이션`,
      category: `컴포넌트 & UI 패턴`,
      definition: `많은 양의 콘텐츠를 여러 페이지로 분할하여 페이지 번호, 이전/다음 버튼으로 탐색할 수 있는 내비게이션 패턴이다.`,
      description: `페이지네이션은 검색 결과, 상품 목록, 게시글 목록 등에서 콘텐츠를 분할하여 초기 로딩 시간을 줄이고 사용자가 현재 위치를 파악할 수 있게 한다. 무한 스크롤과 비교할 때 페이지네이션은 사용자가 특정 결과 위치로 직접 이동할 수 있고, 뒤로 가기 후 같은 위치로 돌아올 수 있는 장점이 있다. 현재 페이지, 이전/다음 버튼, 특정 페이지 번호 버튼, 총 페이지 수를 명확하게 표시해야 하며, 첫 페이지와 마지막 페이지에서는 이전/다음 버튼을 비활성화한다.`,
      usage: `검색 결과 100개를 10개씩 나누어 1부터 10까지 페이지 번호를 표시하고, 현재 페이지(3)는 강조 표시하며 이전/다음 화살표로 페이지를 순서대로 탐색할 수 있다.`,

  {
      english: `Stepper`,
      korean: `스테퍼`,
      category: `컴포넌트 & UI 패턴`,
      definition: `복잡한 작업을 순차적인 단계로 분할하여 사용자가 진행 상황을 파악하며 단계별로 완료할 수 있도록 안내하는 내비게이션 패턴이다.`,
      description: `스테퍼는 회원가입, 결제 프로세스, 온보딩, 설정 마법사 등 여러 단계로 구성된 복잡한 작업을 명확하게 구조화한다. 수평 스테퍼(Horizontal Stepper)는 데스크톱에서, 수직 스테퍼는 모바일이나 복잡한 폼에 적합하다. 완료된 단계는 체크마크, 현재 단계는 강조, 미완료 단계는 비활성으로 상태를 구분하여 표시해야 한다. 각 단계에서의 입력 오류는 다음 단계로 진행하기 전에 해결되어야 하며, 완료한 단계로 뒤로 돌아갈 수 있는 기능도 제공해야 한다.`,
      usage: `결제 프로세스를 '장바구니 확인 → 배송지 입력 → 결제 수단 선택 → 주문 확인' 4단계 스테퍼로 구성하여 현재 위치와 남은 단계를 명확하게 안내한다.`,

    },
  {
      english: `Date Picker`,
      korean: `날짜 선택기`,
      category: `컴포넌트 & UI 패턴`,
      definition: `사용자가 날짜 또는 날짜 범위를 시각적 캘린더 인터페이스를 통해 선택할 수 있는 UI 컴포넌트다.`,
      description: `Date Picker는 직접 텍스트 입력보다 오류를 줄이고 유효한 날짜만 선택하도록 유도하는 데 효과적이다. 모바일에서는 스크롤 드럼(Drum Roll) 방식과 달력 그리드 방식이 공존하며, 플랫폼 네이티브 컴포넌트를 사용하면 사용자에게 익숙한 경험을 제공할 수 있다.  국제화(i18n) 설계 시 날짜 형식(MM/DD/YYYY vs DD/MM/YYYY)과 주 시작 요일을 고려해야 한다.`,

  {
      english: `Carousel`,
      korean: `캐러셀`,

      definition: `여러 콘텐츠 항목을 가로 방향으로 스크롤하거나 슬라이드하여 탐색하는 UI 패턴이다.`,
      description: `캐러셀은 이미지 갤러리, 상품 추천, 기능 소개 등 공간을 효율적으로 활용해야 할 때 유용하다. 그러나 Nielsen Norman Group의 연구에 따르면 자동 회전 캐러셀은 사용자가 콘텐츠를 인식하기도 전에 전환되어 클릭률이 매우 낮고, 광고처럼 무시되는 경향이 있다. 수동으로 제어 가능한 캐러셀이 자동 회전보다 훨씬 효과적이며, 현재 위치를 알려주는 인디케이터(점 또는 숫자)는 필수다.`,

    },
  {
      english: `Tabs`,
      korean: `탭`,
      category: `컴포넌트 & UI 패턴`,

      description: `Tab Bar(하단 탭 바, iOS/Android 전역 내비게이션)와 구분되는 Tabs는 화면 상단이나 콘텐츠 영역 내에서 같은 맥락의 다른 뷰를 전환하는 데 사용된다. Material Design 3는 Primary Tabs와 Secondary Tabs를 구분하며, 탭 수는 최대 5개 이내를 권고한다. 탭 레이블은 명확하고 짧아야 하며, 현재 선택된 탭은 강조(active indicator)로 구분되어야 한다. 탭 전환 시 콘텐츠 영역만 변경되고 탭 자체는 고정 상태를 유지한다.`,
      usage: `프로필 페이지에서 '게시물', '저장됨', '좋아요' 세 가지 탭으로 콘텐츠를 분리하여, 사용자가 탭을 전환하며 각각의 콘텐츠 유형을 탐색할 수 있도록 한다.`,
      source: `Material Design 3, Apple Human Interface Guidelines`
    },
  {
      english: `Rating`,
      korean: `평점`,
      category: `컴포넌트 & UI 패턴`,
      definition: `사용자가 상품, 서비스, 콘텐츠에 대한 주관적 평가를 별점이나 숫자 형태로 입력하거나 표시하는 UI 컴포넌트다.`,
      description: `별 5개짜리 Rating은 전자상거래, 앱 스토어, 음식 배달 등에서 가장 보편적인 사용자 피드백 컴포넌트다. 입력용 Rating은 인터랙티브하며 현재 선택 상태를 명확히 표시해야 하고, 표시용 Rating은 집계된 평균값과 리뷰 수를 함께 보여주는 것이 일반적이다. 하프 스타(Half Star)나 소수점 표시로 더 세밀한 평점을 나타낼 수 있다.`,

  {
      english: `Floating Label`,
      korean: `플로팅 레이블`,
      category: `컴포넌트 & UI 패턴`,
      definition: `텍스트 필드의 힌트 텍스트(placeholder)가 사용자가 입력을 시작하면 필드 위로 작게 올라가는 레이블 패턴이다.`,
      description: `Material Design이 대중화한 Floating Label은 입력 전에는 placeholder처럼 필드 안에 위치하다가, 포커스나 입력이 발생하면 애니메이션과 함께 필드 상단으로 이동한다. 이 패턴은 공간 효율성을 높이면서도 레이블이 항상 표시되어 사용자가 무엇을 입력해야 하는지 잊지 않게 한다. 일반 placeholder는 입력 후 사라지지만, Floating Label은 입력 중에도 맥락 정보를 유지한다는 장점이 있다. 단, 애니메이션이 없을 경우 레이블과 값이 혼동될 수 있어 명확한 시각적 구분이 필요하다.`,
      usage: `회원가입 폼에서 '이메일' 레이블이 처음에는 필드 가운데 위치하다가, 사용자가 탭하면 0.2초 애니메이션과 함께 필드 상단 좌측으로 이동하여 입력 중에도 레이블을 볼 수 있다.`,
      source: `Material Design 3`
    },
  {
      english: `Inline Validation`,
      korean: `인라인 유효성 검사`,
      category: `컴포넌트 & UI 패턴`,
      definition: `사용자가 폼 필드를 입력하는 중 또는 포커스를 벗어날 때 즉시 입력 값의 유효성을 검사하고 피드백을 제공하는 패턴이다.`,
      description: `폼 제출 후 한꺼번에 오류를 표시하는 방식보다 실시간 또는 필드 단위 Inline Validation이 사용자 경험을 크게 개선한다. Nielsen Norman Group은 포커스 이탈 시(on blur) 검사하는 것이 타이핑 중(on input) 검사보다 대체로 덜 방해적이라고 권고한다. 성공/실패 외에도 '비밀번호 강도 표시' 같은 중간 상태 피드백도 유용하다. 오류 메시지는 '잘못된 입력' 같은 막연한 표현보다 '이메일 형식을 확인하세요 (예: name@example.com)'처럼 구체적인 해결책을 제시해야 한다.`,
      usage: `비밀번호 필드에서 입력 중 실시간으로 '8자 이상', '대문자 포함', '특수문자 포함' 세 가지 요건 충족 여부를 체크마크로 표시하고, 모두 충족 시 초록색으로 변경한다.`,
      source: `Nielsen Norman Group, Material Design 3`
    },
  {
      english: `Notification Center`,
      korean: `알림 센터`,
      category: `컴포넌트 & UI 패턴`,
      definition: `앱 또는 시스템에서 발생한 알림들을 한 곳에 모아 사용자가 시간 순서대로 확인하고 관리할 수 있는 UI 패턴이다.`,
      description: `iOS의 Notification Center, Android의 Notification Shade, 웹 앱의 알림 패널 등 형태는 다르지만 모든 플랫폼이 알림 집계 공간을 제공한다. 읽은 알림과 읽지 않은 알림의 구분, 알림 그룹화(앱별 또는 주제별), 개별/일괄 삭제 기능이 핵심 요소다. 알림 설계 시 중요도에 따라 알림 유형(즉각 팝업 vs 조용한 알림)을 구분해야 하며, 과도한 알림은 사용자가 알림 자체를 무시하거나 앱을 삭제하는 원인이 된다.`,
      usage: `SNS 앱의 알림 탭에서 '좋아요', '댓글', '팔로우' 알림을 각각 그룹으로 묶어 표시하고, 사용자가 개별 알림을 스와이프하여 삭제하거나 상단 '모두 읽음' 버튼으로 일괄 처리할 수 있다.`,
      source: `Apple Human Interface Guidelines, Material Design 3`
    },
  {
      english: `Segmented Control`,
      korean: `세그먼트 컨트롤`,
      category: `컴포넌트 & UI 패턴`,
      definition: `상호 배타적인 옵션 중 하나를 선택하도록 가로로 나란히 배치된 버튼 그룹 컴포넌트로, 뷰 전환이나 필터 설정에 주로 사용된다.`,
      description: `Segmented Control은 iOS에서 Apple이 정의한 네이티브 컴포넌트로, Android/Web에서는 Button Group 또는 Tabs와 유사하게 사용된다. 라디오 버튼보다 공간 효율적이고, 옵션 간 전환이 직관적이다. 세그먼트 수는 2~5개가 적정하며, 모든 옵션의 너비는 동일하게 유지하는 것이 시각적 균형에 좋다. 지도 앱의 '지도/위성/지형' 전환이나 달력 앱의 '일/주/월' 뷰 전환에 대표적으로 사용된다.`,
      usage: `날씨 앱에서 '오늘/이번 주/이번 달' 세 가지 예보 단위를 Segmented Control로 전환하여, 선택된 세그먼트가 강조 배경색으로 활성화 상태를 나타낸다.`,
      source: `Apple Human Interface Guidelines, Material Design 3`
    },
  {
      english: `Tap`,
      korean: `탭`,
      category: `인터랙션 & 제스처`,
      definition: `터치스크린 위에서 손가락으로 한 번 짧게 누르는 동작으로, 가장 기본적인 터치 인터랙션이다.`,
      description: `탭은 버튼 클릭, 링크 이동, 항목 선택 등 대부분의 기본 액션을 트리거하는 데 사용된다. Apple HIG는 탭 동작이 데스크톱의 클릭과 유사하게 동작해야 한다고 명시하며, 사용자가 탭했을 때 즉각적인 시각적 피드백이 제공되어야 한다고 강조한다. 탭은 모든 모바일 플랫폼에서 가장 기본적이고 보편적인 제스처이므로, 모든 인터랙티브 요소는 탭으로 동작할 수 있어야 한다.`,
      usage: `사용자가 쇼핑앱에서 상품 카드를 탭하면 상품 상세 페이지로 이동하고, 장바구니 버튼을 탭하면 장바구니에 추가된다.`,
      source: `Apple Human Interface Guidelines, Material Design 3`
    },
  {
      english: `Double Tap`,
      korean: `더블 탭`,
      category: `인터랙션 & 제스처`,
      definition: `같은 위치를 빠르게 두 번 연속으로 탭하는 제스처로, 특정 기능을 확대하거나 단축 액션을 실행하는 데 사용된다.`,
      description: `더블 탭은 주로 지도나 이미지를 특정 배율로 확대하거나, 소셜 미디어에서 '좋아요'를 누르는 단축 제스처로 활용된다. Apple HIG에서는 더블 탭을 통해 텍스트 단어 선택, Safari에서 웹페이지 컬럼 맞춤 확대 등의 시스템 수준 기능을 제공한다. 더블 탭과 싱글 탭이 모두 사용되는 UI에서는 두 제스처의 차이가 명확해야 하며, 싱글 탭 딜레이가 발생하지 않도록 설계해야 한다.`,
      usage: `Instagram 피드에서 사진을 더블 탭하면 하트 애니메이션과 함께 '좋아요'가 적용되고, 지도 앱에서 더블 탭하면 해당 지점을 중심으로 확대된다.`,
      source: `Apple Human Interface Guidelines`
    },
  {
      english: `Long Press`,
      korean: `롱 프레스`,
      category: `인터랙션 & 제스처`,
      definition: `화면의 특정 요소를 일정 시간(보통 0.5초 이상) 동안 누르고 있는 제스처로, 추가 옵션이나 컨텍스트 메뉴를 표시하는 데 사용된다.`,
      description: `롱 프레스는 '숨겨진' 기능을 드러내는 제스처로, 사용자가 직접 발견해야 하는 어포던스(Affordance)가 낮은 인터랙션이다. iOS에서는 앱 아이콘을 롱 프레스하면 빠른 액션 메뉴가 표시되고, Android에서는 항목 선택 모드(멀티셀렉트)를 시작하는 트리거로 사용된다. Material Design에서는 롱 프레스를 통해 드래그 앤 드롭 모드를 시작하거나 선택 상태로 진입하도록 설계한다. 롱 프레스는 직관적이지 않을 수 있으므로, 주요 기능의 유일한 접근 경로로 사용하지 않는 것이 권장된다.`,
      usage: `홈 화면에서 앱 아이콘을 롱 프레스하면 '공유', '삭제', '위젯 추가' 등 빠른 액션 메뉴가 나타난다.`,
      source: `Apple Human Interface Guidelines, Material Design 3`
    },
  {
      english: `Swipe`,
      korean: `스와이프`,
      category: `인터랙션 & 제스처`,
      definition: `손가락을 화면에 대고 수평 또는 수직 방향으로 빠르게 미는 제스처로, 화면 전환이나 항목 삭제, 액션 노출에 사용된다.`,
      description: `스와이프는 방향에 따라 다른 기능을 수행하는 중요한 제스처다. 왼쪽/오른쪽 스와이프는 카드 탐색, 항목 삭제 액션 노출, 화면 간 전환에 쓰이고, 위/아래 스와이프는 콘텐츠 스크롤이나 바텀 시트 닫기에 활용된다. Apple HIG에서는 왼쪽 엣지에서의 스와이프를 이전 화면으로 돌아가는 표준 내비게이션 제스처로 정의한다. 스와이프 제스처는 플리크(Flick)와 달리 느린 속도로도 수행할 수 있으며, 중간에 멈추면 중간 상태로 유지될 수 있다.`,
      usage: `이메일 앱에서 메일 항목을 왼쪽으로 스와이프하면 '삭제' 버튼이 나타나고, 오른쪽으로 스와이프하면 '읽음 표시' 버튼이 나타난다.`,
      source: `Apple Human Interface Guidelines, Material Design 3`
    },
  {
      english: `Scroll`,
      korean: `스크롤`,
      category: `인터랙션 & 제스처`,
      definition: `화면에 표시되지 않는 콘텐츠를 보기 위해 손가락으로 화면을 위아래 또는 좌우로 미는 연속적인 탐색 제스처다.`,
      description: `스크롤은 모바일과 웹 모두에서 가장 빈번하게 사용되는 기본 인터랙션으로, 뷰포트보다 긴 콘텐츠를 탐색하는 수단이다. iOS에서는 스크롤 속도에 따른 모멘텀(관성 스크롤)을 제공하여 자연스러운 물리 감각을 구현한다. 스크롤 방향은 콘텐츠의 성격에 따라 수직(피드, 기사)과 수평(캐러셀, 탭) 중 선택한다. 무한 스크롤과 페이지네이션 중 어느 방식을 택하느냐는 콘텐츠 탐색성과 사용자의 위치 파악 용이성에 영향을 미친다.`,
      usage: `뉴스 앱에서 기사 목록을 위로 스크롤하여 더 많은 기사를 탐색하고, 상단 탭 바를 좌우로 스크롤하여 카테고리를 전환한다.`,
      source: `Apple Human Interface Guidelines, Material Design 3`
    },
  {
      english: `Pinch`,
      korean: `핀치`,
      category: `인터랙션 & 제스처`,
      definition: `두 손가락을 화면에 대고 가까워지도록 오므리는 제스처로, 콘텐츠를 축소하거나 이전 상태로 돌아가는 데 사용된다.`,
      description: `핀치는 스프레드(Spread/Zoom)의 반대 동작으로, 두 손가락 사이의 거리를 줄여 화면을 축소한다. 지도, 사진, 문서 뷰어에서 확대된 콘텐츠를 다시 줄이는 데 주로 사용된다. Apple HIG는 핀치와 스프레드를 표준 확대/축소 제스처로 정의하며, 앱은 이 제스처를 재정의하지 않는 것을 권장한다. 멀티터치를 지원하지 않는 환경에서는 핀치 대신 버튼이나 슬라이더로 동등한 기능을 제공해야 접근성이 보장된다.`,
      usage: `지도 앱에서 두 손가락을 오므려 핀치하면 도시 전체 뷰로 축소되고, 사진 앱에서 핀치하면 갤러리 그리드 뷰로 돌아간다.`,
      source: `Apple Human Interface Guidelines`
    },
  {
      english: `Spread`,
      korean: `Zoom / 스프레드·줌`,
      category: `인터랙션 & 제스처`,
      definition: `두 손가락을 화면에 대고 멀어지게 벌리는 제스처로, 콘텐츠를 확대하는 데 사용된다.`,
      description: `스프레드(Spread) 또는 핀치 아웃(Pinch-out)이라 불리는 이 제스처는 지도, 사진, 웹 페이지 등에서 특정 영역을 확대하는 직관적인 방법이다. 손가락 두 개 사이의 거리와 확대 배율이 연동되어 자연스러운 물리적 감각을 제공한다. iOS의 경우 시스템 전체에서 일관된 핀치/스프레드 동작을 지원한다.`,
      usage: `구글 지도에서 두 손가락을 벌려 스프레드하면 특정 건물이나 골목 수준까지 확대되며, 웹 브라우저에서 기사 본문을 스프레드하면 글씨가 커진다.`,
      source: `Apple Human Interface Guidelines, Material Design 3`
    },
  {
      english: `Rotate`,
      korean: `로테이트`,
      category: `인터랙션 & 제스처`,
      definition: `두 손가락을 화면에 대고 시계 방향 또는 반시계 방향으로 회전시키는 제스처로, 객체나 화면을 회전하는 데 사용된다.`,
      description: `로테이트 제스처는 사진 편집, 지도 방향 조정, 그래픽 편집 앱 등에서 요소를 회전할 때 사용된다. Apple HIG에서는 핀치, 스프레드와 함께 표준 멀티터치 제스처로 정의하며, 사진 앱에서 이미지를 회전하는 데 활용된다. 이 제스처는 상대적으로 덜 일반적이어서 사용자가 발견하기 어려울 수 있으므로, 도움말이나 온보딩에서 안내하는 것이 좋다. 게임이나 크리에이티브 도구에서는 회전 제스처를 통해 더 직관적인 조작감을 제공할 수 있다.`,
      usage: `사진 편집 앱에서 두 손가락으로 로테이트 제스처를 수행하면 사진이 해당 각도만큼 회전되고, 지도에서 로테이트하면 지도 방향이 바뀐다.`,
      source: `Apple Human Interface Guidelines`
    },
  {
      english: `Drag`,
      korean: `드래그`,
      category: `인터랙션 & 제스처`,
      definition: `요소를 손가락으로 누른 채 다른 위치로 이동시키는 제스처로, 객체 재배치나 드래그 앤 드롭 인터랙션에 사용된다.`,
      description: `드래그는 요소를 한 위치에서 다른 위치로 이동하거나, 슬라이더 값을 조정하거나, 목록 항목을 재정렬할 때 사용하는 핵심 제스처다. 일반적으로 롱 프레스로 드래그 모드를 시작한 후 이동하는 패턴이 많이 쓰인다. Apple HIG는 드래그 앤 드롭을 iPad에서 앱 간 콘텐츠 이동의 중요한 생산성 기능으로 강조한다.`,
      usage: `할 일 목록 앱에서 항목 옆의 핸들을 드래그하여 우선순위 순서를 재정렬하거나, 파일 관리 앱에서 파일을 드래그해 다른 폴더로 이동한다.`,
      source: `Apple Human Interface Guidelines, W3C WCAG 2.2`
    },
  {
      english: `Drop`,
      korean: `드롭`,
      category: `인터랙션 & 제스처`,
      definition: `드래그 중인 요소를 목표 위치에서 손가락을 떼어 배치하는 동작으로, 드래그 앤 드롭 인터랙션의 완료 단계다.`,
      description: `드롭은 드래그의 완료 동작으로, 사용자가 콘텐츠를 놓을 수 있는 유효한 드롭 영역을 시각적으로 명확하게 표시해야 한다. Material Design에서는 드롭 가능한 영역에 강조 표시(하이라이트)를 적용하여 사용자가 유효한 위치를 파악할 수 있도록 안내한다. 드롭 시 목표 영역이 명확하지 않으면 실수가 잦으므로, 드롭 존(Drop Zone)을 넉넉하게 설계하는 것이 중요하다.`,

      source: `Apple Human Interface Guidelines, Material Design 3`
    },
  {
      english: `Pan`,

      category: `인터랙션 & 제스처`,
      definition: `손가락을 화면에 밀착시킨 채 어느 방향으로든 천천히 이동시키는 제스처로, 뷰포트를 이동하거나 콘텐츠를 탐색하는 데 사용된다.`,
      description: `패닝은 스크롤과 유사하지만, 보통 2D 공간(지도, 캔버스)에서 자유로운 방향으로 뷰를 이동할 때 사용된다는 점에서 구분된다. 지도 앱에서 원하는 지역으로 이동하거나, 확대된 이미지 내에서 특정 부분을 탐색할 때 패닝을 사용한다. 패닝은 스프레드/핀치와 함께 사용되어 자유로운 지도 탐색 경험을 제공한다. UI 설계 시 패닝 가능한 영역의 경계를 시각적으로 암시하거나, 사용자가 경계를 벗어났을 때 탄성 있는 피드백을 주는 것이 좋다.`,

    },

  {

      description: `포커스는 키보드 내비게이션과 접근성의 핵심 개념으로, Tab 키를 눌러 인터랙티브 요소 사이를 이동할 때 현재 위치를 알려준다. Material Design 3에서는 포커스 상태에 대해 높은 강도의 상태 레이어를 적용하여 시각적으로 명확하게 구분한다. 모달이나 드롭다운이 열릴 때 포커스를 해당 요소로 자동 이동하고, 닫힐 때 원래 위치로 복원하는 포커스 관리가 중요하다.`,
      usage: `로그인 폼에서 Tab 키를 눌러 이메일 입력 필드에 포커스가 이동하면 파란 테두리가 나타나고, 이어서 비밀번호 필드로 포커스가 이동한다.`,

  {

      description: `블러(Blur)는 포커스의 반대 개념으로, 사용자가 현재 요소에서 포커스를 이동할 때 발생하는 이벤트다. 폼 디자인에서 블러 이벤트는 입력값의 실시간 유효성 검사를 시작하는 시점으로 자주 활용된다. 예를 들어, 이메일 필드에서 포커스가 벗어날 때(blur) 이메일 형식이 올바른지 검사하여 인라인 에러 메시지를 표시한다. 모달이나 드롭다운 외부를 클릭하면 해당 요소에 블러가 발생하며, 이를 통해 모달 닫기나 드롭다운 접기를 구현한다.`,

  {

      description: `선택 인터랙션은 단일 선택(라디오 버튼, 드롭다운)과 복수 선택(체크박스, 멀티셀렉트)으로 구분된다. 선택 상태는 체크마크, 강조 색상, 테두리 등 명확한 시각적 피드백으로 표시되어야 한다. Material Design에서는 리스트 항목 선택 시 표면 색상이 변하는 상태 레이어를 적용하며, 선택된 항목 수를 상단에 표시하는 패턴을 사용한다. 선택 모드 진입과 해제, 전체 선택/해제 기능을 함께 제공하면 사용성이 향상된다.`,

      description: `멀티셀렉트는 이메일 일괄 삭제, 사진 공유, 파일 일괄 이동과 같이 여러 항목에 같은 작업을 적용할 때 필수적인 패턴이다. 모바일에서는 롱 프레스로 선택 모드를 시작하고 탭으로 추가 선택하는 방식이 일반적이며, 선택 모드에서는 가능한 모든 액션 버튼(삭제, 공유, 이동 등)을 명확하게 표시하고, 선택 개수를 실시간으로 안내해야 한다. 전체 선택/해제 버튼을 제공하면 대량 작업의 효율성이 높아진다.`,

    },
  {

      description: `디스미스는 사용자가 현재 작업을 완료하거나 취소하고 이전 상태로 돌아가는 핵심 인터랙션이다. 모달 외부 영역 탭하기, 스와이프 다운, X 버튼 클릭, Escape 키 등 다양한 방법으로 디스미스할 수 있도록 설계해야 한다. Apple HIG는 스와이프로 디스미스 가능한 시트에 대해 사용자가 작성 중인 내용이 있을 때 확인 대화상자를 표시하도록 권장한다. Toast나 Snackbar처럼 자동으로 사라지는 요소는 타이머 기반 자동 디스미스와 수동 닫기 버튼을 함께 제공하는 것이 좋다.`,

    },
  {
      english: `Pull to Refresh`,

      definition: `스크롤 가능한 콘텐츠 최상단에서 아래로 당기는 제스처로 콘텐츠를 새로 고치는 패턴이다.`,

      description: `엣지 스와이프는 Apple HIG에서 왼쪽 엣지에서의 스와이프를 이전 화면으로 돌아가는 표준 내비게이션 제스처(Back swipe)로 정의하는 것이 대표적 예시다. iOS에서 하단 엣지 스와이프는 홈 화면 이동이나 앱 전환기 열기에 사용되며, 상단 엣지 스와이프는 알림 센터나 제어 센터에 접근한다. 앱 내 드래거블 패널이나 사이드 메뉴를 엣지 스와이프로 열 수 있게 하는 패턴도 널리 사용된다.`,

      description: `쉐이크 제스처는 기기의 가속도계를 활용하여 흔드는 동작을 감지한다. iOS에서는 쉐이크 제스처가 기본적으로 실행 취소(Undo) 기능과 연결되어 있어, 텍스트를 입력한 후 기기를 흔들면 실행 취소 알림이 나타난다. 일부 앱에서는 쉐이크를 통해 콘텐츠 셔플, 피드백 제출, 게임 내 주사위 굴리기 등 창의적인 기능에 활용한다. 쉐이크 제스처는 의도치 않게 실행될 수 있으므로 민감도 조절과 명확한 확인 단계가 필요하다.`,

  {

      description: `햅틱 피드백은 시각적, 청각적 피드백을 보완하여 더 풍부하고 자연스러운 인터랙션 경험을 제공한다. Apple의 Taptic Engine은 스크롤 피커의 항목 변경, 알림 도착, 잘못된 비밀번호 입력 등 다양한 상황에서 세밀하게 조절된 진동 패턴을 제공한다. 햅틱 피드백은 과도하게 사용하면 오히려 피로감을 주므로, 중요한 이벤트와 의미 있는 상태 변화에 선택적으로 적용해야 한다.`,
      usage: `알람 설정 시 피커에서 시간을 스크롤하면 각 시간 단위가 넘어갈 때마다 가벼운 햅틱 진동이 발생하여 물리적 다이얼을 돌리는 감각을 제공한다.`,

      korean: `보이스 인풋`,
      category: `인터랙션 & 제스처`,
      definition: `음성 명령이나 받아쓰기를 통해 텍스트를 입력하거나 앱 기능을 제어하는 인터랙션 방식이다.`,
      description: `음성 입력은 손을 사용하기 어려운 상황(운전 중, 요리 중)이나 신체적 장애가 있는 사용자에게 중요한 대안 입력 수단이다. Apple의 Siri, Google Assistant, Amazon Alexa 등 음성 비서 플랫폼의 발전으로 음성 입력의 정확도와 활용 범위가 크게 향상되었다. 음성 입력 UI는 마이크 활성화 상태, 음성 인식 중 상태, 인식 완료 상태를 명확하게 시각적으로 표시해야 한다.`,
      usage: `지도 앱에서 검색 필드 옆의 마이크 아이콘을 탭하면 음성 인식이 시작되고, '강남역 근처 카페 찾아줘'라고 말하면 검색 결과가 표시된다.`,
      source: `Apple Human Interface Guidelines, W3C WCAG 2.2`
    },
  {
      english: `Touch Target`,
      korean: `터치 타겟`,
      category: `인터랙션 & 제스처`,
      definition: `사용자가 터치로 상호작용할 수 있는 UI 요소의 실제 탭 가능한 영역 크기를 의미한다.`,
      description: `터치 타겟은 시각적으로 보이는 요소의 크기보다 크게 설정하여 손가락으로 쉽게 탭할 수 있어야 한다. Apple HIG는 터치 타겟을 최소 44×44포인트로 권장하고, Material Design은 최소 48×48dp를 기준으로 제시한다. 작은 아이콘 버튼의 경우 시각적 크기를 유지하면서 투명한 패딩을 추가하여 터치 영역을 확장하는 방법이 자주 사용된다.`,
      usage: `16px 크기의 X(닫기) 아이콘 주변에 44×44px 투명 터치 영역을 설정하여, 시각적으로는 작아 보이지만 실제 탭은 쉽게 할 수 있도록 한다.`,
      source: `Apple Human Interface Guidelines, W3C WCAG 2.2, Material Design 3`
    },
  {
      english: `Hit Area`,
      korean: `히트 에어리어`,
      category: `인터랙션 & 제스처`,
      definition: `실제로 인터랙션이 감지되는 물리적 영역으로, 시각적으로 표시되는 컴포넌트 영역과 다를 수 있다.`,
      description: `히트 에어리어(또는 히트 슬롭)는 사용자가 탭할 때 실제로 이벤트가 감지되는 영역을 의미하며, 터치 타겟과 유사하지만 보다 기술적인 개념이다. 작은 버튼이나 링크의 경우 시각적 크기는 작더라도 히트 에어리어를 넓게 설정하여 오탭을 방지한다. Android에서는 터치 위임(Touch Delegation)을 통해 부모 요소의 히트 에어리어를 자식 요소에 위임하거나 확장할 수 있다. 밀집된 UI에서는 인접한 요소들의 히트 에어리어가 겹치지 않도록 적절한 간격(Deadzone)을 유지해야 한다.`,
      usage: `목록의 각 항목 옆에 있는 작은 라디오 버튼 대신 행 전체를 히트 에어리어로 설정하여, 어디를 탭해도 해당 항목이 선택된다.`,
      source: `Apple Human Interface Guidelines, Material Design 3`
    },
  {
      english: `Deadzone`,
      korean: `데드존`,
      category: `인터랙션 & 제스처`,
      definition: `인터랙티브 요소 사이에 의도적으로 설정하는 비반응 영역으로, 인접 요소 간의 의도치 않은 오탭을 방지한다.`,
      description: `데드존은 밀집된 UI에서 인접한 인터랙티브 요소들이 서로의 히트 에어리어와 겹치지 않도록 하는 완충 공간이다. 예를 들어, 두 버튼의 히트 에어리어가 겹친다면 사용자가 한쪽을 탭하려다 다른 쪽이 활성화되는 오류가 발생한다. Material Design에서는 인터랙티브 요소 사이에 최소 8dp의 간격을 권장한다. 또한 제스처 인식에서도 데드존 개념이 적용되는데, 조이스틱이나 트랙패드에서 미세한 움직임을 무시하는 임계값 영역을 데드존이라 한다.`,
      usage: `키보드 앱에서 인접한 키들 사이에 데드존을 설정하여 's'를 탭할 때 'a'나 'd'가 잘못 입력되지 않도록 한다.`,
      source: `Material Design 3, Apple Human Interface Guidelines`
    },
  {
      english: `Infinite Scroll`,
      korean: `인피니트 스크롤`,
      category: `인터랙션 & 제스처`,
      definition: `사용자가 페이지 하단에 도달했을 때 자동으로 콘텐츠를 추가 로드하여 끊김 없이 스크롤을 이어갈 수 있도록 하는 패턴이다.`,
      description: `인피니트 스크롤은 소셜 미디어 피드, 뉴스 앱, 이미지 갤러리에서 광범위하게 사용된다. 사용자가 명시적으로 '다음 페이지'를 누르지 않아도 되어 탐색 흐름을 유지하는 장점이 있지만, 특정 항목으로 돌아가기 어렵고 페이지 하단에 위치한 풋터나 기타 콘텐츠에 접근하기 힘든 단점도 있다. Nielsen Norman Group은 목적적 탐색(검색하는 사람)보다 탐색적 탐색(둘러보는 사람)에 더 적합하다고 권고한다.`,
      usage: `인스타그램 피드에서 하단까지 스크롤하면 자동으로 새 게시물이 로드되어 사용자가 콘텐츠를 멈춤 없이 계속 탐색할 수 있다.`,
      source: `Nielsen Norman Group, Material Design 3`
    },
  {
      english: `Rubber Band Effect`,
      korean: `고무줄 효과`,
      category: `인터랙션 & 제스처`,
      definition: `스크롤 가능한 콘텐츠의 끝에 도달했을 때 콘텐츠가 약간 더 당겨졌다가 탄성처럼 원래 위치로 돌아오는 물리 기반 피드백 애니메이션이다.`,
      description: `Apple이 iOS에서 처음 도입한 Rubber Band Effect(또는 Bounce Effect)는 사용자가 스크롤 경계를 직관적으로 인식하도록 돕는 물리적 메타포다. 단순히 스크롤이 멈추는 것보다 '더 갈 곳이 없음'을 자연스럽게 전달한다. 이 효과는 현실 세계의 물리적 감각을 디지털 인터랙션에 녹여 사용자에게 친숙함과 만족감을 준다. Spring Animation과 연계되어 구현되며, 과도하게 적용하면 멀미감을 줄 수 있어 진폭과 복원 속도를 신중하게 조율해야 한다.`,
      usage: `iOS 메시지 앱에서 대화 목록의 맨 위나 맨 아래로 스크롤할 때 콘텐츠가 살짝 튀어나왔다가 돌아오는 반응으로 경계를 인식할 수 있다.`,
      source: `Apple Human Interface Guidelines`
    },
  {
      english: `Overscroll`,
      korean: `오버스크롤`,
      category: `인터랙션 & 제스처`,
      definition: `스크롤 컨테이너의 경계를 초과하여 스크롤할 때 발생하는 동작으로, 플랫폼별로 시각적 피드백 방식이 다르다.`,
      description: `iOS에서는 Rubber Band Effect로, Android에서는 Material Design의 Stretch Overscroll(콘텐츠가 늘어나는 효과) 또는 Edge Glow(빛 번짐 효과)로 구현된다. 오버스크롤은 사용자에게 콘텐츠 경계를 알리는 동시에 Pull to Refresh 같은 액션을 트리거하는 진입점 역할도 한다. 각 플랫폼의 오버스크롤 방식은 해당 OS의 디자인 언어와 일관성을 유지해야 사용자가 혼란을 느끼지 않는다.`,
      usage: `Android 앱에서 리스트 상단을 당기면 콘텐츠 영역이 살짝 늘어나는 Stretch 효과로 경계를 시각적으로 알려주고, 충분히 당기면 Pull to Refresh가 활성화된다.`,
      source: `Material Design 3, Apple Human Interface Guidelines`
    },
  {
      english: `Transition`,
      korean: `트랜지션`,
      category: `모션 & 애니메이션`,
      definition: `UI가 한 상태에서 다른 상태로 변할 때 중간 과정을 시각적으로 부드럽게 연결하는 애니메이션이다.`,
      description: `트랜지션은 화면 전환, 요소의 등장/퇴장, 상태 변화 등에 적용되어 갑작스러운 변화 대신 연속적인 흐름을 만들어낸다.  트랜지션의 지속 시간과 이징(Easing) 곡선은 자연스러움과 속도감에 직접 영향을 미치며, 너무 느리면 답답하고 너무 빠르면 어색하다. 의미 있는 트랜지션은 요소 간의 공간적·논리적 관계를 사용자가 이해하는 데 도움을 준다.`,
      usage: `이메일 목록에서 특정 메일을 탭하면 카드가 확장되면서 상세 화면으로 전환되는 Container Transform 트랜지션으로 두 화면의 관계를 직관적으로 전달한다.`,
      source: `Material Design 3, Apple Human Interface Guidelines`
    },
  {
      english: `Animation`,
      korean: `애니메이션`,
      category: `모션 & 애니메이션`,
      definition: `UI 요소가 시간에 따라 속성(위치, 크기, 색상, 투명도 등)이 변화하는 동적 시각 효과의 총칭이다.`,
      description: `UI 애니메이션은 단순한 장식이 아니라, 피드백 제공, 계층 관계 표현, 사용자 주의 유도, 상태 변화 전달 등 기능적 목적을 가져야 한다. 애니메이션은 수행 중인 작업의 방해가 되지 않아야 하며, 반복적으로 재생되는 애니메이션은 사용자 집중을 방해할 수 있으므로 주의해야 한다.`,
      usage: `할 일 항목을 완료로 표시할 때 체크마크 그리기 애니메이션과 함께 항목이 아래로 밀려나는 동작으로 '완료됨'이라는 상태 변화를 명확하게 전달한다.`,
      source: `Material Design 3, Apple Human Interface Guidelines`
    },
  {
      english: `Easing`,
      korean: `이징`,
      category: `모션 & 애니메이션`,
      definition: `애니메이션의 속도 변화 곡선을 정의하는 함수로, 움직임이 시작하고 끝나는 방식을 제어하여 자연스러운 물리적 감각을 만든다.`,
      description: `이징은 수학적 함수(베지어 곡선 등)로 표현되며, 균일한 속도(Linear)부터 가속/감속을 결합한 다양한 곡선이 있다. 실제 물리 세계의 움직임은 Linear하지 않으며, 물체는 일반적으로 천천히 시작해서 빠르게 이동하고 천천히 멈추는 Ease-in-out 패턴을 따른다. 이징 선택은 요소가 화면에 진입하는지(Ease-out), 화면을 나가는지(Ease-in), 단순 상태 변화인지(Ease-in-out)에 따라 달라져야 한다.`,
      usage: `바텀 시트가 아래에서 올라올 때는 Ease-out(빠르게 시작, 천천히 멈춤) 이징을, 내려갈 때는 Ease-in(천천히 시작, 빠르게 끝남) 이징을 적용하여 물리적으로 자연스러운 움직임을 구현한다.`,
      source: `Material Design 3, Apple Human Interface Guidelines`
    },
  {
      english: `Ease-in`,
      korean: `이즈인`,
      category: `모션 & 애니메이션`,
      definition: `애니메이션이 천천히 시작하여 점점 빠르게 진행되는 가속 이징 곡선으로, 요소가 화면에서 사라질 때 자연스럽다.`,
      description: `Ease-in은 물체가 정지 상태에서 출발하는 움직임처럼 느리게 시작하여 가속하는 패턴이다. 화면에서 퇴장하는 요소(모달 닫기, 알림 사라짐 등)에 적용하면 화면 밖으로 '날아가는' 자연스러운 느낌을 준다. Ease-in을 화면에 진입하는 요소에 잘못 적용하면 처음에 느린 움직임이 불안정하게 느껴질 수 있다.`,
      usage: `오류 알림 배너가 몇 초 후 자동으로 사라질 때, Ease-in을 적용하여 처음에는 천천히 올라가다 화면 밖으로 빠르게 사라지는 자연스러운 퇴장 애니메이션을 구현한다.`,
      source: `Material Design 3, Apple Human Interface Guidelines`
    },
  {
      english: `Ease-out`,
      korean: `이즈아웃`,
      category: `모션 & 애니메이션`,
      definition: `애니메이션이 빠르게 시작하여 점점 느리게 진행되며 부드럽게 멈추는 감속 이징 곡선으로, 요소가 화면에 등장할 때 자연스럽다.`,
      description: `Ease-out은 빠르게 이동하던 물체가 목표 지점에서 자연스럽게 멈추는 물리적 감각을 모방한다. 화면에 새로 등장하는 요소(바텀 시트, 모달, 드롭다운 등)에 적용하면 사용자의 시선을 빠르게 끌면서도 불안하지 않게 자연스럽게 위치에 안착하는 느낌을 준다. 빠른 등장 이후 부드러운 정착이라는 패턴은 사용자가 새 요소를 쉽게 인식하게 한다.`,
      usage: `앱 하단에서 바텀 시트가 올라올 때 Ease-out을 적용하여 처음에는 빠르게 올라오다가 최종 위치 근처에서 천천히 부드럽게 안착하는 애니메이션을 구현한다.`,
      source: `Material Design 3, Apple Human Interface Guidelines`
    },
  {
      english: `Ease-in-out`,
      korean: `이즈인아웃`,
      category: `모션 & 애니메이션`,
      definition: `애니메이션이 천천히 시작하여 중간에 빠르게 진행되고 다시 천천히 끝나는 이징 곡선으로, 요소의 위치 이동에 가장 자연스럽다.`,
      description: `Ease-in-out는 물리 세계에서 물체가 움직이는 가장 일반적인 패턴으로, 정지 상태에서 가속하다가 목표 지점에서 감속하며 멈추는 움직임이다. 화면 내에서 요소가 한 위치에서 다른 위치로 이동하는 애니메이션에 가장 적합하며, 가장 자연스럽고 부드러운 느낌을 준다. 요소가 화면 내에서 위치를 변경하는 레이아웃 애니메이션에 Ease-in-out을 사용하면 시각적으로 안정감이 있다.`,
      usage: `리스트에서 항목 순서를 드래그로 변경할 때, 다른 항목들이 새 위치로 재배치되는 애니메이션에 Ease-in-out을 적용하여 자연스럽게 슬라이딩하는 효과를 준다.`,
      source: `Material Design 3, Apple Human Interface Guidelines`
    },
  {
      english: `Spring Animation`,
      korean: `스프링 애니메이션`,
      category: `모션 & 애니메이션`,
      definition: `스프링의 물리적 반발력을 모델링하여 목표 위치를 약간 초과했다가 되돌아오는 탄성 있는 움직임을 구현하는 애니메이션 방식이다.`,
      description: `스프링 애니메이션은 베지어 곡선 기반의 이징과 달리, 물리 법칙(질량, 강도, 감쇠)을 기반으로 작동하여 더 생동감 있는 인터페이스를 만들어낸다. iOS와 macOS에서 스프링 애니메이션은 시스템 전반에 광범위하게 사용되어 Apple 제품의 특유의 생동감 있는 느낌을 만들어낸다. 스프링 강도(Stiffness)와 감쇠(Damping) 값을 조정하여 통통 튀는 느낌부터 안정적인 감속까지 다양한 특성을 만들 수 있다.`,

    },
  {

      korean: `지속 시간`,
      category: `모션 & 애니메이션`,
      definition: `애니메이션이 시작에서 끝까지 완료되는 데 걸리는 시간으로, 모션의 자연스러움과 속도감에 직접적인 영향을 미친다.`,
      description: `지속 시간이 너무 짧으면(100ms 이하) 사용자가 변화를 인지하기 전에 끝나버리고, 너무 길면(500ms 이상) 답답하고 느린 앱이라는 인상을 준다. 화면을 닫거나 취소하는 종료 애니메이션은 열리는 진입 애니메이션보다 30% 정도 빠르게 설정하는 것이 일반적 관례다. 사용자가 반복적으로 경험하는 애니메이션은 처음에 느끼는 '자연스러움'보다 실제 사용 시 '빠른 반응성'이 더 중요하므로 지속 시간을 보수적으로 설정해야 한다.`,
      usage: `버튼의 호버 상태 전환에는 150ms, 모달 등장 애니메이션에는 300ms, 페이지 전환 애니메이션에는 400ms를 각각 적용하여 요소의 중요도와 크기에 맞는 지속 시간을 설정한다.`,
      source: `Material Design 3, Apple Human Interface Guidelines`
    },
  {
      english: `Delay`,
      korean: `딜레이`,
      category: `모션 & 애니메이션`,
      definition: `애니메이션이 트리거된 후 실제로 시작하기까지 기다리는 시간으로, 여러 요소를 순차적으로 등장시키는 Stagger 효과에 주로 활용된다.`,
      description: `목록 항목들을 50-100ms 간격으로 순차 등장시키는 스태거 효과에서 딜레이가 핵심적인 역할을 한다. 딜레이가 너무 길면 느리고 반응이 없는 앱처럼 느껴지므로, 사용자 인터랙션에 대한 즉각적 응답(100ms 이내)과 구분해서 사용해야 한다. 딜레이 없이 모든 요소가 동시에 등장하면 산만하고, 딜레이가 너무 길면 지루하게 느껴진다. 최적의 스태거 딜레이는 일반적으로 30-80ms 범위다.`,
      usage: `검색 결과 카드들을 화면에 로드할 때 각 카드에 50ms 딜레이를 순차적으로 적용하여 카드들이 위에서 아래로 순서대로 페이드인되는 스태거 효과를 구현한다.`,
      source: `Material Design 3, Apple Human Interface Guidelines`

  {
      english: `Stagger`,

      description: `스태거는 리스트, 카드 그리드, 메뉴 항목 등 반복적인 요소 그룹을 화면에 표시할 때 단조로움을 피하고 시각적 흥미를 더해주는 효과다. 스태거 간격은 짧을수록(30-80ms) 통일감 있는 파동 효과가 나타나고, 길수록(200ms 이상) 개별 요소의 등장이 독립적으로 인식된다. 스태거 방향(위→아래, 좌→우, 중앙→외곽 등)은 내용의 계층 관계나 읽기 방향과 일치하면 더 자연스럽다.`,
      usage: `앱 홈 화면에서 메뉴 카드들이 위에서 아래로 60ms 간격으로 순차적으로 페이드인되어 화면이 생동감 있게 구성되는 스태거 애니메이션을 적용한다.`,

  {

  {

      definition: `단일 작업을 수행하는 작은 기능 단위 인터랙션으로, 트리거, 규칙, 피드백, 루프·모드 네 가지 구성 요소로 이루어진다.`,
      description: `마이크로인터랙션은 스위치 토글, '좋아요' 버튼 누르기, 폼 제출 등 작지만 중요한 인터랙션 순간을 설계하는 방법론이다. 트리거(사용자 액션 또는 시스템 이벤트) → 규칙(무슨 일이 일어나는가) → 피드백(사용자에게 무엇을 알려주는가) → 루프·모드(어떤 조건에서 반복 또는 변경되는가)의 구조로 분석한다. 잘 설계된 마이크로인터랙션은 사용자에게 즉각적인 피드백을 제공하고 제품의 '개성'을 만들어낸다. 지나치게 복잡하거나 화려한 마이크로인터랙션은 오히려 작업 흐름을 방해할 수 있다.`,

  {

      description: `페이지 트랜지션은 사용자가 어디서 왔는지, 어디로 가는지를 공간적으로 인식하게 도와주는 중요한 내비게이션 신호다. iOS의 내비게이션 컨트롤러는 화면 이동 방향(앞→슬라이드 인 오른쪽, 뒤→슬라이드 아웃 왼쪽)을 통해 계층 구조를 명확히 전달한다. Material Design의 Shared Axis 패턴은 수평(앞/뒤 내비게이션), 수직(탭 내비게이션), 깊이(상위/하위 계층) 세 축으로 트랜지션 방향을 정의한다.`,

      description: `진입 애니메이션은 페이드인, 슬라이드인, 스케일업 등의 방식으로 요소가 화면에 부드럽게 등장하게 한다. Ease-out 이징을 주로 사용하여 빠르게 시작해 부드럽게 안착하는 느낌을 주며, 지속 시간은 200-400ms 범위가 적절하다. 진입 애니메이션이 너무 과도하면 콘텐츠 탐색 속도를 떨어뜨리고, 특히 리스트의 모든 아이템에 적용되면 사용자가 원하는 항목을 찾기까지 기다려야 하는 불편함이 생긴다.`,

      description: `상태 변화 애니메이션은 갑작스러운 상태 전환 대신 중간 과정을 보여줌으로써 변화가 발생했음을 사용자가 명확히 인식하게 한다. 체크박스 선택, 스위치 토글, 버튼 호버, 아코디언 펼침/접힘 등 다양한 컴포넌트의 상태 변화에 적용된다. Material Design 3의 상태 레이어 시스템은 Hover, Focused, Pressed, Dragged 상태에 대해 각각 다른 오버레이 강도를 애니메이션으로 전환하는 방식을 정의한다.`,
